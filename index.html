        tabs.map(t => e('div', {
          key:t.key, className:`tab ${activeTab===t.key?'active':''}`,
          onClick:()=>setActiveTab(t.key)
        }, t.label))
      ),
      activeTab === 'CAPS' && evaluation.scores.capInfo.length > 0 &&
        e('table', { className:'items-table' },
          e('thead', null, e('tr', null,
            e('th', null, 'Grupo'), e('th', null, 'Itens'), e('th', null, 'Valor Bruto'),
            e('th', null, 'Teto'), e('th', null, 'Valor Efetivo'), e('th', null, 'Redução'),
          )),
          e('tbody', null,
            evaluation.scores.capInfo.map((ci, i) =>
              e('tr', { key:i },
                e('td', { className:'item-code' }, ci.group), e('td', null, ci.count),
                e('td', null, ci.raw), e('td', { className:'cap-hit' }, ci.cap),
                e('td', null, ci.effective),
                e('td', { style:{ color:'var(--red)' } }, `-${(ci.raw-ci.effective).toFixed(2)}`),
              )
            )
          )
        ),
      activeTab === 'CAPS' && evaluation.scores.capInfo.length === 0 &&
        e('p', { style:{ color:'var(--text-muted)', padding:'20px 0' } }, 'Nenhum teto aplicado.'),
      activeTab !== 'CAPS' && filtered.length > 0 &&
        e('table', { className:'items-table' },
          e('thead', null, e('tr', null,
            e('th', null, 'Código'), e('th', null, 'Descrição'), e('th', null, 'Detalhe'),
            e('th', null, 'SICAD'), e('th', null, 'Calculado'), e('th', null, 'Status'),
          )),
          e('tbody', null,
            filtered.map((d, i) => {
              const desc = d.ruleName || d.code;
              const detail = d.componente || d.titulo || d.portaria || d.discente || '';
              const match = d.sicadPts !== null && Math.abs(d.sicadPts - d.calculated) < 0.02;
              return e('tr', { key:i },
                e('td', { className:'item-code' }, d.code),
                e('td', null, desc),
                e('td', { style:{ maxWidth:250, fontSize:12, color:'var(--text-secondary)' } }, detail.substring(0,80)),
                e('td', { className:'mono', style:{ textAlign:'right' } }, d.sicadPts !== null ? d.sicadPts : '—'),
                e('td', { className:'mono', style:{ textAlign:'right', fontWeight:600 } }, d.calculated),
                e('td', null,
                  d.capHit
                    ? e('span', { className:'cap-hit', title:`Teto ${d.capMax} no grupo ${d.capGroup}` }, '⚠ TETO')
                    : d.sicadPts !== null
                      ? (match ? e('span', { style:{ color:'var(--green)' } }, '✓')
                               : e('span', { style:{ color:'var(--orange)' } }, '≠'))
                      : ''
                ),
              );
            })
          )
        ),
      activeTab !== 'CAPS' && filtered.length === 0 &&
        e('p', { style:{ color:'var(--text-muted)', padding:'20px 0' } }, 'Nenhum item nesta categoria.'),
    );
  }


  // ============================================================
  // ANALYSIS CHART — Dispersão PROD × HAS (eixos como na apresentação)
  //
  // Eixo X = Pontuação de produção (sem aulas)
  // Eixo Y = H-A horas semanais de ensino
  //
  // Fronteira de aprovação (3 segmentos):
  //  DE/40H: horizontal y=16 → diagonal (kneeL,16)→(kneeR,8) → horizontal y=8
  //  20H:    horizontal y=10 → diagonal (kneeL,10)→(kneeR,8) → horizontal y=8
  //
  // Pontos: cada professor é um ponto (prod, has) colorido por aprovação
  // ============================================================
  function AnalysisChart({ evaluations, thresholdDE, threshold20 }) {
    const canvasRef   = useRef(null);
    const chartRef    = useRef(null);
    const canvas20Ref = useRef(null);
    const chart20Ref  = useRef(null);
    const [regime, setRegime] = useState('DE');
    const [areaFilter, setAreaFilter] = useState(AREA_ALL);

    // ── Approval boundary key points ──────────────────────────
    function getBoundary(T, isDE) {
      if (!T || T <= 0) return null;
      if (isDE) {
        // Formula: prod = 1.05*T*(24-has)/12
        // kneeLeft  → has=16: prod = 1.05*T*8/12  = 0.7*T
        // kneeRight → has=8 : prod = 1.05*T*16/12 = 1.4*T
        return { kneeLeft: 1.05*T*8/12, kneeRight: 1.05*T*16/12, hasTop: 16, hasBot: 8 };
      } else {
        // Formula: prod = 0.2*T*(14-has)
        // kneeLeft  → has=10: prod = 0.8*T
        // kneeRight → has=8 : prod = 1.2*T
        return { kneeLeft: 0.8*T, kneeRight: 1.2*T, hasTop: 10, hasBot: 8 };
      }
    }

    // ── Per-professor status ───────────────────────────────────
    function approvalStatus(prod, has, T, isDE) {
      if (!T || T <= 0) return 'neutral';
      if (has < 8) return 'below';
      if (isDE) {
        if (has >= 16) return 'above';
        if (prod >= (16/12)*1.05*T && has >= 8) return 'above';
        if (prod >= 1.05*T*(24-has)/12) return 'above';
        return 'below';
      } else {
        if (has >= 10) return 'above';
        if (prod >= 1.2*T && has >= 8) return 'above';
        if (prod >= 0.2*T*(14-has)) return 'above';
        return 'below';
      }
    }

    const buildData = useCallback(() => {
      const isDE = regime === 'DE';
      const T    = isDE ? thresholdDE : threshold20;

      const filteredByArea = areaFilter === AREA_ALL
        ? evaluations
        : evaluations.filter(ev => ev.area === areaFilter);

      const pts = filteredByArea
        .filter(ev => isDE ? ev.regime !== '20H' : ev.regime === '20H')
        .map(ev => {
          const has  = Math.round((ev.scores.ENS_TOTAL / 10) * 100) / 100;
          const prod = Math.round(
            (ev.scores.PROJ_ENS + ev.scores.PRI + ev.scores.PSQ +
             ev.scores.EXT + ev.scores.ADM + ev.scores.RPT + ev.scores.OTR) * 100) / 100;
          return { x: prod, y: has, status: approvalStatus(prod, has, T, isDE), area: ev.area };
        });

      // Boundary line — 4 anchor points forming the L-shape
      const bnd   = getBoundary(T, isDE);
      const allX  = pts.map(p => p.x).filter(v => v > 0);
      const maxX  = allX.length > 0 ? Math.max(...allX, bnd ? bnd.kneeRight * 1.6 : 500, 100) : (bnd ? bnd.kneeRight * 1.8 : 500);
      const lineData = bnd ? [
        { x: 0,           y: bnd.hasTop },   // start: left edge at top
        { x: bnd.kneeLeft,  y: bnd.hasTop }, // left knee
        { x: bnd.kneeRight, y: bnd.hasBot }, // right knee
        { x: maxX,          y: bnd.hasBot }, // extend right at bottom
      ] : [];

      return { pts, lineData, T, bnd, maxX, isDE };
    }, [evaluations, thresholdDE, threshold20, regime, areaFilter]);

    useEffect(() => {
      if (!canvasRef.current) return;
      const { pts, lineData, T, bnd, maxX, isDE } = buildData();

      const above   = pts.filter(p => p.status === 'above');
      const below   = pts.filter(p => p.status === 'below');
      const neutral = pts.filter(p => p.status === 'neutral');

      const datasets = [];

      // ── Approval boundary (drawn first so it appears behind dots) ──
      if (lineData.length) {
        datasets.push({
          label: 'Fronteira de aprovação',
          data: lineData,
          type: 'line',
          borderColor: '#1a4b8c',
          borderWidth: 2.5,
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 2,
          z: 0,
        });
      }

      // ── Reference dashed lines via extra line datasets ──
      if (bnd) {
        // Horizontal guide at hasTop
        datasets.push({
          label: null,
          data: [{ x: 0, y: bnd.hasTop }, { x: maxX, y: bnd.hasTop }],
          type: 'line',
          borderColor: '#93aad4',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Horizontal guide at hasBot
        datasets.push({
          label: null,
          data: [{ x: 0, y: bnd.hasBot }, { x: maxX, y: bnd.hasBot }],
          type: 'line',
          borderColor: '#93aad4',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Vertical guide at kneeLeft
        datasets.push({
          label: null,
          data: [{ x: bnd.kneeLeft, y: 0 }, { x: bnd.kneeLeft, y: bnd.hasTop }],
          type: 'line',
          borderColor: '#e06060',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Vertical guide at kneeRight
        datasets.push({
          label: null,
          data: [{ x: bnd.kneeRight, y: 0 }, { x: bnd.kneeRight, y: bnd.hasBot }],
          type: 'line',
          borderColor: '#e06060',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
      }

      // ── Professor scatter — coloured by area, shape by status ──
      // circle = acima da reta  |  diamond (rectRot) = abaixo
      const allAreaSlots = [...AREAS, { id: AREA_ALL, label: 'Sem área', color: '#888888' }];
      allAreaSlots.forEach(ar => {
        const apv = pts.filter(p => p.area === ar.id && p.status === 'above');
        const rep = pts.filter(p => p.area === ar.id && p.status === 'below');
        const neu = pts.filter(p => p.area === ar.id && p.status === 'neutral');
        if (!apv.length && !rep.length && !neu.length) return;
        if (apv.length) datasets.push({
          label: ar.label + ' ✓',
          data: apv.map(p => ({ x: p.x, y: p.y })),
          type: 'scatter',
          backgroundColor: ar.color + 'cc',
          borderColor: ar.color,
          borderWidth: 2, pointStyle: 'circle',
          pointRadius: 9, pointHoverRadius: 12,
          order: 0, z: 10,
        });
        if (rep.length) datasets.push({
          label: ar.label + ' ✗',
          data: rep.map(p => ({ x: p.x, y: p.y })),
          type: 'scatter',
          backgroundColor: ar.color + 'cc',
          borderColor: ar.color,
          borderWidth: 2, pointStyle: 'circle',
          pointRadius: 9, pointHoverRadius: 12,
          order: 0, z: 10,
        });
        if (neu.length) datasets.push({
          label: ar.label + ' ?',
          data: neu.map(p => ({ x: p.x, y: p.y })),
          type: 'scatter',
          backgroundColor: ar.color + '40',
          borderColor: ar.color,
          borderWidth: 1.5, pointStyle: 'circle',
          pointRadius: 7, pointHoverRadius: 9,
          order: 0, z: 10,
        });
      });

      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

      // ── Axis ranges ────────────────────────────────────────
      const hasTop = bnd ? bnd.hasTop : (isDE ? 16 : 10);
      const yMax   = hasTop + 2;
      const xMax   = Math.ceil(maxX * 1.05 / 50) * 50;

      chartRef.current = new Chart(canvasRef.current, {
        type: 'scatter',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'point' },
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                generateLabels: (chart) => {
                const seen = new Set();
                return chart.data.datasets
                  .filter(ds => ds.label && ds.type === 'scatter')
                  .reduce((acc, ds) => {
                    const key = ds.label.replace(/ [\u2713\u2717?]$/, '').trim();
                    if (seen.has(key)) return acc;
                    seen.add(key);
                    acc.push({ text: key, fillStyle: ds.backgroundColor,
                      strokeStyle: ds.borderColor, lineWidth: ds.borderWidth,
                      pointStyle: 'circle', hidden: false });
                    return acc;
                  }, []);
              },

                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                padding: 14,
                usePointStyle: true,
                pointStyleWidth: 10,
              },
            },
            tooltip: {
              filter: (item) => item.dataset.type === 'scatter',
              callbacks: {
                label(ctx) {
                  const areaName = (ctx.dataset.label||'').replace(/ [✓✗?]$/, '');
                  const symbol = ctx.dataset.pointStyle === 'rectRot' ? 'Abaixo' : 'Acima';
                  return `${areaName} · ${symbol} | Prod: ${ctx.parsed.x.toFixed(1)} pts | HAS: ${ctx.parsed.y.toFixed(2)} h/sem`;
                },
              },
              backgroundColor: '#1a1a18',
              bodyFont: { family: "'IBM Plex Mono', monospace", size: 12 },
              padding: 10,
              displayColors: false,
            },
          },
          scales: {
            x: {
              type: 'linear',
              min: 0,
              max: xMax,
              title: {
                display: true,
                text: 'Pontuação — produção sem aulas (pts)',
                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                color: '#6b6860',
                padding: { top: 8 },
              },
              ticks: {
                font: { family: "'IBM Plex Mono', monospace", size: 10 },
                maxTicksLimit: 10,
                callback: v => {
                  if (!bnd) return v;
                  if (Math.abs(v - bnd.kneeLeft) < (xMax*0.025)) return Math.round(bnd.kneeLeft);
                  if (Math.abs(v - bnd.kneeRight) < (xMax*0.025)) return Math.round(bnd.kneeRight);
                  return v;
                },
              },
              grid: { color: '#ebe9e4' },
            },
            y: {
              type: 'linear',
              min: 0,
              max: yMax,
              title: {
                display: true,
                text: 'H-A — horas-aula semanais',
                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                color: '#6b6860',
                padding: { bottom: 8 },
              },
              ticks: {
                stepSize: 2,
                font: { family: "'IBM Plex Mono', monospace", size: 10 },
                callback: v => v % 2 === 0 ? `${v}h` : '',
              },
              grid: { color: '#ebe9e4' },
            },
          },
        },
      });

      return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
    }, [buildData]);

    // ── Always-on 20H chart for report capture ────────────────
    useEffect(() => {
      if (!canvas20Ref.current) return;
      const _has20H = evaluations.some(ev => ev.regime === '20H');
      if (!threshold20 || !_has20H) {
        if (chart20Ref.current) { chart20Ref.current.destroy(); chart20Ref.current = null; }
        return;
      }
      const T20 = threshold20;
      const pts20 = evaluations
        .filter(ev => ev.regime === '20H')
        .map(ev => {
          const has  = Math.round((ev.scores.ENS_TOTAL/10)*100)/100;
          const prod = Math.round((ev.scores.PROJ_ENS+ev.scores.PRI+ev.scores.PSQ+
            ev.scores.EXT+ev.scores.ADM+ev.scores.RPT+ev.scores.OTR)*100)/100;
          return { x:prod, y:has, status:approvalStatus(prod,has,T20,false), area:ev.area };
        });
      const bnd20 = getBoundary(T20, false);
      const xVals20 = pts20.map(p=>p.x).filter(v=>v>0);
      const maxX20 = xVals20.length ? Math.max(...xVals20, bnd20?bnd20.kneeRight*1.6:300, 80) : (bnd20?bnd20.kneeRight*1.8:300);
      const xMax20 = Math.ceil(maxX20*1.05/50)*50;
      const ds20 = [];
      if (bnd20) ds20.push({ label:'Fronteira', type:'line', order:2,
        data:[{x:0,y:bnd20.hasTop},{x:bnd20.kneeLeft,y:bnd20.hasTop},
              {x:bnd20.kneeRight,y:bnd20.hasBot},{x:maxX20,y:bnd20.hasBot}],
        borderColor:'#1a4b8c', borderWidth:2.5, pointRadius:0, fill:false, tension:0 });
      [...AREAS, {id:AREA_ALL, label:'Sem área', color:'#888'}].forEach(ar => {
        const apv = pts20.filter(p=>p.area===ar.id && p.status==='above');
        const rep = pts20.filter(p=>p.area===ar.id && p.status==='below');
        if (apv.length) ds20.push({ label:ar.label+' ✓', type:'scatter', order:0,
          data:apv.map(p=>({x:p.x,y:p.y})), backgroundColor:ar.color+'cc', borderColor:ar.color,
          borderWidth:2, pointStyle:'circle', pointRadius:9, pointHoverRadius:11 });
        if (rep.length) ds20.push({ label:ar.label+' ✗', type:'scatter', order:0,
          data:rep.map(p=>({x:p.x,y:p.y})), backgroundColor:ar.color+'cc', borderColor:ar.color,
          borderWidth:2, pointStyle:'circle', pointRadius:9, pointHoverRadius:11 });
      });
      if (chart20Ref.current) { chart20Ref.current.destroy(); chart20Ref.current = null; }
      chart20Ref.current = new Chart(canvas20Ref.current, {
        type:'scatter', data:{datasets:ds20},
        options:{ responsive:false, maintainAspectRatio:false,
          plugins:{
            legend:{position:'bottom',labels:{
              generateLabels:(ch)=>{ const seen=new Set();
                return Chart.defaults.plugins.legend.labels.generateLabels(ch)
                  .filter(i=>{ const k=(i.text||'').replace(/ [✓✗?]$/,'').trim();
                    if(seen.has(k))return false; seen.add(k); return true; });
              }, font:{size:10}, padding:8 }},
            tooltip:{callbacks:{label:ctx=>{
              const a=(ctx.dataset.label||'').replace(/ [✓✗?]$/,'');
              return a+' | Prod:'+ctx.parsed.x.toFixed(1)+' | HAS:'+ctx.parsed.y.toFixed(2)+'h';
            }}}
          },
          scales:{
            x:{type:'linear',min:0,max:xMax20,
              title:{display:true,text:'Produção (pts)',font:{size:10},color:'#6b6860'},
              ticks:{font:{size:9}},grid:{color:'#ebe9e4'}},
            y:{type:'linear',min:0,max:12,
              title:{display:true,text:'H-A (h/sem)',font:{size:10},color:'#6b6860'},
              ticks:{stepSize:2,font:{size:9},callback:v=>v%2===0?v+'h':''},
              grid:{color:'#ebe9e4'}},
          },
        },
      });
      return () => { if(chart20Ref.current){chart20Ref.current.destroy();chart20Ref.current=null;} };
    }, [evaluations, threshold20]);

    // ── Stats ──────────────────────────────────────────────────
    const { pts, T, bnd, isDE } = buildData();
    const above   = pts.filter(p => p.status === 'above').length;
    const below   = pts.filter(p => p.status === 'below').length;
    const total   = pts.length;
    const prods   = pts.map(p => p.x).sort((a,b) => a-b);
    const hasArr  = pts.map(p => p.y).sort((a,b) => a-b);
    const avgProd = prods.length ? prods.reduce((s,v)=>s+v,0)/prods.length : 0;
    const medProd = prods.length
      ? (prods.length%2===0 ? (prods[prods.length/2-1]+prods[prods.length/2])/2 : prods[Math.floor(prods.length/2)]) : 0;
    const avgHAS  = hasArr.length ? hasArr.reduce((s,v)=>s+v,0)/hasArr.length : 0;

    const hasDE  = evaluations.some(ev => ev.regime !== '20H');
    const has20H = evaluations.some(ev => ev.regime === '20H');
    if (!hasDE && !has20H) return null;

    return e('div', { className:'analysis-section' },
      e('h2', null, 'Análise da Unidade — H-A × Pontuação de Produção'),
      e('p', { className:'subtitle' },
        'Pontos não identificados individualmente. A fronteira segue o mesmo modelo da Ata CD 28/02/2020.'
      ),

      // Regime toggle
      e('div', { className:'regime-toggle' },
        hasDE  && e('button', { key:'DE',  className:`regime-btn ${regime==='DE' ?'active':''}`, onClick:()=>setRegime('DE')  }, 'DE / 40H'),
        has20H && e('button', { key:'20H', className:`regime-btn ${regime==='20H'?'active':''}`, onClick:()=>setRegime('20H') }, '20 Horas'),
      ),

      // Área filter
      e('div', { className:'regime-toggle', style:{ marginBottom:12 } },
        [{ id: AREA_ALL, label: 'Todas as áreas', color: '#1a4b8c' }, ...AREAS].map(ar => {
          const countInRegime = evaluations
            .filter(ev => (ar.id === AREA_ALL ? true : ev.area === ar.id))
            .filter(ev => regime === 'DE' ? ev.regime !== '20H' : ev.regime === '20H')
            .length;
          if (ar.id !== AREA_ALL && countInRegime === 0) return null;
          const isActive = areaFilter === ar.id;
          return e('button', {
            key: ar.id,
            className: 'regime-btn' + (isActive ? ' active' : ''),
            style: isActive ? { background: ar.color, borderColor: ar.color, color: '#fff' } : {},
            onClick: () => setAreaFilter(ar.id),
          }, ar.label, countInRegime > 0 ? e('span', { style:{ marginLeft:4, opacity:0.75 } }, `(${countInRegime})`) : null);
        })
      ),

      e('div', { className:'chart-grid' },

        // ── Chart box ──
        e('div', { className:'chart-box', style:{ height:420 } },
          e('canvas', { ref:canvasRef, id:'chart-scatter-de' }),
        e('canvas', {
          ref: canvas20Ref, id:'chart-scatter-20h',
          width:900, height:400,
          style:{ position:'absolute', left:'-9999px', top:'-9999px', width:'900px', height:'400px' },
        }),
          e('p', { className:'chart-note' },
            T && T > 0
              ? `T (Xm) = ${T} pts  ·  Reta: ${isDE
                  ? `(${(1.05*T*8/12).toFixed(0)}, 16h) → (${(1.05*T*16/12).toFixed(0)}, 8h)`
                  : `(${(0.8*T).toFixed(0)}, ${isDE?16:10}h) → (${(1.2*T).toFixed(0)}, 8h)`}`
              : `⚠ Defina o valor médio de referência (Xm) ${regime==='DE'?'DE/40H':'20H'} para exibir a fronteira`
          ),
        ),

        // ── Stats panel ──
        e('div', { className:'stats-panel' },
          e('h3', null, `Estatísticas — ${regime}`),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Professores'),
            e('span', { className:'stat-value blue' }, total),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, '✓ Acima da reta'),
            e('span', { className:'stat-value green' }, T>0 ? `${above} (${total?Math.round(above/total*100):0}%)` : '—'),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, '✗ Abaixo da reta'),
            e('span', { className:'stat-value red' }, T>0 ? `${below} (${total?Math.round(below/total*100):0}%)` : '—'),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Prod. média'),
            e('span', { className:'stat-value' }, avgProd.toFixed(1)),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Prod. mediana'),
            e('span', { className:'stat-value' }, medProd.toFixed(1)),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'HAS média'),
            e('span', { className:'stat-value' }, avgHAS.toFixed(2)),
          ),
          T>0 && bnd && e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Joelho esquerdo'),

          ),
          T>0 && bnd && e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Joelho direito'),
            e('span', { className:'stat-value blue' }, `${bnd.kneeRight.toFixed(0)} pts`),

          e('h3', { style:{ marginTop:16 } }, 'Legenda'),

  // ============================================================
  // DASHBOARD DE GESTÃO — gráficos e KPIs para o gestor
  // ============================================================

  // ============================================================
  // MAPA DE CALOR — Categoria × Área
  // ============================================================
  function HeatmapChart({ evaluations }) {
    const cats = [
      { key:'ENS_TOTAL', label:'Ensino'        },
      { key:'PROJ_ENS',  label:'Proj.Ensino'   },
      { key:'PRI',       label:'Prod.Intelectual' },
      { key:'PSQ',       label:'Pesquisa'      },
      { key:'EXT',       label:'Extensão'      },
      { key:'ADM',       label:'Admin.'        },
      { key:'RPT',       label:'Representação' },
      { key:'OTR',       label:'Outras'        },
    ];

    // Memoize heavy computations: area × category matrix + min/max
    const data = useMemo(() => AREAS.map(ar => {
      const evs = evaluations.filter(ev => ev.area === ar.id);
      if (!evs.length) return null;
      const vals = cats.map(c => ({
        cat: c.key,
        avg: Math.round(evs.map(ev => ev.scores[c.key]).reduce((s,v)=>s+v,0) / evs.length * 10) / 10,
        n:   evs.length,
      }));
      return { area: ar, vals };
    }).filter(Boolean), [evaluations]);

    if (!data.length) return null;

    const catMinMax = useMemo(() => cats.map(c => {
      const all = data.map(r => r.vals.find(v=>v.cat===c.key)?.avg ?? 0);
      return { key: c.key, min: Math.min(...all), max: Math.max(...all) };
    }), [data]);

    // Colour: green (high) → yellow → red (low)
    // t=0 → worst (#c0392b), t=1 → best (#27ae60), t=0.5 → #f39c12
    function heatColor(t) {
      if (isNaN(t) || t === null) return '#f0f0f0';
      // red→yellow→green
      const r = t < 0.5 ? 192 : Math.round(192 - (t-0.5)*2*(192-39));
      const g = t < 0.5 ? Math.round(t*2*174)  : 174;
      const b = t < 0.5 ? 43  : Math.round(43  + (t-0.5)*2*(96-43));
      return `rgb(${r},${g},${b})`;
    }

    function textColor(t) { return t < 0.45 ? '#fff' : '#1a1a18'; }

    // Also compute "unidade" average per category for the reference row
    const unidadeRow = cats.map(c => ({
      cat: c.key,
      avg: Math.round(evaluations.map(ev=>ev.scores[c.key]).reduce((s,v)=>s+v,0)/evaluations.length*10)/10,
    }));

    if (evaluations.length === 0 || !data.length) return null;
    return e('div', { className:'analysis-section' },
      e('h2', null, 'Mapa de Calor — Produção por Categoria e Área'),
      e('p', { className:'subtitle' },
        'Médias de pontuação por categoria de atividade, agrupadas por área. Verde = acima da média da unidade · Vermelho = abaixo.'
      ),
      e('div', { className:'heatmap-wrap' },
        e('table', { className:'heatmap-table' },
          // Header
          e('thead', null,
            e('tr', null,
              e('th', { className:'row-label' }, 'Área'),
              e('th', null, 'Prof.'),
              ...cats.map(c => e('th', { key:c.key }, c.label)),
            )
          ),
          e('tbody', null,
            // Data rows — one per area
            ...data.map(row =>
              e('tr', { key: row.area.id },
                e('td', { style:{ padding:'4px 6px', fontWeight:600, fontSize:12,
                    color: row.area.color, whiteSpace:'nowrap' } },
                  row.area.label
                ),
                e('td', { style:{ textAlign:'center', fontFamily:"'IBM Plex Mono',monospace",
                    fontSize:11, padding:'4px' } },
                  row.n
                ),
                ...cats.map(c => {
                  const v = row.vals.find(x=>x.cat===c.key);
                  const mm = catMinMax.find(x=>x.key===c.key);
                  const range = mm.max - mm.min;
                  const t = range > 0 ? (v.avg - mm.min) / range : 0.5;
                  const bg = heatColor(t);
                  const fg = textColor(t);
                  // Reference vs unidade
                  const uniAvg = unidadeRow.find(x=>x.cat===c.key)?.avg ?? 0;
                  const diff = v.avg - uniAvg;
                  const diffStr = diff >= 0 ? '+'+diff.toFixed(0) : diff.toFixed(0);
                  return e('td', { key:c.key },
                    e('div', {
                      className:'hm-cell',
                      style:{ background: bg, color: fg },
                      title:`${row.area.label} · ${c.label}: ${v.avg} pts (${diffStr} vs média unidade)`
                    },
                      v.avg,
                      e('span', { className:'hm-label' }, diffStr + ' pts')
                    )
                  );
                })
              )
            ),
            // Footer: unidade average row
            e('tr', { style:{ borderTop:'2px solid var(--border)' } },
              e('td', { style:{ padding:'4px 6px', fontWeight:700, fontSize:11,
                  color:'var(--text-secondary)', fontStyle:'italic' } },
                'Média Unidade'
              ),
              e('td', { style:{ textAlign:'center', fontFamily:"'IBM Plex Mono',monospace",
                  fontSize:11 } },
                evaluations.length
              ),
              ...cats.map(c => {
                const v = unidadeRow.find(x=>x.cat===c.key);
                return e('td', { key:c.key },
                  e('div', {
                    className:'hm-cell',
                    style:{ background:'#e8eef6', color:'#1a4b8c', fontStyle:'italic' }
                  }, v?.avg ?? '—')
                );
              })
            )
          )
        )
      ),
      // Legend
      e('div', { className:'hm-legend' },
        e('span', null, 'Legenda:'),
        e('div', { className:'hm-legend-bar' },
          ...Array.from({length:20},(_,i)=>
            e('div', { key:i, style:{
              flex:1,
              background: heatColor(i/19),
            }})
          )
        ),
        e('span', null, '← Abaixo da média'),
        e('span', null, 'Acima da média →'),
        e('span', { style:{marginLeft:12, color:'var(--text-secondary)' } },
          'Valor = média da área · Subtítulo = diferença em relação à média da unidade'
        ),
      ),
    );
  }

  function DashboardCharts({ evaluations, thresholdDE, threshold20, reportArea, setReportArea, reportLoading, generateReport }) {
    const barAreaRef    = useRef(null);
    const stackedRef    = useRef(null);
    const hbarRef       = useRef(null);
    const histRef       = useRef(null);
    const barAreaChart  = useRef(null);
    const stackedChart  = useRef(null);
    const hbarChart     = useRef(null);
    const histChart     = useRef(null);

    // ── helpers ──────────────────────────────────────────────────
    function getProd(ev) {
      return Math.round((ev.scores.PROJ_ENS + ev.scores.PRI + ev.scores.PSQ +
        ev.scores.EXT + ev.scores.ADM + ev.scores.RPT + ev.scores.OTR) * 100) / 100;
    }
    function getHAS(ev) {
      return Math.round((ev.scores.ENS_TOTAL / 10) * 100) / 100;
    }
    function getStatus(ev) {
      return calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20).status;
    }
    function isApproved(ev) { return getStatus(ev).startsWith('APROVADO'); }

    const areaLabels = useMemo(() => AREAS.map(a => a.label), []);
    const areaIds    = useMemo(() => AREAS.map(a => a.id),    []);
    const areaColors = useMemo(() => AREAS.map(a => a.color), []);

    // ── KPIs ─────────────────────────────────────────────────────
    const total      = evaluations.length;
    const approved   = evaluations.filter(isApproved).length;
    const notMet     = total - approved;
    const pctAprov   = total ? Math.round(approved / total * 100) : 0;
    const allProd    = evaluations.map(getProd);
    const avgProd    = allProd.length ? Math.round(allProd.reduce((s,v)=>s+v,0)/allProd.length) : 0;
    const medianProd = (() => {
      const s = [...allProd].sort((a,b)=>a-b);
      return s.length ? (s.length%2===0 ? Math.round((s[s.length/2-1]+s[s.length/2])/2) : s[Math.floor(s.length/2)]) : 0;
    })();
    const allHAS     = evaluations.map(getHAS);
    const avgHAS     = allHAS.length ? Math.round(allHAS.reduce((s,v)=>s+v,0)/allHAS.length*10)/10 : 0;
    const capHitters = evaluations.filter(ev => ev.scores.TOTAL < ev.scores.TOTAL_RAW).length;
    const avgCapPct  = (() => {
      const vs = evaluations.filter(ev=>ev.scores.TOTAL_RAW>0)
        .map(ev=>ev.scores.TOTAL/ev.scores.TOTAL_RAW*100);
      return vs.length ? Math.round(vs.reduce((s,v)=>s+v,0)/vs.length) : 100;
    })();

    const kpis = [
      { label:'Professores',      value: total,        sub:'no filtro atual',      color:'#1a4b8c' },
      { label:'Meta Atingida',    value: approved,     sub:`${pctAprov}% do total`, color:'#2d7a3a' },
      { label:'Meta não Atingida',value: notMet,       sub:`${100-pctAprov}% do total`, color:'#b33a3a' },
      { label:'Prod. Média',      value: avgProd,      sub:'pontos (s/ aulas)',    color:'#7a3b8c' },
      { label:'Prod. Mediana',    value: medianProd,   sub:'pontos (s/ aulas)',    color:'#5a3b8c' },
      { label:'HAS Médio',        value: avgHAS+'h',   sub:'horas-aula/semana',    color:'#b36b1a' },
      { label:'c/ Teto Aplicado', value: capHitters,   sub:`média ${avgCapPct}% do RADOC`, color:'#8c3b3b' },
    ];

    // ── chart builder util ───────────────────────────────────────
    function buildChart(ref, chartRef, config) {
      if (!ref.current) return;
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
      chartRef.current = new Chart(ref.current, config);
    }

    // ── Chart 1: Produção média por área (bar + threshold line) ──
    useEffect(() => {
      const areaData = areaIds.map(id => {
        const evs = dashEvs.filter(ev => ev.area === id);
        if (!evs.length) return null;
        return Math.round(evs.map(getProd).reduce((s,v)=>s+v,0) / evs.length);
      });
      const hasArea = areaData.some(v => v !== null);
      if (!hasArea) { buildChart(barAreaRef, barAreaChart, {
        type:'bar', data:{ labels:['Sem dados por área'], datasets:[{data:[0]}] },
        options:{ plugins:{ legend:{display:false} } }
      }); return; }

      const T = thresholdDE > 0 ? thresholdDE : threshold20;
      buildChart(barAreaRef, barAreaChart, {
        type: 'bar',
        data: {
          labels: areaLabels,
          datasets: [
            {
              label: 'Produção Média',
              data: areaData,
              backgroundColor: areaColors.map(c => c + 'cc'),
              borderColor: areaColors,
              borderWidth: 2,
              borderRadius: 4,
            },
            T > 0 ? {
              label: 'Limiar Xm (1,05×T)',
              data: areaLabels.map(() => Math.round(1.05 * T)),
              type: 'line',
              borderColor: '#1a4b8c',
              borderWidth: 2,
              borderDash: [6,3],
              pointRadius: 0,
              fill: false,
            } : null,
          ].filter(Boolean),
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position:'bottom', labels:{ font:{ size:11 }, padding:10 } },
            tooltip: { callbacks: { label: ctx => ' ' + (ctx.parsed.y ?? '—') + ' pts' } },
          },
          scales: {
            x: { ticks:{ font:{ size:10 } }, grid:{ display:false } },
            y: { beginAtZero:true, ticks:{ font:{ size:10 }, callback: v => v+' pts' }, grid:{ color:'#ebe9e4' } },
          },
        },
      });
    }, [dashEvs, thresholdDE, threshold20]);

    // ── Chart 2: Composição das atividades por área (stacked bar) ─
    useEffect(() => {
      const catKeys  = ['ENS_TOTAL','PROJ_ENS','PRI','PSQ','EXT','ADM','RPT','OTR'];
      const catLabels= ['Ensino','Proj.Ensino','Prod.Intel.','Pesquisa','Extensão','Admin.','Repres.','Outras'];
      const catColors= ['#1a4b8c','#3b7ab8','#7a3b8c','#2d7a3a','#b36b1a','#8c3b3b','#3b6b8c','#5a5a5a'];

      const datasets = catKeys.map((key, i) => ({
        label: catLabels[i],
        data: areaIds.map(id => {
          const evs = dashEvs.filter(ev => ev.area === id);
          if (!evs.length) return 0;
          return Math.round(evs.map(ev=>ev.scores[key]).reduce((s,v)=>s+v,0) / evs.length);
        }),
        backgroundColor: catColors[i] + 'dd',
        borderWidth: 0,
        borderRadius: 2,
      }));

      buildChart(stackedRef, stackedChart, {
        type: 'bar',
        data: { labels: areaLabels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position:'bottom', labels:{ font:{size:10}, padding:8, boxWidth:12 } },
            tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} pts` } },
          },
          scales: {
            x: { stacked:true, ticks:{ font:{size:10} }, grid:{display:false} },
            y: { stacked:true, beginAtZero:true, ticks:{ font:{size:10}, callback: v=>v+'pts' }, grid:{color:'#ebe9e4'} },
          },
        },
      });
    }, [dashEvs]);

    // ── Chart 3: Taxa de aprovação por área (horizontal bar) ──────
    useEffect(() => {
      const labels   = [...areaLabels, 'Sem área'];
      const allAreaIds = [...areaIds, AREA_ALL];
      const data = allAreaIds.map(id => {
        const evs = dashEvs.filter(ev => id === AREA_ALL ? ev.area === AREA_ALL : ev.area === id);
        if (!evs.length) return null;
        return Math.round(evs.filter(isApproved).length / evs.length * 100);
      });
      const colors = [...areaColors, '#888'].map((c,i) =>
        data[i] === null ? 'transparent' : data[i] >= 75 ? '#2d7a3a' : data[i] >= 50 ? '#b36b1a' : '#b33a3a'
      );

      buildChart(hbarRef, hbarChart, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: '% Meta Atingida',
            data,
            backgroundColor: colors.map(c => c + 'cc'),
            borderColor: colors,
            borderWidth: 2,
            borderRadius: 4,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display:false },
            tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x ?? '—'}% com meta atingida` } },
          },
          scales: {
            x: {
              min: 0, max: 100,
              ticks: { callback: v => v+'%', font:{size:10} },
              grid: { color:'#ebe9e4' },
            },
            y: { ticks:{ font:{size:10} }, grid:{display:false} },
          },
        },
      });
    }, [dashEvs, thresholdDE, threshold20]);

    // ── Chart 4: Histograma de produção ────────────────────────────
    useEffect(() => {
      const T = thresholdDE > 0 ? thresholdDE : threshold20;
      const bins = [0,100,200,300,400,500,600,800,1000,Infinity];
      const binLabels = ['0-100','100-200','200-300','300-400','400-500','500-600','600-800','800-1k','1k+'];
      const counts = Array(bins.length-1).fill(0);
      dashEvs.forEach(ev => {
        const p = getProd(ev);
        for (let i=0; i<bins.length-1; i++) {
          if (p >= bins[i] && p < bins[i+1]) { counts[i]++; break; }
        }
      });
      // Find threshold bin
      const threshBin = T > 0 ? bins.findIndex((b,i) => T >= b && T < bins[i+1]) : -1;

      buildChart(histRef, histChart, {
        type: 'bar',
        data: {
          labels: binLabels,
          datasets: [{
            label: 'Professores',
            data: counts,
            backgroundColor: counts.map((_,i) =>
              i < threshBin ? '#b33a3acc' : '#2d7a3acc'
            ),
            borderColor: counts.map((_,i) =>
              i < threshBin ? '#b33a3a' : '#2d7a3a'
            ),
            borderWidth: 2,
            borderRadius: 3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display:false },
            tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} professor(es)` } },
          },
          scales: {
            x: { ticks:{ font:{size:10} }, grid:{display:false} },
            y: { beginAtZero:true, ticks:{ stepSize:1, font:{size:10} }, grid:{color:'#ebe9e4'} },
          },
        },
      });
    }, [dashEvs, thresholdDE, threshold20]);

    if (evaluations.length === 0) return null;
    return e('div', { className:'dashboard-section' },
      e('h2', null, 'Dashboard da Unidade'),
      e('p', { className:'subtitle' }, 'Indicadores para gestão e distribuição de esforço acadêmico.'),

      // Regime filter
      e('div', { className:'regime-toggle', style:{ marginBottom:12 } },
        e('button', {
          className:'regime-btn' + (dashRegime==='all'?' active':''),
          onClick: () => setDashRegime('all'),
        }, 'Todos (' + evaluations.length + ')'),
        hasDE_d && e('button', {
          className:'regime-btn' + (dashRegime==='DE'?' active':''),
          onClick: () => setDashRegime('DE'),
        }, 'DE/40H (' + evaluations.filter(ev=>ev.regime!=='20H').length + ')'),
        has20H_d && e('button', {
          className:'regime-btn' + (dashRegime==='20H'?' active':''),
          onClick: () => setDashRegime('20H'),
        }, '20H (' + evaluations.filter(ev=>ev.regime==='20H').length + ')'),
      ),

      // KPI cards
      e('div', { className:'kpi-grid' },
        kpis.map((k,i) =>
          e('div', { key:i, className:'kpi-card', style:{ '--kpi-color': k.color } },
            e('div', { className:'kpi-label' }, k.label),
            e('div', { className:'kpi-value' }, k.value),
            e('div', { className:'kpi-sub' }, k.sub),
          )
        )
      ),

      // Row 1: barra por área + composição empilhada
      e('div', { className:'dash-charts-grid' },
        e('div', { className:'dash-chart-box' },
          e('h3', null, 'Produção média por área'),
          e('p', null, 'Média de pontos de produção (sem aulas) por área, com linha do limiar Xm'),
          e('div', { style:{ height:260, position:'relative' } },
            e('canvas', { ref:barAreaRef, id:'chart-bar-area' })
          ),
        ),
        e('div', { className:'dash-chart-box' },
          e('h3', null, 'Composição das atividades por área'),
          e('p', null, 'Média de pontos por categoria de atividade, empilhada por área'),
          e('div', { style:{ height:260, position:'relative' } },
            e('canvas', { ref:stackedRef, id:'chart-stacked' })
          ),
        ),
      ),

      // Row 2: aprovação por área + histograma
      e('div', { className:'dash-charts-grid' },
        e('div', { className:'dash-chart-box' },
          e('h3', null, 'Taxa de meta atingida por área'),
          e('p', null, 'Verde ≥75% · Laranja ≥50% · Vermelho <50%'),
          e('div', { style:{ height:220, position:'relative' } },
            e('canvas', { ref:hbarRef,    id:'chart-hbar' })
          ),
        ),
        e('div', { className:'dash-chart-box' },
          e('h3', null, 'Distribuição da produção'),
          e('p', null, 'Número de professores por faixa de produção · Vermelho = abaixo do limiar Xm'),
          e('div', { style:{ height:220, position:'relative' } },
            e('canvas', { ref:histRef,    id:'chart-hist' })
          ),
        ),
      ),

    );
  }

  function SummaryTable() {
    if (evaluations.length === 0) return null;

    const approvalMap = useMemo(() => {
      const m = new Map();
      evaluations.forEach(ev =>
        m.set(ev.id, calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20)));
      return m;
    }, [evaluations, thresholdDE, threshold20]);

    const areaMap = useMemo(() => {
      const m = {};
      AREAS.forEach(a => { m[a.id] = a; });
      m[AREA_ALL] = { label: '—', color: '#888' };
      return m;
    }, []);

    const cols = [
      { key:'ENS_GRAD',  label:'I-Ens\n(GRAD)' },
      { key:'ENS_TOTAL', label:'I-Ens\n(Total)' },
      { key:'PROJ_ENS',  label:'I-Proj.\nEnsino' },
      { key:'PRI',       label:'II-Prod.\nIntelectual' },
      { key:'PSQ',       label:'III-1\nPesquisa' },
      { key:'EXT',       label:'III-2\nExtensão' },
      { key:'ADM',       label:'IV(1-3)\nAdmin.' },
      { key:'RPT',       label:'IV(4)\nRepres.' },
      { key:'OTR',       label:'V-Outras\nAtiv.' },
      { key:'TOTAL_RAW', label:'Total\nRADOC' },
      { key:'TOTAL',     label:'Total\n(c/ Teto)' },
    ];

    // ── Helper: HAS necessário dado prod e T (DE/40H)
    // Fórmula: SE(prod <= (8/12)*(1,05*T); 16;
    //           SE(prod >  (16/12)*(1,05*T); 8;
    //              24 - 12*prod/(1,05*T)))
    function hasNecessario(prod, T) {
      if (!T || T <= 0) return null;
      const Tm = 1.05 * T;
      if (prod <= (8 / 12) * Tm)  return 16;
      if (prod >  (16 / 12) * Tm) return 8;
      return 24 - (12 * prod) / Tm;
    }

    // ── Helper: Produção necessária dado HAS e T (DE/40H)
    // Fórmula: SE(HAS < 8; "--------";
    //           SE(HAS >= 16; 0;
    //              TETO((1,05*T)*(24-HAS)/12; 1)))
    function prodNecessaria(has, T) {
      if (!T || T <= 0) return null;
      if (has < 8)  return '————';
      if (has >= 16) return 0;
      return Math.ceil((1.05 * T) * (24 - has) / 12);
    }

    // ── Equivalentes para 20H ─────────────────────────────────
    // kneeLeft: prod=(0,8*T)→has=10 | kneeRight: prod=(1,2*T)→has=8
    function hasNecessario20(prod, T) {
      if (!T || T <= 0) return null;
      if (prod <= 0.8 * T)  return 10;
      if (prod >  1.2 * T)  return 8;
      // Linear: has = 14 - prod/(0,2*T)
      return 14 - prod / (0.2 * T);
    }

    function prodNecessaria20(has, T) {
      if (!T || T <= 0) return null;
      if (has < 8)  return '————';
      if (has >= 10) return 0;
      return Math.ceil(0.2 * T * (14 - has));
    }

    // Filter evaluations by selected area
    const filteredEvs = areaFilter === AREA_ALL
      ? evaluations
      : evaluations.filter(ev => ev.area === areaFilter);

    const areaInfo = (id) => id === AREA_ALL
      ? { label: 'Todos', color: '#1a4b8c' }
      : AREAS.find(a => a.id === id) || { label: id, color: '#555' };

    return e('div', { className:'summary-section' },
      // Área filter pills
      e('div', { style:{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:14 } },
        [{ id: AREA_ALL, label: 'Todos', color: '#1a4b8c' }, ...AREAS].map(ar =>
          e('button', {
            key: ar.id,
            className: 'regime-btn' + (areaFilter === ar.id ? ' active' : ''),
            style: areaFilter === ar.id ? { background: ar.color, borderColor: ar.color, color: '#fff' } : {},
            onClick: () => setAreaFilter(ar.id),
          },
            ar.label,
            evaluations.filter(ev => ar.id === AREA_ALL ? true : ev.area === ar.id).length > 0
              ? e('span', { style:{ marginLeft:4, opacity:0.75 } },
                  `(${evaluations.filter(ev => ar.id === AREA_ALL ? true : ev.area === ar.id).length})`)
              : null
          )
        )
      ),
      e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 } },
        e('h2', null,
          'Resultado Final — Com Tetos Aplicados',
          areaFilter !== AREA_ALL
            ? e('span', { style:{ fontSize:13, fontWeight:400, marginLeft:8, color: areaInfo(areaFilter).color } },
                `· ${areaInfo(areaFilter).label}`)
            : null
        ),
        e('button', { className:'btn btn-sm', onClick:()=>exportCSV(filteredEvs,thresholdDE,threshold20) }, '⬇ Exportar CSV'),
      ),
      e('div', { style:{ overflowX:'auto' } },
        e('table', { className:'summary-table' },
          e('thead', null, e('tr', null,
            e('th', { style:{ textAlign:'left', minWidth:160 } }, 'Nome'),
            e('th', null, 'Área'),
            e('th', null, 'Regime'),
            ...cols.map(c => e('th', { key:c.key, className:c.key==='TOTAL'?'total-col':'', style:{ whiteSpace:'pre-line' } }, c.label)),
            e('th', { style:{ whiteSpace:'pre-line' } }, 'Prod\n(s/ aulas)'),
            e('th', null, 'HAS'),
            e('th', {
              style:{ minWidth:55, whiteSpace:'pre-line' },
              title:'Percentual do Total com Teto em relação ao Total RADOC (sem teto). Valores abaixo de 100% indicam que tetos foram aplicados.'
            }, '% Teto\n/RADOC'),
            e('th', { style:{ minWidth:140 } }, 'Resultado'),
            e('th', {
              style:{ minWidth:90, whiteSpace:'pre-line', background:'#e8eef6', color:'#1a4b8c', borderLeft:'2px solid #93aad4' },
              title:'Horas-aula semanais mínimas que o professor deveria ter ministrado, dado o nível de produção',
            }, 'HAS\nnecessário'),
            e('th', {
              style:{ minWidth:110, whiteSpace:'pre-line', background:'#e8eef6', color:'#1a4b8c' },
              title:'Pontuação de produção mínima que o professor deveria ter obtido, dado o número de horas-aula',
            }, 'Produção\nnecessária'),
          )),
          e('tbody', null,
            [...filteredEvs].sort((a,b)=>a.name.localeCompare(b.name)).map(ev => {
              const isDE   = ev.regime !== '20H';
              const T      = isDE ? thresholdDE : threshold20;
              const approval = approvalMap.get(ev.id);
              const isApproved  = approval.status.startsWith('APROVADO');
              const isReprovado = approval.status.startsWith('REPROVADO');

              // New columns
              const hasNeeded  = isDE
                ? hasNecessario(approval.prod, T)
                : hasNecessario20(approval.prod, T);
              const prodNeeded = isDE
                ? prodNecessaria(approval.has, T)
                : prodNecessaria20(approval.has, T);

              // Format HAS needed
              const hasNeededFmt = hasNeeded === null   ? '—'
                : typeof hasNeeded === 'string'          ? hasNeeded
                : hasNeeded % 1 === 0                    ? `${hasNeeded}h`
                : `${hasNeeded.toFixed(1)}h`;

              // Format prod needed
              const prodNeededFmt = prodNeeded === null     ? '—'
                : typeof prodNeeded === 'string'             ? prodNeeded
                : `${prodNeeded}`;

              // Color cues for the two new cells
              const hasStyle = {
                textAlign:'center',
                fontFamily:"'IBM Plex Mono',monospace",
                fontSize:12,
                fontWeight:600,
                borderLeft:'2px solid #93aad4',
                background: isApproved ? 'transparent'
                  : (hasNeeded !== null && typeof hasNeeded !== 'string' && hasNeeded > approval.has + 0.05)
                    ? '#fff8e8' : 'transparent',
                color: isApproved ? 'var(--green)'
                  : (hasNeeded !== null && typeof hasNeeded !== 'string' && hasNeeded > approval.has + 0.05)
                    ? 'var(--orange)' : 'var(--text)',
              };

              const prodStyle = {
                textAlign:'center',
                fontFamily:"'IBM Plex Mono',monospace",
                fontSize:12,
                fontWeight:600,
                background: isApproved ? 'transparent'
                  : (typeof prodNeeded === 'number' && prodNeeded > approval.prod + 0.5)
                    ? '#fff8e8' : 'transparent',
                color: isApproved ? 'var(--green)'
                  : (typeof prodNeeded === 'number' && prodNeeded > approval.prod + 0.5)
                    ? 'var(--orange)' : 'var(--text)',
              };

              return e('tr', { key:ev.id },
                e('td', null, ev.name),
                e('td', { style:{ textAlign:'center', fontSize:10, padding:'6px 4px' } },
                  e('span', {
                    className: 'area-badge',
                    style: {
                      color: (areaMap[ev.area]||{color:'#888'}).color,
                      borderColor: (areaMap[ev.area]||{color:'#ddd'}).color,
                      background: (areaMap[ev.area]||{color:'#f5f5f5'}).color + '18',
                    }
                  }, ev.area === AREA_ALL ? '—' : (areaMap[ev.area]||{label:ev.area}).label)
                ),
                e('td', { style:{ textAlign:'center', fontSize:11 } }, ev.regime),
                ...cols.map(c => e('td', { key:c.key, className:c.key==='TOTAL'?'total-col':'' }, ev.scores[c.key])),
                e('td', null, approval.prod),
                e('td', null, approval.has),
                e('td', { className: 'pct-cell' + (
                    !ev.scores.TOTAL_RAW || ev.scores.TOTAL_RAW === 0 ? '' :
                    ev.scores.TOTAL / ev.scores.TOTAL_RAW >= 0.99 ? ' pct-high' :
                    ev.scores.TOTAL / ev.scores.TOTAL_RAW >= 0.90 ? ' pct-mid' : ' pct-low'
                  ),
                  title: `Total c/ Teto: ${ev.scores.TOTAL} / Total RADOC: ${ev.scores.TOTAL_RAW}`
                },
                  ev.scores.TOTAL_RAW > 0
                    ? Math.round(ev.scores.TOTAL / ev.scores.TOTAL_RAW * 100) + '%'
                    : '—'
                ),
                e('td', { style:{
                  fontWeight:600, fontSize:11,
                  color: isApproved?'var(--green)':isReprovado?'var(--red)':'var(--text-muted)',
                  background: isApproved?'var(--green-bg)':isReprovado?'var(--red-bg)':'transparent',
                }},
                  approval.status
                    .replace('REPROVADO', 'Meta não Atingida')
                    .replace('Reprovado', 'Meta não Atingida')
                ),
                e('td', { style: hasStyle  }, hasNeededFmt),
                e('td', { style: prodStyle }, prodNeededFmt),
              );
            })
          ),
          // ── Linha de médias ──────────────────────────────────────────
          e('tfoot', null,
            e('tr', { className: 'avg-row' },
              e('td', { colSpan: 3 }, 'Média'),
              ...cols.map(c => {
                const vals = filteredEvs.map(ev => ev.scores[c.key]).filter(v => typeof v === 'number');
                const avg  = vals.length ? Math.round(vals.reduce((s,v)=>s+v,0) / vals.length * 100) / 100 : '—';
                return e('td', { key: c.key, className: c.key==='TOTAL'?'total-col':'' }, avg);
              }),
              // Prod avg
              e('td', null, (() => {
                const vals = filteredEvs.map(ev => approvalMap.get(ev.id)?.prod ?? 0);
                return vals.length ? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length*100)/100 : '—';
              })()),
              // HAS avg
              e('td', null, (() => {
                const vals = filteredEvs.map(ev => approvalMap.get(ev.id)?.has ?? 0);
                return vals.length ? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length*100)/100 : '—';
              })()),
              // % avg
              e('td', { className:'pct-cell' }, (() => {
                const vals = filteredEvs
                  .filter(ev => ev.scores.TOTAL_RAW > 0)
                  .map(ev => ev.scores.TOTAL / ev.scores.TOTAL_RAW * 100);
                return vals.length ? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length) + '%' : '—';
              })()),
              // Resultado: blank
              e('td', null, ''),
              // HAS nec avg
              e('td', { style:{ borderLeft:'2px solid #93aad4' } }, (() => {
                const vals = filteredEvs.map(ev => {
                  const ap = approvalMap.get(ev.id);
                  const isDE = ev.regime !== '20H';
                  const T = isDE ? thresholdDE : threshold20;
                  const v = isDE ? hasNecessario(ap.prod, T) : hasNecessario20(ap.prod, T);
                  return typeof v === 'number' ? v : null;
                }).filter(v => v !== null);
                return vals.length ? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length*10)/10 + 'h' : '—';
              })()),
              // Prod nec avg
              e('td', null, (() => {
                const vals = filteredEvs.map(ev => {
                  const ap = approvalMap.get(ev.id);
                  const isDE = ev.regime !== '20H';
                  const T = isDE ? thresholdDE : threshold20;
                  const v = isDE ? prodNecessaria(ap.has, T) : prodNecessaria20(ap.has, T);
                  return typeof v === 'number' ? v : null;
                }).filter(v => v !== null);
                return vals.length ? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length) : '—';
              })()),
            )
          )
        )
      )
    );
  }

  return e('div', null,
    e('header', null,
      e('div', { className:'container inner' },
        e('h1', null, 'SICAD Avaliador ', e('span', null, '— CONSUNI 18/2017')),
        e('div', { className:'header-actions' },
          syncStatus && e('span', { style:{ fontSize:12, color:'var(--text-muted)' } },
            syncStatus==='synced'   ? '● Sincronizado' :
            syncStatus==='syncing'  ? '○ Sincronizando...' :
            syncStatus==='loaded'   ? '● Carregado do Gist' : '● Erro sync'
          ),
          e('button', { className:'btn btn-sm', onClick:handleSync }, '↑ Sync Gist'),
          e('button', { className:'btn btn-sm', onClick:()=>setShowSettings(true) }, '⚙'),
        )
      )
    ),

    e('div', { className:'container' },
      // Limiar de aprovação
      e('div', { style:{ display:'flex', gap:16, margin:'20px 0 0 0', padding:'12px 16px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, alignItems:'center', flexWrap:'wrap' } },
        e('span', { style:{ fontSize:13, fontWeight:600, color:'var(--accent)' } }, 'Limiares de Aprovação:'),
        e('label', { style:{ fontSize:13, display:'flex', alignItems:'center', gap:4 } },
          'DE/40H (valor médio de produção):',
          e('input', {
            type:'number', step:'0.01', value:thresholdDE||'', placeholder:'ex: 150',
            style:{ width:100, padding:'4px 8px', border:'1px solid var(--border)', borderRadius:4, fontFamily:"'IBM Plex Mono',monospace", fontSize:13 },
            onChange:(ev)=>{ const v=parseFloat(ev.target.value)||0; setThresholdDE(v); localStorage.setItem('sicad_threshold_de',String(v)); },
          })
        ),
        e('label', { style:{ fontSize:13, display:'flex', alignItems:'center', gap:4 } },
          '20H (valor médio de produção):',
          e('input', {
            type:'number', step:'0.01', value:threshold20||'', placeholder:'ex: 80',
            style:{ width:100, padding:'4px 8px', border:'1px solid var(--border)', borderRadius:4, fontFamily:"'IBM Plex Mono',monospace", fontSize:13 },
            onChange:(ev)=>{ const v=parseFloat(ev.target.value)||0; setThreshold20(v); localStorage.setItem('sicad_threshold_20',String(v)); },
          })
        ),
        e('span', { style:{ fontSize:11, color:'var(--text-muted)' } }, 'Insira os valores médios de referência antes de analisar os PDFs'),
      ),

      // Upload Zone — Geral
      e('div', { className:'area-section-label' }, '📂 Upload geral (toda a unidade)'),
      e('div', {
        className:'upload-zone',
        onDrop:(ev)=>handleDrop(ev, AREA_ALL), onDragOver:handleDragOver, onDragLeave:handleDragLeave,
        onClick:()=>fileInputRef.current?.click(),
      },
        e('input', { ref:fileInputRef, type:'file', accept:'.pdf', multiple:true,
          onChange:(ev)=>handleFiles(Array.from(ev.target.files), AREA_ALL) }),
        e('h3', null, processing ? 'Processando...' : 'Arraste PDFs do SICAD aqui'),
        e('p', null, 'ou clique para selecionar · aceita múltiplos arquivos · sem área específica'),
      ),

      // Upload Zones — por área
      e('div', { className:'area-section-label' }, '🗂️ Upload por área'),
      e('div', { className:'areas-grid' },
        AREAS.map(ar => {
          const arRef = areaRefs.current[ar.id] || (areaRefs.current[ar.id] = React.createRef());
          const count = evaluations.filter(ev => ev.area === ar.id).length;
          return e('div', {
            key: ar.id,
            className: 'area-upload',
            style: { '--area-color': ar.color },
            onDrop: (ev) => handleDrop(ev, ar.id),
            onDragOver: handleDragOver,
            onDragLeave: handleDragLeave,
            onClick: () => arRef.current?.click(),
          },
            count > 0 && e('span', { className:'area-count' }, count),
            e('input', { ref: arRef, type:'file', accept:'.pdf', multiple:true,
              onChange:(ev)=>handleFiles(Array.from(ev.target.files), ar.id) }),
            e('h4', null, ar.label),
            e('p', null, 'Arrastar ou clicar'),
          );
        })
      ),

      // Log
      log.length > 0 && e('div', { className:'log' },
        log.map((l,i) => e('div', { key:i, className:l.type },
          e('span', { style:{ opacity:0.5 } }, `[${l.time}] `), l.msg
        ))
      ),

      // Contador + botão limpar (cards individuais removidos — dados estão na tabela)
      evaluations.length > 0 && e('div', {
        style:{ display:'flex', justifyContent:'space-between', alignItems:'center',
                margin:'12px 0', padding:'8px 14px',
                background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6 }
      },
        e('span', { style:{ fontSize:14, fontWeight:600, color:'var(--accent)' } },
          `${evaluations.length} RADOC(s) carregado(s)`
        ),
        e('button', {
          className:'btn btn-sm btn-danger',
          onClick:()=>{ setEvaluations([]); setExpanded(null); }
        }, 'Limpar tudo'),
      ),
            e(SummaryTable),
      evaluations.length > 0 && e(AnalysisChart, { evaluations, thresholdDE, threshold20 }),
      evaluations.length > 0 && e(DashboardCharts, { evaluations, thresholdDE, threshold20, reportArea, setReportArea, reportLoading, generateReport }),
      evaluations.length > 0 && e(HeatmapChart, { evaluations }),

      // ── Gerar Relatório — item final após mapa de calor ──────
      evaluations.length > 0 && e('div', { className:'report-bar' },
        e('label', null, '📄 Gerar Relatório PDF:'),
        e('select', {
          value: reportArea,
          onChange: ev => setReportArea(ev.target.value),
        },
          e('option', { value: AREA_ALL }, 'Toda a Unidade (todos os RADOCs)'),
          ...AREAS.map(ar =>
            e('option', { key: ar.id, value: ar.id }, ar.label)
          )
        ),
        e('span', { className:'hint' },
          'O relatório inclui análise narrativa, gráficos e tabelas completas. Será aberto em nova aba para impressão ou salvar como PDF.'
        ),
        e('button', {
          className: 'btn-report',
          onClick: generateReport,
          disabled: reportLoading || evaluations.length === 0,
        },
          reportLoading ? e('span', { className:'report-spinner' }) : '📊',
          reportLoading ? ' Gerando análise...' : ' Gerar Relatório'
        ),
      ),
    ),

    e('footer', null, 'SICAD Avaliador · Resolução CONSUNI 18/2017 · UFG'),
    showSettings && e(SettingsModal),
  );
}

window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('root');
  if (d) d.innerHTML = '<div style="padding:40px;font-family:monospace;background:#fff0f0;border:2px solid red;margin:20px;border-radius:8px">'
    + '<h2 style="color:red">Erro JavaScript</h2>'
    + '<p><strong>' + msg + '</strong></p>'
    + '<p>Linha ' + line + ':' + col + ' em ' + src + '</p>'
    + (err && err.stack ? '<pre style="font-size:11px;overflow:auto">' + err.stack + '</pre>' : '')
    + '</div>';
};

// ── React Error Boundary — catches render errors and shows them ──────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error('[SICAD ErrorBoundary]', error, info);
  }
  render() {
    if (this.state.hasError) {
      const err = this.state.error;
      const info = this.state.info;
      return React.createElement('div', {
        style: { padding: 40, fontFamily: 'monospace', background: '#fff0f0',
                 border: '2px solid #c00', margin: 20, borderRadius: 8 }
      },
        React.createElement('h2', { style: { color: '#c00', marginBottom: 12 } },
          '⚠ Erro ao renderizar — SICAD Avaliador'),
        React.createElement('p', { style: { marginBottom: 8 } },
          React.createElement('strong', null, err && err.message ? err.message : String(err))),
        React.createElement('pre', {
          style: { fontSize: 11, overflowX: 'auto', background: '#fff', padding: 12,
                   borderRadius: 4, whiteSpace: 'pre-wrap', wordBreak: 'break-all' }
        }, err && err.stack ? err.stack : '(sem stack trace)'),
        info && React.createElement('details', { style: { marginTop: 12 } },
          React.createElement('summary', null, 'Component stack'),
          React.createElement('pre', { style: { fontSize: 10 } },
            info.componentStack)
        ),
        React.createElement('button', {
          style: { marginTop: 16, padding: '8px 16px', cursor: 'pointer' },
          onClick: () => window.location.reload()
        }, 'Recarregar página')
      );
    }
    return this.props.children;
  }
}

ReactDOM.render(
  React.createElement(ErrorBoundary, null, e(App)),
  document.getElementById('root')
);
</script>
</body>
