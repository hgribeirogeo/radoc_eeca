      e('div', { className:'modal', onClick:ev=>ev.stopPropagation() },
        e('h3', null, 'ConfiguraГ§Гөes вҖ” Gist Sync'),
        e('label', null, 'GitHub Token (gist scope)'),
        e('input', { type:'password', value:token, onChange:ev=>setToken(ev.target.value), placeholder:'ghp_...' }),
        e('label', null, 'Gist ID (deixe vazio para criar novo)'),
        e('input', { type:'text', value:gistId, onChange:ev=>setGistId(ev.target.value), placeholder:'abc123...' }),
        e('div', { className:'actions' },
          e('button', { className:'btn', onClick:()=>setShowSettings(false) }, 'Cancelar'),
          e('button', { className:'btn btn-primary', onClick:()=>{
            const newCfg = { token, gistId }; setConfig(newCfg); saveConfig(newCfg);
            setShowSettings(false); addLog('ConfiguraГ§ГЈo salva', 'ok');
          }}, 'Salvar'),
        )
      )
    );
  }

  function ScorePill({ value, label, color }) {
    return e('span', { className:'score-pill', style:{ background:color+'15', color, border:`1px solid ${color}30` } },
      `${label}: ${value}`
    );
  }

  function EvalDetail({ evaluation }) {
    const details = evaluation.scores.details || [];
    const tabs = [
      { key:'ENS', label:'Ensino' },
      { key:'PRI', label:'ProduГ§ГЈo' },
      { key:'PSQ', label:'Pesquisa' },
      { key:'EXT', label:'ExtensГЈo' },
      { key:'ADM', label:'Admin.' },
      { key:'OTR', label:'Outras' },
      { key:'CAPS', label:'Tetos Aplicados' },
    ];

    const filtered = activeTab === 'CAPS' ? [] : details.filter(d => {
      if (activeTab === 'ENS') return d.category === 'ENS' || d.subcategory === 'GRAD' || d.subcategory === 'POS' || d.category === 'PROJ_ENS';
      return d.category === activeTab;
    });

    return e('div', { className:'eval-detail' },
      e('div', { className:'breakdown' },
        [
          { k:'ENS_GRAD', l:'Ensino GRAD', c:'#1a4b8c' },
          { k:'ENS_TOTAL', l:'Ensino TOTAL', c:'#2d5fa0' },
          { k:'PROJ_ENS', l:'Proj. Ensino', c:'#3b7ab8' },
          { k:'PRI', l:'Prod. Intelectual', c:'#7a3b8c' },
          { k:'PSQ', l:'Pesquisa', c:'#2d7a3a' },
          { k:'EXT', l:'ExtensГЈo', c:'#b36b1a' },
          { k:'ADM', l:'Administrativo', c:'#8c3b3b' },
          { k:'RPT', l:'RepresentaГ§ГЈo', c:'#3b6b8c' },
          { k:'OTR', l:'Outras', c:'#5a5a5a' },
        ].map(({ k, l, c }) =>
          e('div', { key:k, className:'breakdown-card', style:{ borderColor:c, background:c+'08' } },
            e('h4', null, l),
            e('div', { className:'value', style:{ color:c } }, evaluation.scores[k]),
          )
        )
      ),
      e('div', { className:'tabs' },
        tabs.map(t => e('div', {
          key:t.key, className:`tab ${activeTab===t.key?'active':''}`,
          onClick:()=>setActiveTab(t.key)
        }, t.label))
      ),
      activeTab === 'CAPS' && evaluation.scores.capInfo.length > 0 &&
        e('table', { className:'items-table' },
          e('thead', null, e('tr', null,
            e('th', null, 'Grupo'), e('th', null, 'Itens'), e('th', null, 'Valor Bruto'),
            e('th', null, 'Teto'), e('th', null, 'Valor Efetivo'), e('th', null, 'ReduГ§ГЈo'),
          )),
          e('tbody', null,
            evaluation.scores.capInfo.map((ci, i) =>
              e('tr', { key:i },
                e('td', { className:'item-code' }, ci.group), e('td', null, ci.count),
                e('td', null, ci.raw), e('td', { className:'cap-hit' }, ci.cap),
                e('td', null, ci.effective),
                e('td', { style:{ color:'var(--red)' } }, `-${(ci.raw-ci.effective).toFixed(2)}`),
              )
            )
          )
        ),
      activeTab === 'CAPS' && evaluation.scores.capInfo.length === 0 &&
        e('p', { style:{ color:'var(--text-muted)', padding:'20px 0' } }, 'Nenhum teto aplicado.'),
      activeTab !== 'CAPS' && filtered.length > 0 &&
        e('table', { className:'items-table' },
          e('thead', null, e('tr', null,
            e('th', null, 'CГіdigo'), e('th', null, 'DescriГ§ГЈo'), e('th', null, 'Detalhe'),
            e('th', null, 'SICAD'), e('th', null, 'Calculado'), e('th', null, 'Status'),
          )),
          e('tbody', null,
            filtered.map((d, i) => {
              const desc = d.ruleName || d.code;
              const detail = d.componente || d.titulo || d.portaria || d.discente || '';
              const match = d.sicadPts !== null && Math.abs(d.sicadPts - d.calculated) < 0.02;
              return e('tr', { key:i },
                e('td', { className:'item-code' }, d.code),
                e('td', null, desc),
                e('td', { style:{ maxWidth:250, fontSize:12, color:'var(--text-secondary)' } }, detail.substring(0,80)),
                e('td', { className:'mono', style:{ textAlign:'right' } }, d.sicadPts !== null ? d.sicadPts : 'вҖ”'),
                e('td', { className:'mono', style:{ textAlign:'right', fontWeight:600 } }, d.calculated),
                e('td', null,
                  d.capHit
                    ? e('span', { className:'cap-hit', title:`Teto ${d.capMax} no grupo ${d.capGroup}` }, 'вҡ  TETO')
                    : d.sicadPts !== null
                      ? (match ? e('span', { style:{ color:'var(--green)' } }, 'вң“')
                               : e('span', { style:{ color:'var(--orange)' } }, 'вү '))
                      : ''
                ),
              );
            })
          )
        ),
      activeTab !== 'CAPS' && filtered.length === 0 &&
        e('p', { style:{ color:'var(--text-muted)', padding:'20px 0' } }, 'Nenhum item nesta categoria.'),
    );
  }


  // ============================================================
  // ANALYSIS CHART вҖ” DispersГЈo PROD Г— HAS (eixos como na apresentaГ§ГЈo)
  //
  // Eixo X = PontuaГ§ГЈo de produГ§ГЈo (sem aulas)
  // Eixo Y = H-A horas semanais de ensino
  //
  // Fronteira de aprovaГ§ГЈo (3 segmentos):
  //  DE/40H: horizontal y=16 вҶ’ diagonal (kneeL,16)вҶ’(kneeR,8) вҶ’ horizontal y=8
  //  20H:    horizontal y=10 вҶ’ diagonal (kneeL,10)вҶ’(kneeR,8) вҶ’ horizontal y=8
  //
  // Pontos: cada professor Г© um ponto (prod, has) colorido por aprovaГ§ГЈo
  // ============================================================
  function AnalysisChart({ evaluations, thresholdDE, threshold20 }) {
    const canvasRef   = useRef(null);
    const chartRef    = useRef(null);
    const canvas20Ref = useRef(null);
    const chart20Ref  = useRef(null);
    const [regime, setRegime] = useState('DE');
    const [areaFilter, setAreaFilter] = useState(AREA_ALL);

    // в”Җв”Җ Approval boundary key points в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function getBoundary(T, isDE) {
      if (!T || T <= 0) return null;
      if (isDE) {
        // Formula: prod = 1.05*T*(24-has)/12
        // kneeLeft  вҶ’ has=16: prod = 1.05*T*8/12  = 0.7*T
        // kneeRight вҶ’ has=8 : prod = 1.05*T*16/12 = 1.4*T
        return { kneeLeft: 1.05*T*8/12, kneeRight: 1.05*T*16/12, hasTop: 16, hasBot: 8 };
      } else {
        // Formula: prod = 0.2*T*(14-has)
        // kneeLeft  вҶ’ has=10: prod = 0.8*T
        // kneeRight вҶ’ has=8 : prod = 1.2*T
        return { kneeLeft: 0.8*T, kneeRight: 1.2*T, hasTop: 10, hasBot: 8 };
      }
    }

    // в”Җв”Җ Per-professor status в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function approvalStatus(prod, has, T, isDE) {
      if (!T || T <= 0) return 'neutral';
      if (has < 8) return 'below';
      if (isDE) {
        if (has >= 16) return 'above';
        if (prod >= (16/12)*1.05*T && has >= 8) return 'above';
        if (prod >= 1.05*T*(24-has)/12) return 'above';
        return 'below';
      } else {
        if (has >= 10) return 'above';
        if (prod >= 1.2*T && has >= 8) return 'above';
        if (prod >= 0.2*T*(14-has)) return 'above';
        return 'below';
      }
    }

    const buildData = useCallback(() => {
      const isDE = regime === 'DE';
      const T    = isDE ? thresholdDE : threshold20;

      const filteredByArea = areaFilter === AREA_ALL
        ? evaluations
        : evaluations.filter(ev => ev.area === areaFilter);

      const pts = filteredByArea
        .filter(ev => isDE ? ev.regime !== '20H' : ev.regime === '20H')
        .map(ev => {
          const has  = Math.round((ev.scores.ENS_TOTAL / 10) * 100) / 100;
          const prod = Math.round(
            (ev.scores.PROJ_ENS + ev.scores.PRI + ev.scores.PSQ +
             ev.scores.EXT + ev.scores.ADM + ev.scores.RPT + ev.scores.OTR) * 100) / 100;
          return { x: prod, y: has, status: approvalStatus(prod, has, T, isDE), area: ev.area };
        });

      // Boundary line вҖ” 4 anchor points forming the L-shape
      const bnd   = getBoundary(T, isDE);
      const allX  = pts.map(p => p.x).filter(v => v > 0);
      const maxX  = allX.length > 0 ? Math.max(...allX, bnd ? bnd.kneeRight * 1.6 : 500, 100) : (bnd ? bnd.kneeRight * 1.8 : 500);
      const lineData = bnd ? [
        { x: 0,           y: bnd.hasTop },   // start: left edge at top
        { x: bnd.kneeLeft,  y: bnd.hasTop }, // left knee
        { x: bnd.kneeRight, y: bnd.hasBot }, // right knee
        { x: maxX,          y: bnd.hasBot }, // extend right at bottom
      ] : [];

      return { pts, lineData, T, bnd, maxX, isDE };
    }, [evaluations, thresholdDE, threshold20, regime, areaFilter]);

    useEffect(() => {
      if (!canvasRef.current) return;
      const { pts, lineData, T, bnd, maxX, isDE } = buildData();

      const above   = pts.filter(p => p.status === 'above');
      const below   = pts.filter(p => p.status === 'below');
      const neutral = pts.filter(p => p.status === 'neutral');

      const datasets = [];

      // в”Җв”Җ Approval boundary (drawn first so it appears behind dots) в”Җв”Җ
      if (lineData.length) {
        datasets.push({
          label: 'Fronteira de aprovaГ§ГЈo',
          data: lineData,
          type: 'line',
          borderColor: '#1a4b8c',
          borderWidth: 3,
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 99,
          z: 20,
        });
      }

      // в”Җв”Җ Reference dashed lines via extra line datasets в”Җв”Җ
      if (bnd) {
        // Horizontal guide at hasTop
        datasets.push({
          label: null,
          data: [{ x: 0, y: bnd.hasTop }, { x: maxX, y: bnd.hasTop }],
          type: 'line',
          borderColor: '#93aad4',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Horizontal guide at hasBot
        datasets.push({
          label: null,
          data: [{ x: 0, y: bnd.hasBot }, { x: maxX, y: bnd.hasBot }],
          type: 'line',
          borderColor: '#93aad4',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Vertical guide at kneeLeft
        datasets.push({
          label: null,
          data: [{ x: bnd.kneeLeft, y: 0 }, { x: bnd.kneeLeft, y: bnd.hasTop }],
          type: 'line',
          borderColor: '#e06060',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Vertical guide at kneeRight
        datasets.push({
          label: null,
          data: [{ x: bnd.kneeRight, y: 0 }, { x: bnd.kneeRight, y: bnd.hasBot }],
          type: 'line',
          borderColor: '#e06060',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
      }

      // в”Җв”Җ Professor scatter вҖ” coloured by area, shape by status в”Җв”Җ
      // circle = acima da reta  |  diamond (rectRot) = abaixo
      const allAreaSlots = [...AREAS, { id: AREA_ALL, label: 'Sem ГЎrea', color: '#888888' }];
      allAreaSlots.forEach(ar => {
        const apv = pts.filter(p => p.area === ar.id && p.status === 'above');
        const rep = pts.filter(p => p.area === ar.id && p.status === 'below');
        const neu = pts.filter(p => p.area === ar.id && p.status === 'neutral');
        if (!apv.length && !rep.length && !neu.length) return;
        if (apv.length) datasets.push({
          label: ar.label + ' вң“',
          data: apv.map(p => ({ x: p.x, y: p.y })),
          type: 'scatter',
          backgroundColor: ar.color,
          borderColor: ar.color,
          borderWidth: 1.8, pointStyle: 'circle',
          pointRadius: 8, pointHoverRadius: 11,
          order: 0, z: 10,
        });
        if (rep.length) datasets.push({
          label: ar.label + ' вң—',
          data: rep.map(p => ({ x: p.x, y: p.y })),
          type: 'scatter',
          backgroundColor: ar.color,
          borderColor: ar.color,
          borderWidth: 1.8, pointStyle: 'circle',
          pointRadius: 8, pointHoverRadius: 11,
          order: 0, z: 10,
        });
        if (neu.length) datasets.push({
          label: ar.label + ' ?',
          data: neu.map(p => ({ x: p.x, y: p.y })),
          type: 'scatter',
          backgroundColor: ar.color,
          borderColor: ar.color,
          borderWidth: 1.8, pointStyle: 'circle',
          pointRadius: 8, pointHoverRadius: 11,
          order: 0, z: 10,
        });
      });

      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

      // в”Җв”Җ Axis ranges в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      const hasTop = bnd ? bnd.hasTop : (isDE ? 16 : 10);
      const yMax   = hasTop + 2;
      const xMax   = Math.ceil(maxX * 1.05 / 50) * 50;

      chartRef.current = new Chart(canvasRef.current, {
        type: 'scatter',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'point' },
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                generateLabels: (chart) => {
                const seen = new Set();
                return chart.data.datasets
                  .filter(ds => ds.label && ds.type === 'scatter')
                  .reduce((acc, ds) => {
                    const key = ds.label.replace(/ [\u2713\u2717?]$/, '').trim();
                    if (seen.has(key)) return acc;
                    seen.add(key);
                    acc.push({ text: key, fillStyle: ds.backgroundColor,
                      strokeStyle: ds.borderColor, lineWidth: ds.borderWidth,
                      pointStyle: 'circle', hidden: false });
                    return acc;
                  }, []);
              },

                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                padding: 14,
                usePointStyle: true,
                pointStyleWidth: 10,
              },
            },
            tooltip: {
              filter: (item) => item.dataset.type === 'scatter',
              callbacks: {
                label(ctx) {
                  const areaName = (ctx.dataset.label||'').replace(/ [вң“вң—?]$/, '');
                  const symbol = (ctx.dataset.label||'').endsWith(' вң—') ? 'Abaixo da reta' : (ctx.dataset.label||'').endsWith(' вң“') ? 'Acima da reta' : 'Neutro';
                  return `${areaName} В· ${symbol} | Prod: ${ctx.parsed.x.toFixed(1)} pts | HAS: ${ctx.parsed.y.toFixed(2)} h/sem`;
                },
              },
              backgroundColor: '#1a1a18',
              bodyFont: { family: "'IBM Plex Mono', monospace", size: 12 },
              padding: 10,
              displayColors: false,
            },
          },
          scales: {
            x: {
              type: 'linear',
              min: 0,
              max: xMax,
              title: {
                display: true,
                text: 'PontuaГ§ГЈo вҖ” produГ§ГЈo sem aulas (pts)',
                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                color: '#6b6860',
                padding: { top: 8 },
              },
              ticks: {
                font: { family: "'IBM Plex Mono', monospace", size: 10 },
                maxTicksLimit: 10,
                callback: v => {
                  if (!bnd) return v;
                  if (Math.abs(v - bnd.kneeLeft) < (xMax*0.025)) return Math.round(bnd.kneeLeft);
                  if (Math.abs(v - bnd.kneeRight) < (xMax*0.025)) return Math.round(bnd.kneeRight);
                  return v;
                },
              },
              grid: { color: '#ebe9e4' },
            },
            y: {
              type: 'linear',
              min: 0,
              max: yMax,
              title: {
                display: true,
                text: 'H-A вҖ” horas-aula semanais',
                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                color: '#6b6860',
                padding: { bottom: 8 },
              },
              ticks: {
                stepSize: 2,
                font: { family: "'IBM Plex Mono', monospace", size: 10 },
                callback: v => v % 2 === 0 ? `${v}h` : '',
              },
              grid: { color: '#ebe9e4' },
            },
          },
        },
      });

      return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
    }, [buildData]);

    // в”Җв”Җ Always-on 20H chart for report capture в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    useEffect(() => {
      if (!canvas20Ref.current) return;
      const _has20H = evaluations.some(ev => ev.regime === '20H');
      if (!threshold20 || !_has20H) {
        if (chart20Ref.current) { chart20Ref.current.destroy(); chart20Ref.current = null; }
        return;
      }
      const T20 = threshold20;
      const pts20 = evaluations
        .filter(ev => ev.regime === '20H')
        .map(ev => {
          const has  = Math.round((ev.scores.ENS_TOTAL/10)*100)/100;
          const prod = Math.round((ev.scores.PROJ_ENS+ev.scores.PRI+ev.scores.PSQ+
            ev.scores.EXT+ev.scores.ADM+ev.scores.RPT+ev.scores.OTR)*100)/100;
          return { x:prod, y:has, status:approvalStatus(prod,has,T20,false), area:ev.area };
        });
      const bnd20 = getBoundary(T20, false);
      const xVals20 = pts20.map(p=>p.x).filter(v=>v>0);
      const maxX20 = xVals20.length ? Math.max(...xVals20, bnd20?bnd20.kneeRight*1.6:300, 80) : (bnd20?bnd20.kneeRight*1.8:300);
      const xMax20 = Math.ceil(maxX20*1.05/50)*50;
      const ds20 = [];
      if (bnd20) ds20.push({ label:'Fronteira', type:'line', order:2,
        data:[{x:0,y:bnd20.hasTop},{x:bnd20.kneeLeft,y:bnd20.hasTop},
              {x:bnd20.kneeRight,y:bnd20.hasBot},{x:maxX20,y:bnd20.hasBot}],
        borderColor:'#1a4b8c', borderWidth:2.5, pointRadius:0, fill:false, tension:0 });
      [...AREAS, {id:AREA_ALL, label:'Sem ГЎrea', color:'#888'}].forEach(ar => {
        const apv = pts20.filter(p=>p.area===ar.id && p.status==='above');
        const rep = pts20.filter(p=>p.area===ar.id && p.status==='below');
        if (apv.length) ds20.push({ label:ar.label+' вң“', type:'scatter', order:0,
          data:apv.map(p=>({x:p.x,y:p.y})), backgroundColor:ar.color+'cc', borderColor:ar.color,
          borderWidth:2, pointStyle:'circle', pointRadius:9, pointHoverRadius:11 });
        if (rep.length) ds20.push({ label:ar.label+' вң—', type:'scatter', order:0,
          data:rep.map(p=>({x:p.x,y:p.y})), backgroundColor:ar.color+'cc', borderColor:ar.color,
          borderWidth:2, pointStyle:'circle', pointRadius:9, pointHoverRadius:11 });
      });
      if (chart20Ref.current) { chart20Ref.current.destroy(); chart20Ref.current = null; }
      chart20Ref.current = new Chart(canvas20Ref.current, {
        type:'scatter', data:{datasets:ds20},
        options:{ responsive:false, maintainAspectRatio:false,
          plugins:{
            legend:{position:'bottom',labels:{
              generateLabels:(ch)=>{ const seen=new Set();
                return Chart.defaults.plugins.legend.labels.generateLabels(ch)
                  .filter(i=>{ const k=(i.text||'').replace(/ [вң“вң—?]$/,'').trim();
                    if(seen.has(k))return false; seen.add(k); return true; });
              }, font:{size:10}, padding:8 }},
            tooltip:{callbacks:{label:ctx=>{
              const a=(ctx.dataset.label||'').replace(/ [вң“вң—?]$/,'');
              return a+' | Prod:'+ctx.parsed.x.toFixed(1)+' | HAS:'+ctx.parsed.y.toFixed(2)+'h';
            }}}
          },
          scales:{
            x:{type:'linear',min:0,max:xMax20,
              title:{display:true,text:'ProduГ§ГЈo (pts)',font:{size:10},color:'#6b6860'},
              ticks:{font:{size:9}},grid:{color:'#ebe9e4'}},
            y:{type:'linear',min:0,max:12,
              title:{display:true,text:'H-A (h/sem)',font:{size:10},color:'#6b6860'},
              ticks:{stepSize:2,font:{size:9},callback:v=>v%2===0?v+'h':''},
              grid:{color:'#ebe9e4'}},
          },
        },
      });
      return () => { if(chart20Ref.current){chart20Ref.current.destroy();chart20Ref.current=null;} };
    }, [evaluations, threshold20]);

    // в”Җв”Җ Stats в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const { pts, T, bnd, isDE } = buildData();

          const countInRegime = evaluations
            .filter(ev => (ar.id === AREA_ALL ? true : ev.area === ar.id))

            .length;
          if (ar.id !== AREA_ALL && countInRegime === 0) return null;
          const isActive = areaFilter === ar.id;

        // в”Җв”Җ Chart box в”Җв”Җ
        e('div', { className:'chart-box', style:{ height:420 } },
          e('canvas', { ref:canvasRef, id:'chart-scatter-de' }),
        e('canvas', {

          style:{ position:'absolute', left:'-9999px', top:'-9999px', width:'900px', height:'400px' },
        }),
          e('p', { className:'chart-note' },
            T && T > 0
              ? `T (Xm) = ${T} pts  В·  Reta: ${isDE
                  ? `(${(1.05*T*8/12).toFixed(0)}, 16h) вҶ’ (${(1.05*T*16/12).toFixed(0)}, 8h)`
                  : `(${(0.8*T).toFixed(0)}, ${isDE?16:10}h) вҶ’ (${(1.2*T).toFixed(0)}, 8h)`}`
              : `вҡ  Defina o valor mГ©dio de referГӘncia (Xm) ${regime==='DE'?'DE/40H':'20H'} para exibir a fronteira`
          ),
        ),

        // в”Җв”Җ Stats panel в”Җв”Җ
        e('div', { className:'stats-panel' },
          e('h3', null, `EstatГӯsticas вҖ” ${regime}`),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Professores'),
            e('span', { className:'stat-value blue' }, total),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'вң“ Acima da reta'),
            e('span', { className:'stat-value green' }, T>0 ? `${above} (${total?Math.round(above/total*100):0}%)` : 'вҖ”'),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'вң— Abaixo da reta'),
            e('span', { className:'stat-value red' }, T>0 ? `${below} (${total?Math.round(below/total*100):0}%)` : 'вҖ”'),
          ),

  // ============================================================
  // DASHBOARD DE GESTГғO вҖ” grГЎficos e KPIs para o gestor
  // ============================================================

  // ============================================================
  // MAPA DE CALOR вҖ” Categoria Г— ГҒrea
  // ============================================================
  function HeatmapChart({ evaluations }) {
    const cats = [
      { key:'ENS_TOTAL', label:'Ensino'        },
      { key:'PROJ_ENS',  label:'Proj.Ensino'   },
      { key:'PRI',       label:'Prod.Intelectual' },
      { key:'PSQ',       label:'Pesquisa'      },
      { key:'EXT',       label:'ExtensГЈo'      },
      { key:'ADM',       label:'Admin.'        },
      { key:'RPT',       label:'RepresentaГ§ГЈo' },
      { key:'OTR',       label:'Outras'        },
    ];

    // Memoize heavy computations: area Г— category matrix + min/max
    const data = useMemo(() => AREAS.map(ar => {
      const evs = evaluations.filter(ev => ev.area === ar.id);
      if (!evs.length) return null;
      const vals = cats.map(c => ({
        cat: c.key,
        avg: Math.round(evs.map(ev => ev.scores[c.key]).reduce((s,v)=>s+v,0) / evs.length * 10) / 10,
        n:   evs.length,
      }));
      return { area: ar, vals };
    }).filter(Boolean), [evaluations]);

    if (!data.length) return null;

    const catMinMax = useMemo(() => cats.map(c => {
      const all = data.map(r => r.vals.find(v=>v.cat===c.key)?.avg ?? 0);
      return { key: c.key, min: Math.min(...all), max: Math.max(...all) };
    }), [data]);

    // Colour: green (high) вҶ’ yellow вҶ’ red (low)
    // t=0 вҶ’ worst (#c0392b), t=1 вҶ’ best (#27ae60), t=0.5 вҶ’ #f39c12
    function heatColor(t) {
      if (isNaN(t) || t === null) return '#f0f0f0';
      // redвҶ’yellowвҶ’green
      const r = t < 0.5 ? 192 : Math.round(192 - (t-0.5)*2*(192-39));
      const g = t < 0.5 ? Math.round(t*2*174)  : 174;
      const b = t < 0.5 ? 43  : Math.round(43  + (t-0.5)*2*(96-43));
      return `rgb(${r},${g},${b})`;
    }

    function textColor(t) { return t < 0.45 ? '#fff' : '#1a1a18'; }

    // Also compute "unidade" average per category for the reference row
    const unidadeRow = cats.map(c => ({
      cat: c.key,
      avg: Math.round(evaluations.map(ev=>ev.scores[c.key]).reduce((s,v)=>s+v,0)/evaluations.length*10)/10,
    }));

    if (evaluations.length === 0 || !data.length) return null;
    return e('div', { className:'analysis-section' },
      e('h2', null, 'Mapa de Calor вҖ” ProduГ§ГЈo por Categoria e ГҒrea'),
      e('p', { className:'subtitle' },
        'MГ©dias de pontuaГ§ГЈo por categoria de atividade, agrupadas por ГЎrea. Verde = acima da mГ©dia da unidade В· Vermelho = abaixo.'
      ),
      e('div', { className:'heatmap-wrap' },
        e('table', { className:'heatmap-table' },
          // Header
          e('thead', null,
            e('tr', null,
              e('th', { className:'row-label' }, 'ГҒrea'),
              e('th', null, 'Prof.'),
              ...cats.map(c => e('th', { key:c.key }, c.label)),
            )
          ),
          e('tbody', null,
            // Data rows вҖ” one per area
            ...data.map(row =>
              e('tr', { key: row.area.id },
                e('td', { style:{ padding:'4px 6px', fontWeight:600, fontSize:12,
                    color: row.area.color, whiteSpace:'nowrap' } },
                  row.area.label
                ),
                e('td', { style:{ textAlign:'center', fontFamily:"'IBM Plex Mono',monospace",
                    fontSize:11, padding:'4px' } },
                  row.n
                ),
                ...cats.map(c => {
                  const v = row.vals.find(x=>x.cat===c.key);
                  const mm = catMinMax.find(x=>x.key===c.key);
                  const range = mm.max - mm.min;
                  const t = range > 0 ? (v.avg - mm.min) / range : 0.5;
                  const bg = heatColor(t);
                  const fg = textColor(t);
                  // Reference vs unidade
                  const uniAvg = unidadeRow.find(x=>x.cat===c.key)?.avg ?? 0;
                  const diff = v.avg - uniAvg;
                  const diffStr = diff >= 0 ? '+'+diff.toFixed(0) : diff.toFixed(0);
                  return e('td', { key:c.key },
                    e('div', {
                      className:'hm-cell',
                      style:{ background: bg, color: fg },
                      title:`${row.area.label} В· ${c.label}: ${v.avg} pts (${diffStr} vs mГ©dia unidade)`
                    },
                      v.avg,
                      e('span', { className:'hm-label' }, diffStr + ' pts')
                    )
                  );
                })
              )
            ),
            // Footer: unidade average row
            e('tr', { style:{ borderTop:'2px solid var(--border)' } },
              e('td', { style:{ padding:'4px 6px', fontWeight:700, fontSize:11,
                  color:'var(--text-secondary)', fontStyle:'italic' } },
                'MГ©dia Unidade'
              ),
              e('td', { style:{ textAlign:'center', fontFamily:"'IBM Plex Mono',monospace",
                  fontSize:11 } },
                evaluations.length
              ),
              ...cats.map(c => {
                const v = unidadeRow.find(x=>x.cat===c.key);
                return e('td', { key:c.key },
                  e('div', {
                    className:'hm-cell',
                    style:{ background:'#e8eef6', color:'#1a4b8c', fontStyle:'italic' }
                  }, v?.avg ?? 'вҖ”')
                );
              })
            )
          )
        )
      ),
      // Legend
      e('div', { className:'hm-legend' },
        e('span', null, 'Legenda:'),
        e('div', { className:'hm-legend-bar' },
          ...Array.from({length:20},(_,i)=>
            e('div', { key:i, style:{
              flex:1,
              background: heatColor(i/19),
            }})
          )
        ),
        e('span', null, 'вҶҗ Abaixo da mГ©dia'),
        e('span', null, 'Acima da mГ©dia вҶ’'),
        e('span', { style:{marginLeft:12, color:'var(--text-secondary)' } },
          'Valor = mГ©dia da ГЎrea В· SubtГӯtulo = diferenГ§a em relaГ§ГЈo Г  mГ©dia da unidade'
        ),
      ),
    );
  }

  function DashboardCharts({ evaluations, thresholdDE, threshold20, reportArea, setReportArea, reportLoading, generateReport }) {
    const barAreaRef    = useRef(null);
    const stackedRef    = useRef(null);
    const hbarRef       = useRef(null);
    const histRef       = useRef(null);
    const barAreaChart  = useRef(null);
    const stackedChart  = useRef(null);
    const hbarChart     = useRef(null);
    const histChart     = useRef(null);
    // (report charts rendered on-demand in generateReport)
    const [dashRegime, setDashRegime] = useState('all');

    // в”Җв”Җ dashEvs MUST be declared here вҖ” before KPI lines that use it в”Җв”Җ
    // (declaring after would cause TDZ since const is block-scoped)
    const dashEvs  = dashRegime === 'all' ? evaluations
      : evaluations.filter(ev => dashRegime === 'DE' ? ev.regime !== '20H' : ev.regime === '20H');
    const hasDE_d  = evaluations.some(ev => ev.regime !== '20H');
    const has20H_d = evaluations.some(ev => ev.regime === '20H');

    // в”Җв”Җ helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function _getProdForReport(ev) {
      return Math.round((ev.scores.PROJ_ENS + ev.scores.PRI + ev.scores.PSQ +
        ev.scores.EXT + ev.scores.ADM + ev.scores.RPT + ev.scores.OTR) * 100) / 100;
    }
    
    function getStatus(ev) {
      return calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20).status;
    }
    const areaLabels = useMemo(() => AREAS.map(a => a.label), []);
    const areaIds    = useMemo(() => AREAS.map(a => a.id),    []);
    const areaColors = useMemo(() => AREAS.map(a => a.color), []);

    // в”Җв”Җ KPIs в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const total      = dashEvs.length;
    const approved   = dashEvs.filter(ev=>calculateApproval(ev.scores,ev.regime,thresholdDE,threshold20).status.startsWith("APROVADO")).length;
    const notMet     = total - approved;
    const pctAprov   = total ? Math.round(approved / total * 100) : 0;
    const allProd    = dashEvs.map(_getProdForReport);
    const avgProd    = allProd.length ? Math.round(allProd.reduce((s,v)=>s+v,0)/allProd.length) : 0;
    const medianProd = (() => {
      const s = [...allProd].sort((a,b)=>a-b);
      return s.length ? (s.length%2===0 ? Math.round((s[s.length/2-1]+s[s.length/2])/2) : s[Math.floor(s.length/2)]) : 0;
    })();
    const allHAS     = dashEvs.map(ev => Math.round((ev.scores.ENS_TOTAL / 10) * 100) / 100);
    const avgHAS     = allHAS.length ? Math.round(allHAS.reduce((s,v)=>s+v,0)/allHAS.length*10)/10 : 0;
    const capHitters = dashEvs.filter(ev => ev.scores.TOTAL < ev.scores.TOTAL_RAW).length;
    const avgCapPct  = (() => {
      const vs = dashEvs.filter(ev=>ev.scores.TOTAL_RAW>0)
        .map(ev=>ev.scores.TOTAL/ev.scores.TOTAL_RAW*100);
      return vs.length ? Math.round(vs.reduce((s,v)=>s+v,0)/vs.length) : 100;
    })();

    const kpis = [
      { label:'Professores',      value: total,        sub:'no filtro atual',      color:'#1a4b8c' },
      { label:'Meta Atingida',    value: approved,     sub:`${pctAprov}% do total`, color:'#2d7a3a' },
      { label:'Meta nГЈo Atingida',value: notMet,       sub:`${100-pctAprov}% do total`, color:'#b33a3a' },
      { label:'Prod. MГ©dia',      value: avgProd,      sub:'pontos (s/ aulas)',    color:'#7a3b8c' },
      { label:'Prod. Mediana',    value: medianProd,   sub:'pontos (s/ aulas)',    color:'#5a3b8c' },
      { label:'HAS MГ©dio',        value: avgHAS+'h',   sub:'horas-aula/semana',    color:'#b36b1a' },
      { label:'c/ Teto Aplicado', value: capHitters,   sub:`mГ©dia ${avgCapPct}% do RADOC`, color:'#8c3b3b' },
    ];

    // в”Җв”Җ chart builder util в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function buildChart(ref, chartRef, config) {
      if (!ref.current) return;
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
      chartRef.current = new Chart(ref.current, config);
    }

    // в”Җв”Җ Chart 1: ProduГ§ГЈo mГ©dia por ГЎrea (bar + threshold line) в”Җв”Җ
    useEffect(() => {
      const areaData = areaIds.map(id => {
        const evs = dashEvs.filter(ev => ev.area === id);
        if (!evs.length) return null;
        return Math.round(evs.map(_getProdForReport).reduce((s,v)=>s+v,0) / evs.length);
      });
      const hasArea = areaData.some(v => v !== null);
      if (!hasArea) { buildChart(barAreaRef, barAreaChart, {
        type:'bar', data:{ labels:['Sem dados por ГЎrea'], datasets:[{data:[0]}] },
        options:{ plugins:{ legend:{display:false} } }
      }); return; }

      const T = dashRegime === '20H' ? threshold20 : (thresholdDE > 0 ? thresholdDE : threshold20);
      buildChart(barAreaRef, barAreaChart, {
        type: 'bar',
        data: {
          labels: areaLabels,
          datasets: [
            {
              label: 'ProduГ§ГЈo MГ©dia',
              data: areaData,
              backgroundColor: areaColors.map(c => c + 'cc'),
              borderColor: areaColors,
              borderWidth: 2,
              borderRadius: 4,
            },
            T > 0 ? {
              label: dashRegime === '20H' ? 'Limiar Xm 20H (1,05Г—T)' : 'Limiar Xm (1,05Г—T)',
              data: areaLabels.map(() => Math.round(1.05 * T)),
              type: 'line',
              borderColor: '#1a4b8c',
              borderWidth: 2,
              borderDash: [6,3],
              pointRadius: 0,
              fill: false,
            } : null,
          ].filter(Boolean),
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position:'bottom', labels:{ font:{ size:11 }, padding:10 } },
            tooltip: { callbacks: { label: ctx => ' ' + (ctx.parsed.y ?? 'вҖ”') + ' pts' } },
          },
          scales: {
            x: { ticks:{ font:{ size:10 } }, grid:{ display:false } },
            y: { beginAtZero:true, ticks:{ font:{ size:10 }, callback: v => v+' pts' }, grid:{ color:'#ebe9e4' } },
          },
        },
      });
    }, [dashEvs, thresholdDE, threshold20]);

    // в”Җв”Җ Chart 2: ComposiГ§ГЈo das atividades por ГЎrea (stacked bar) в”Җ
    useEffect(() => {
      const catKeys  = ['ENS_TOTAL','PROJ_ENS','PRI','PSQ','EXT','ADM','RPT','OTR'];
      const catLabels= ['Ensino','Proj.Ensino','Prod.Intel.','Pesquisa','ExtensГЈo','Admin.','Repres.','Outras'];
      const catColors= ['#1a4b8c','#3b7ab8','#7a3b8c','#2d7a3a','#b36b1a','#8c3b3b','#3b6b8c','#5a5a5a'];

      const datasets = catKeys.map((key, i) => ({
        label: catLabels[i],
        data: areaIds.map(id => {
          const evs = dashEvs.filter(ev => ev.area === id);
          if (!evs.length) return 0;
          return Math.round(evs.map(ev=>ev.scores[key]).reduce((s,v)=>s+v,0) / evs.length);
        }),
        backgroundColor: catColors[i] + 'dd',
        borderWidth: 0,
        borderRadius: 2,
      }));

      buildChart(stackedRef, stackedChart, {
        type: 'bar',
        data: { labels: areaLabels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position:'bottom', labels:{ font:{size:10}, padding:8, boxWidth:12 } },
            tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} pts` } },
          },
          scales: {
            x: { stacked:true, ticks:{ font:{size:10} }, grid:{display:false} },
            y: { stacked:true, beginAtZero:true, ticks:{ font:{size:10}, callback: v=>v+'pts' }, grid:{color:'#ebe9e4'} },
          },
        },
      });
    }, [dashEvs]);

    // в”Җв”Җ Chart 3: Taxa de aprovaГ§ГЈo por ГЎrea (horizontal bar) в”Җв”Җв”Җв”Җв”Җв”Җ
    useEffect(() => {
      const labels   = [...areaLabels, 'Sem ГЎrea'];
      const allAreaIds = [...areaIds, AREA_ALL];
      const data = allAreaIds.map(id => {
        const evs = dashEvs.filter(ev => id === AREA_ALL ? ev.area === AREA_ALL : ev.area === id);

  // ============================================================
  // ANГҒLISE TEMPORAL вҖ” grГЎficos de evoluГ§ГЈo anual
  // ============================================================
  function TemporalChart({ snapshots, evaluations, thresholdDE, threshold20 }) {
    const trendProdRef  = useRef(null);
    const trendAprovRef = useRef(null);
    const trendCatRef   = useRef(null);
    const trendAreaRef  = useRef(null);
    const trendProdChart  = useRef(null);
    const trendAprovChart = useRef(null);
    const trendCatChart   = useRef(null);
    const trendAreaChart  = useRef(null);

    // Build timeline: merge snapshots + current year
    const currentYear = new Date().getFullYear();
    const allPoints = useMemo(() => {
      const pts = [...snapshots.map(s => ({
        year: s.year,
        evs: s.evaluations,
        tDE: s.thresholdDE || thresholdDE,
        t20: s.threshold20 || threshold20,
      }))];
      if (evaluations.length > 0) {
        pts.push({ year: currentYear, evs: evaluations, tDE: thresholdDE, t20: threshold20 });
      }
      return pts.sort((a,b) => a.year - b.year);
    }, [snapshots, evaluations, thresholdDE, threshold20]);

    if (allPoints.length < 2) return null;

    function _getProdForReport(ev) {
      return Math.round((ev.scores.PROJ_ENS+ev.scores.PRI+ev.scores.PSQ+
        ev.scores.EXT+ev.scores.ADM+ev.scores.RPT+ev.scores.OTR)*100)/100;
    }
    function _aprov(ev, tDE, t20) {
      return calculateApproval(ev.scores, ev.regime, tDE, t20).status.startsWith('APROVADO');
    }

    const years = allPoints.map(p => p.year);

    function buildChart(ref, chartRef, config) {
      if (!ref.current) return;
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
      chartRef.current = new Chart(ref.current, config);
    }

    // Chart 1: ProduГ§ГЈo mГ©dia e mediana por ano
    useEffect(() => {
      const avgData = allPoints.map(p => {
        const prods = p.evs.map(_getProdForReport);
        return prods.length ? Math.round(prods.reduce((s,v)=>s+v,0)/prods.length) : 0;
      });
      const medData = allPoints.map(p => {
        const s = [...p.evs.map(_getProdForReport)].sort((a,b)=>a-b);
        return s.length ? (s.length%2===0?(s[s.length/2-1]+s[s.length/2])/2:s[Math.floor(s.length/2)]) : 0;
      });
      buildChart(trendProdRef, trendProdChart, {
        type: 'line',
        data: { labels: years, datasets: [
          { label:'MГ©dia', data:avgData, borderColor:'#1a4b8c', backgroundColor:'#1a4b8c20',
            borderWidth:2.5, pointRadius:5, fill:true, tension:0.3 },
          { label:'Mediana', data:medData, borderColor:'#7a3b8c', backgroundColor:'transparent',
            borderWidth:2, pointRadius:4, borderDash:[5,3], tension:0.3 },
        ]},
        options: { responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{position:'bottom',labels:{font:{size:11},padding:10}} },
          scales:{
            x:{ticks:{font:{size:10}},grid:{color:'#ebe9e4'}},
            y:{beginAtZero:false, ticks:{font:{size:10},callback:v=>v+' pts'},grid:{color:'#ebe9e4'}},
          },
        },
      });
    }, [allPoints]);

    // Chart 2: Taxa de aprovaГ§ГЈo por ano
    useEffect(() => {
      const aprovData = allPoints.map(p => {
        if (!p.evs.length) return 0;
        return Math.round(p.evs.filter(ev=>_aprov(ev,p.tDE,p.t20)).length/p.evs.length*100);
      });
      const colors = aprovData.map(v => v>=75?'#2d7a3a':v>=50?'#b36b1a':'#b33a3a');
      buildChart(trendAprovRef, trendAprovChart, {
        type: 'bar',
        data: { labels: years, datasets: [{
          label:'% Acima da Reta', data:aprovData,
          backgroundColor: colors.map(c=>c+'cc'), borderColor: colors,
          borderWidth:2, borderRadius:4,
        }]},
        options: { responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false},
            tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y}% acima da reta`}} },
          scales:{
            x:{ticks:{font:{size:10}},grid:{display:false}},
            y:{min:0,max:100,ticks:{font:{size:10},callback:v=>v+'%'},grid:{color:'#ebe9e4'}},
          },
        },
      });
    }, [allPoints]);

    // Chart 3: EvoluГ§ГЈo por categoria (linha por categoria)
    useEffect(() => {
      const cats = [
        {key:'PRI', label:'Prod.Intelectual', color:'#7a3b8c'},
        {key:'PSQ', label:'Pesquisa',         color:'#2d7a3a'},
        {key:'EXT', label:'ExtensГЈo',         color:'#b36b1a'},
        {key:'ADM', label:'Administrativo',   color:'#8c3b3b'},
        {key:'ENS_TOTAL', label:'Ensino',     color:'#1a4b8c'},
      ];
      const datasets = cats.map(c => ({
        label: c.label,
        data: allPoints.map(p => {
          if (!p.evs.length) return 0;
          return Math.round(p.evs.map(ev=>ev.scores[c.key]).reduce((s,v)=>s+v,0)/p.evs.length);
        }),
        borderColor: c.color, backgroundColor: c.color+'20',
        borderWidth: 2, pointRadius: 4, tension: 0.3,
      }));
      buildChart(trendCatRef, trendCatChart, {
        type: 'line', data:{ labels:years, datasets },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:12}}},
          scales:{
            x:{ticks:{font:{size:10}},grid:{color:'#ebe9e4'}},
            y:{beginAtZero:true,ticks:{font:{size:10},callback:v=>v+' pts'},grid:{color:'#ebe9e4'}},
          },
        },
      });
    }, [allPoints]);

    // Chart 4: EvoluГ§ГЈo por ГЎrea (produГ§ГЈo mГ©dia)
    useEffect(() => {
      const datasets = AREAS.map(ar => ({
        label: ar.label,
        data: allPoints.map(p => {
          const evs = p.evs.filter(ev=>ev.area===ar.id);
          if (!evs.length) return null;
          return Math.round(evs.map(_getProdForReport).reduce((s,v)=>s+v,0)/evs.length);
        }),
        borderColor: ar.color, backgroundColor: ar.color+'20',
        borderWidth: 2, pointRadius: 4, tension: 0.3,
        spanGaps: true,
      }));
      buildChart(trendAreaRef, trendAreaChart, {
        type: 'line', data:{ labels:years, datasets },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:12}}},
          scales:{
            x:{ticks:{font:{size:10}},grid:{color:'#ebe9e4'}},
            y:{beginAtZero:false,ticks:{font:{size:10},callback:v=>v+' pts'},grid:{color:'#ebe9e4'}},
          },
        },
      });
    }, [allPoints]);

    return e('div', { className:'temporal-section' },
      e('h2', null, 'EvoluГ§ГЈo Temporal da Unidade'),
      e('p', { className:'subtitle' },
        `Comparativo entre ${years[0]} e ${years[years.length-1]} В· ${allPoints.length} ciclos analisados`
      ),
      e('div', { className:'temporal-chart-grid' },
        e('div', { className:'temporal-chart-box' },
          e('h3', null, 'ProduГ§ГЈo AcadГӘmica вҖ” MГ©dia e Mediana'),
          e('p', null, 'EvoluГ§ГЈo da produГ§ГЈo mГ©dia (sem aulas) ao longo dos anos'),
          e('div', { style:{height:220,position:'relative'} }, e('canvas',{ref:trendProdRef})),
        ),
        e('div', { className:'temporal-chart-box' },
          e('h3', null, 'Taxa вҖ” Acima da Reta'),
          e('p', null, '% de professores acima da reta por ano В· Verde вүҘ75% В· Laranja вүҘ50%'),
          e('div', { style:{height:220,position:'relative'} }, e('canvas',{ref:trendAprovRef})),
        ),
      ),
      e('div', { className:'temporal-chart-grid' },
        e('div', { className:'temporal-chart-box' },
          e('h3', null, 'EvoluГ§ГЈo por Categoria de Atividade'),
          e('p', null, 'MГ©dias anuais por categoria вҖ” identifica tendГӘncias de crescimento ou queda'),
          e('div', { style:{height:240,position:'relative'} }, e('canvas',{ref:trendCatRef})),
        ),
        e('div', { className:'temporal-chart-box' },
          e('h3', null, 'EvoluГ§ГЈo por ГҒrea'),
          e('p', null, 'ProduГ§ГЈo mГ©dia anual por ГЎrea вҖ” permite comparar trajetГіrias'),
          e('div', { style:{height:240,position:'relative'} }, e('canvas',{ref:trendAreaRef})),
        ),
      ),    );
  }

  function SummaryTable() {
    if (evaluations.length === 0) return null;

    const approvalMap = useMemo(() => {
      const m = new Map();
      evaluations.forEach(ev =>
        m.set(ev.id, calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20)));
      return m;
    }, [evaluations, thresholdDE, threshold20]);

    const areaMap = useMemo(() => {
      const m = {};
      AREAS.forEach(a => { m[a.id] = a; });
      m[AREA_ALL] = { label: 'вҖ”', color: '#888' };
      return m;
    }, []);

    const cols = [
      { key:'ENS_GRAD',  label:'I-Ens\n(GRAD)' },
      { key:'ENS_TOTAL', label:'I-Ens\n(Total)' },
      { key:'PROJ_ENS',  label:'I-Proj.\nEnsino' },
      { key:'PRI',       label:'II-Prod.\nIntelectual' },
      { key:'PSQ',       label:'III-1\nPesquisa' },
      { key:'EXT',       label:'III-2\nExtensГЈo' },
      { key:'ADM',       label:'IV(1-3)\nAdmin.' },
      { key:'RPT',       label:'IV(4)\nRepres.' },
      { key:'OTR',       label:'V-Outras\nAtiv.' },
      { key:'TOTAL_RAW', label:'Total\nRADOC' },
      { key:'TOTAL',     label:'Total\n(c/ Teto)' },
    ];

    // в”Җв”Җ Helper: HAS necessГЎrio dado prod e T (DE/40H)
    // FГіrmula: SE(prod <= (8/12)*(1,05*T); 16;
    //           SE(prod >  (16/12)*(1,05*T); 8;
    //              24 - 12*prod/(1,05*T)))
    function hasNecessario(prod, T) {
      if (!T || T <= 0) return null;
      const Tm = 1.05 * T;
      if (prod <= (8 / 12) * Tm)  return 16;
      if (prod >  (16 / 12) * Tm) return 8;
      return 24 - (12 * prod) / Tm;
    }

    // в”Җв”Җ Helper: ProduГ§ГЈo necessГЎria dado HAS e T (DE/40H)
    // FГіrmula: SE(HAS < 8; "--------";
    //           SE(HAS >= 16; 0;
    //              TETO((1,05*T)*(24-HAS)/12; 1)))
    function prodNecessaria(has, T) {
      if (!T || T <= 0) return null;
      if (has < 8)  return 'вҖ”вҖ”вҖ”вҖ”';
      if (has >= 16) return 0;
      return Math.ceil((1.05 * T) * (24 - has) / 12);
    }

    // в”Җв”Җ Equivalentes para 20H в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // kneeLeft: prod=(0,8*T)вҶ’has=10 | kneeRight: prod=(1,2*T)вҶ’has=8
    function hasNecessario20(prod, T) {
      if (!T || T <= 0) return null;
      if (prod <= 0.8 * T)  return 10;
      if (prod >  1.2 * T)  return 8;
      // Linear: has = 14 - prod/(0,2*T)
      return 14 - prod / (0.2 * T);
    }

    function prodNecessaria20(has, T) {
      if (!T || T <= 0) return null;
      if (has < 8)  return 'вҖ”вҖ”вҖ”вҖ”';
      if (has >= 10) return 0;
      return Math.ceil(0.2 * T * (14 - has));
    }

    // Filter evaluations by selected area
    const filteredEvs = areaFilter === AREA_ALL
      ? evaluations
      : evaluations.filter(ev => ev.area === areaFilter);

    const areaInfo = (id) => id === AREA_ALL
      ? { label: 'Todos', color: '#1a4b8c' }
      : AREAS.find(a => a.id === id) || { label: id, color: '#555' };

    return e('div', { className:'summary-section' },
      // ГҒrea filter pills
      e('div', { style:{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:14 } },
        [{ id: AREA_ALL, label: 'Todos', color: '#1a4b8c' }, ...AREAS].map(ar =>
          e('button', {
            key: ar.id,
            className: 'regime-btn' + (areaFilter === ar.id ? ' active' : ''),
            style: areaFilter === ar.id ? { background: ar.color, borderColor: ar.color, color: '#fff' } : {},
            onClick: () => setAreaFilter(ar.id),
          },
            ar.label,
            evaluations.filter(ev => ar.id === AREA_ALL ? true : ev.area === ar.id).length > 0
              ? e('span', { style:{ marginLeft:4, opacity:0.75 } },
                  `(${evaluations.filter(ev => ar.id === AREA_ALL ? true : ev.area === ar.id).length})`)
              : null
          )
        )
      ),
      e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 } },
        e('h2', null,
          'Resultado Final вҖ” Com Tetos Aplicados',
          areaFilter !== AREA_ALL
            ? e('span', { style:{ fontSize:13, fontWeight:400, marginLeft:8, color: areaInfo(areaFilter).color } },
                `В· ${areaInfo(areaFilter).label}`)
            : null
        ),
        e('button', { className:'btn btn-sm', onClick:()=>exportCSV(filteredEvs,thresholdDE,threshold20) }, 'в¬Ү Exportar CSV'),
      ),
      e('div', { style:{ overflowX:'auto' } },
        e('table', { className:'summary-table' },
          e('thead', null, e('tr', null,
            e('th', { style:{ textAlign:'left', minWidth:160 } }, 'Nome'),
            e('th', null, 'ГҒrea'),
            e('th', null, 'Regime'),
            ...cols.map(c => e('th', { key:c.key, className:c.key==='TOTAL'?'total-col':'', style:{ whiteSpace:'pre-line' } }, c.label)),
            e('th', { style:{ whiteSpace:'pre-line' } }, 'Prod\n(s/ aulas)'),
            e('th', null, 'HAS'),
            e('th', {
              style:{ minWidth:55, whiteSpace:'pre-line' },
              title:'Percentual do Total com Teto em relaГ§ГЈo ao Total RADOC (sem teto). Valores abaixo de 100% indicam que tetos foram aplicados.'
            }, '% Teto\n/RADOC'),
            e('th', { style:{ minWidth:140 } }, 'Resultado'),
            e('th', {
              style:{ minWidth:90, whiteSpace:'pre-line', background:'#e8eef6', color:'#1a4b8c', borderLeft:'2px solid #93aad4' },
              title:'Horas-aula semanais mГӯnimas que o professor deveria ter ministrado, dado o nГӯvel de produГ§ГЈo',
            }, 'HAS\nnecessГЎrio'),
            e('th', {
              style:{ minWidth:110, whiteSpace:'pre-line', background:'#e8eef6', color:'#1a4b8c' },
              title:'PontuaГ§ГЈo de produГ§ГЈo mГӯnima que o professor deveria ter obtido, dado o nГәmero de horas-aula',
            }, 'ProduГ§ГЈo\nnecessГЎria'),
          )),
          e('tbody', null,
            [...filteredEvs].sort((a,b)=>a.name.localeCompare(b.name)).map(ev => {
              const isDE   = ev.regime !== '20H';
              const T      = isDE ? thresholdDE : threshold20;
              const approval = approvalMap.get(ev.id);
              const _aprov  = approval.status.startsWith('APROVADO');

                : `${hasNeeded.toFixed(1)}h`;

                borderLeft:'2px solid #93aad4',

function inferCADType(classe, nivel) {
  const n = parseInt(nivel);
  const limites = { A: 2, B: 2, C: 4, D: 4 };
  const lim = limites[classe];
  if (!classe || !n || !lim) return null;
  if (n < lim) return 'progressao';
  if (classe === 'C') return 'promocao_d';
  if (classe === 'D') return 'promocao_e';
  return 'promocao_bc';
}

const CAD_TYPE_LABELS = {
  progressao:  'ProgressГЈo Funcional (Art. 27)',
  promocao_bc: 'PromoГ§ГЈo вҶ’ Classe B ou C (Art. 39)',
  promocao_d:  'PromoГ§ГЈo вҶ’ Classe D (Art. 39)',
  promocao_e:  'PromoГ§ГЈo вҶ’ Classe E / Titular (Art. 52)',
  probatorio:  'EstГЎgio ProbatГіrio (Art. 18)',
};

function trunc1(v) { return Math.floor(v * 10) / 10; }

function calcN(P, regime) {
  if (regime === '20H') return Math.min(10, trunc1(P / 20));
  return Math.min(10, trunc1(P / 32));
}

function computeCADCriteria(tipo, regime, sc1, sc2, estudantes4, chefia2) {
  const i1   = Math.round((sc1.ENS_GRAD + sc2.ENS_GRAD) * 100) / 100;
  const i1i2 = Math.round((sc1.ENS_TOTAL + sc2.ENS_TOTAL) * 100) / 100;
  const prod  = Math.round((sc1.PRI + sc2.PRI) * 100) / 100;
  const P     = Math.round((sc1.TOTAL + sc2.TOTAL) * 100) / 100;
  const S     = Math.round((P - prod) * 100) / 100;
  const N     = calcN(P, regime);

  const estVals = estudantes4.map(v => parseFloat(v) || 0).filter((_, i) => estudantes4[i] !== '');
  const estMed  = estVals.length ? trunc1(estVals.reduce((a,b)=>a+b,0) / estVals.length) : null;
  const chVals  = chefia2.map(v => parseFloat(v) || 0).filter((_, i) => chefia2[i] !== '');
  const chMed   = chVals.length ? trunc1(chVals.reduce((a,b)=>a+b,0) / chVals.length) : null;

  let kS, sMin, prodAjustado = null, prodExigido = 40;

  if (tipo === 'progressao' || tipo === 'promocao_bc') {
    kS = regime === '20H' ? 50 : 80; sMin = 160;
    if (S >= sMin) { prodAjustado = Math.max(0, kS - S / 4); prodExigido = prodAjustado; }
    const incisos = [
      { label: 'I. I-1 (Ens. Grad.) вүҘ 80 pts',             val: i1,   thr: 80,          met: i1   >= 80   },
      { label: 'II. I-1+I-2 (Ens. Total) вүҘ 160 pts',        val: i1i2, thr: 160,         met: i1i2 >= 160  },
      { label: 'III. Prod. Intelectual вүҘ ' + prodExigido.toFixed(1) + ' pts' + (prodAjustado !== null ? ' (ajust. В§В§1/В§2)' : ''),
        val: prod, thr: prodExigido, met: prod >= prodExigido, ajuste: prodAjustado !== null ? { S, kS, exigido: prodAjustado } : null },
      { label: 'IV. MГ©dia Estudantes вүҘ 6,0',                val: estMed, thr: 6.0,        met: estMed !== null && estMed >= 6.0 },
      { label: 'V. AvaliaГ§ГЈo Chefia/DireГ§ГЈo вүҘ 6,0',         val: chMed,  thr: 6.0,        met: chMed  !== null && chMed  >= 6.0 },
      { label: 'VI. Nota N da CAD вүҘ 7,5',                   val: N,    thr: 7.5,          met: N >= 7.5 },
    ];
    const reprovado   = incisos.some(c => !c.met);
    const condicional = !incisos[2].met && incisos.filter((_,i)=>i!==2).every(c=>c.met);
    return { i1, i1i2, prod, P, S, N, estMed, chMed, incisos, reprovado, condicional };
  }

  if (tipo === 'promocao_d') {
    kS = regime === '20H' ? 60 : 100; sMin = 160;
    if (S > sMin) { prodAjustado = Math.max(0, kS - S / 4); prodExigido = prodAjustado; }
    const incisos = [
      { label: 'I. I-1 (Ens. Grad.) вүҘ 80 pts',             val: i1,   thr: 80,          met: i1   >= 80   },
      { label: 'II. I-1+I-2 (Ens. Total) вүҘ 160 pts',        val: i1i2, thr: 160,         met: i1i2 >= 160  },
      { label: 'III. Prod. Intelectual вүҘ ' + prodExigido.toFixed(1) + ' pts' + (prodAjustado !== null ? ' (ajust. В§3)' : ''),
        val: prod, thr: prodExigido, met: prod >= prodExigido, ajuste: prodAjustado !== null ? { S, kS, exigido: prodAjustado } : null },
      { label: 'IV. MГ©dia Estudantes вүҘ 6,0',                val: estMed, thr: 6.0,        met: estMed !== null && estMed >= 6.0 },
      { label: 'V. AvaliaГ§ГЈo Chefia/DireГ§ГЈo вүҘ 6,0',         val: chMed,  thr: 6.0,        met: chMed  !== null && chMed  >= 6.0 },
      { label: 'VI. Nota N da CAD вүҘ 7,5',                   val: N,    thr: 7.5,          met: N >= 7.5 },
    ];
    const reprovado   = incisos.some(c => !c.met);
    const condicional = !incisos[2].met && incisos.filter((_,i)=>i!==2).every(c=>c.met);
    return { i1, i1i2, prod, P, S, N, estMed, chMed, incisos, reprovado, condicional };
  }

  if (tipo === 'promocao_e') {
    kS = regime === '20H' ? 70 : 120;
    const Smax = regime === '20H' ? 240 : 400;
    const Smin2 = regime === '20H' ? 160 : 320;
    if (S > Smin2) {
      const Suse = Math.min(S, Smax);
      prodAjustado = Math.max(0, kS - Suse / 4);
      prodExigido  = prodAjustado;
    }
    const incisos = [
      { label: 'I. I-1 (Ens. Grad.) вүҘ 80 pts',             val: i1,   thr: 80,          met: i1   >= 80   },
      { label: 'II. I-1+I-2 (Ens. Total) вүҘ 160 pts',        val: i1i2, thr: 160,         met: i1i2 >= 160  },
      { label: 'III. Prod. Intelectual вүҘ ' + prodExigido.toFixed(1) + ' pts' + (prodAjustado !== null ? ' (ajust. В§3)' : ''),
        val: prod, thr: prodExigido, met: prod >= prodExigido, ajuste: prodAjustado !== null ? { S, kS, exigido: prodAjustado } : null },
      { label: 'IV. Nota N da CAD вүҘ 7,5',                   val: N,    thr: 7.5,          met: N >= 7.5 },
    ];
    const reprovado   = incisos.some(c => !c.met);
    const condicional = !incisos[2].met && incisos.filter((_,i)=>i!==2).every(c=>c.met);
    return { i1, i1i2, prod, P, S, N, estMed, chMed, incisos, reprovado, condicional };
  }

  return null;
}

function computeProbatorio(regime, scoresByYear, kMeses, estPorAno, chefiaPorAno, cursouDocencia) {
  const sc = scoresByYear.reduce((acc, s) => {
    acc.ENS_GRAD  += s.ENS_GRAD;
    acc.ENS_TOTAL += s.ENS_TOTAL;
    acc.PRI       += s.PRI;
    acc.TOTAL     += s.TOTAL;
    return acc;
  }, { ENS_GRAD: 0, ENS_TOTAL: 0, PRI: 0, TOTAL: 0 });

  const k = parseInt(kMeses) || 0;
  const i1   = Math.round(sc.ENS_GRAD  * 100) / 100;
  const i1i2 = Math.round(sc.ENS_TOTAL * 100) / 100;
  const prod  = Math.round(sc.PRI      * 100) / 100;
  const P     = Math.round(sc.TOTAL    * 100) / 100;

  const divisor = regime === '20H' ? 10 : 16;
  const N = k > 0 ? Math.min(10, trunc1(((P / k) * 12) / divisor)) : 0;

  const thrI1  = Math.round((10 * k / 3) * 100) / 100;
  const thrI12 = Math.round((20 * k / 3) * 100) / 100;
  const thrII  = Math.round((5  * k / 3) * 100) / 100;

  const allEst = estPorAno.flat().filter(v => v !== '').map(v => parseFloat(v) || 0);
  const estMed = allEst.length ? trunc1(allEst.reduce((a,b)=>a+b,0) / allEst.length) : null;
  const allCh  = chefiaPorAno.flat().filter(v => v !== '').map(v => parseFloat(v) || 0);
  const chMed  = allCh.length  ? trunc1(allCh.reduce((a,b)=>a+b,0)  / allCh.length)  : null;

  const incisos = [
    { label: 'I. I-1 acum. вүҘ (10Г—' + k + ')/3 = ' + thrI1.toFixed(1) + ' pts',   val: i1,   thr: thrI1,  met: i1   >= thrI1  },
    { label: 'II. I-1+I-2 acum. вүҘ (20Г—' + k + ')/3 = ' + thrI12.toFixed(1) + ' pts', val: i1i2, thr: thrI12, met: i1i2 >= thrI12 },
    { label: 'III. Prod. Int. acum. вүҘ (5Г—' + k + ')/3 = ' + thrII.toFixed(1) + ' pts',  val: prod, thr: thrII, met: prod >= thrII  },
    { label: 'IV. AvaliaГ§ГЈo Chefia/DireГ§ГЈo вүҘ 6,0',     val: chMed,  thr: 6.0, met: chMed  !== null && chMed  >= 6.0 },
    { label: 'V. MГ©dia Estudantes вүҘ 6,0',              val: estMed, thr: 6.0, met: estMed !== null && estMed >= 6.0 },
    { label: 'VI. Iniciou Curso de DocГӘncia no Ensino Superior', val: null, thr: null, met: cursouDocencia, isBool: true },
    { label: 'VII. Nota N da CAD вүҘ 7,5',               val: N,      thr: 7.5, met: N >= 7.5 },
  ];
  const reprovado = incisos.some(c => !c.met);
  return { i1, i1i2, prod, P, N, k, thrI1, thrI12, thrII, estMed, chMed, incisos, reprovado };
}

function yearFromFile(fileName) {
  const m = (fileName || '').match(/(\d{4})(?:\.pdf)?$/i);
  return m ? m[1] : fileName;
}

function fmtVal(v) {
  if (v === null || v === undefined) return 'вҖ”';
  if (typeof v === 'number') return v % 1 === 0 ? String(v) : v.toFixed(1);
  return String(v);
}

        ),

// в”Җв”Җ React Error Boundary вҖ” catches render errors and shows them в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error('[SICAD ErrorBoundary]', error, info);
  }
  render() {
    if (this.state.hasError) {
      const err = this.state.error;
      const info = this.state.info;
      return React.createElement('div', {
        style: { padding: 40, fontFamily: 'monospace', background: '#fff0f0',
                 border: '2px solid #c00', margin: 20, borderRadius: 8 }
      },
        React.createElement('h2', { style: { color: '#c00', marginBottom: 12 } },
          'вҡ  Erro ao renderizar вҖ” SICAD Avaliador'),
        React.createElement('p', { style: { marginBottom: 8 } },
          React.createElement('strong', null, err && err.message ? err.message : String(err))),
        React.createElement('pre', {
          style: { fontSize: 11, overflowX: 'auto', background: '#fff', padding: 12,
                   borderRadius: 4, whiteSpace: 'pre-wrap', wordBreak: 'break-all' }
        }, err && err.stack ? err.stack : '(sem stack trace)'),
        info && React.createElement('details', { style: { marginTop: 12 } },
          React.createElement('summary', null, 'Component stack'),
          React.createElement('pre', { style: { fontSize: 10 } },
            info.componentStack)
        ),
        React.createElement('button', {
          style: { marginTop: 16, padding: '8px 16px', cursor: 'pointer' },
          onClick: () => window.location.reload()
        }, 'Recarregar pГЎgina')
      );
    }
    return this.props.children;
  }
}

ReactDOM.render(
  React.createElement(ErrorBoundary, null, e(App)),
  document.getElementById('root')
);
</script>
