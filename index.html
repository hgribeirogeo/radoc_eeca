<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SICAD Avaliador вҖ” UFG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface-alt: #fafaf7;
  --border: #e0ddd5;
  --border-strong: #c8c4ba;
  --text: #1a1a18;
  --text-secondary: #6b6860;
  --text-muted: #9a968d;
  --accent: #1a4b8c;
  --accent-light: #e8eef6;
  --accent-hover: #153d72;
  --green: #2d7a3a;
  --green-bg: #e8f5ea;
  --red: #b33a3a;
  --red-bg: #fce8e8;
  --orange: #b36b1a;
  --orange-bg: #fff3e0;
  --cat-ens: #1a4b8c;
  --cat-pri: #7a3b8c;
  --cat-psq: #2d7a3a;
  --cat-ext: #b36b1a;
  --cat-adm: #8c3b3b;
  --cat-rep: #3b6b8c;
  --cat-otr: #5a5a5a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}
.mono { font-family: 'IBM Plex Mono', monospace; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
header {
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  padding: 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
header .inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--accent);
}
header h1 span { color: var(--text-muted); font-weight: 400; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--border-strong); background: var(--surface-alt); }
.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }

/* Upload Zone */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 40px;
  text-align: center;
  margin: 24px 0;
  transition: all 0.2s;
  cursor: pointer;
  background: var(--surface);
}
.upload-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-zone h3 { font-size: 16px; margin-bottom: 8px; }
.upload-zone p { color: var(--text-secondary); font-size: 13px; }
.upload-zone input[type="file"] { display: none; }

/* Processing Log */
.log {
  background: #1e1e1e;
  color: #d4d4d4;
  border-radius: 6px;
  padding: 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  max-height: 200px;
  overflow-y: auto;
  margin: 16px 0;
  line-height: 1.7;
}
.log .ok { color: #6bc96b; }
.log .warn { color: #e6c040; }
.log .err { color: #e66060; }
.log .info { color: #6bb5c9; }

/* Evaluations */
.eval-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
  overflow: hidden;
}
.eval-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}
.eval-header:hover { background: var(--surface-alt); }
.eval-name {
  font-weight: 600;
  font-size: 15px;
}
.eval-name small {
  font-weight: 400;
  color: var(--text-secondary);
  font-size: 12px;
  margin-left: 8px;
}
.eval-scores {
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
}
.eval-detail {
  border-top: 1px solid var(--border);
  padding: 18px;
}
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 16px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0;
}
.tab {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-color: var(--accent); }

/* Items Table */
.items-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.items-table th {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
}
.items-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.items-table tr:hover { background: var(--surface-alt); }
.items-table .cap-hit { color: var(--orange); font-weight: 600; }
.items-table .item-code { font-family: 'IBM Plex Mono', monospace; font-size: 12px; white-space: nowrap; }

/* Summary Table */
.summary-section { margin: 24px 0; }
.summary-section h2 { font-size: 16px; margin-bottom: 12px; }
.summary-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.summary-table th {
  background: var(--accent);
  color: white;
  padding: 10px 8px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.summary-table td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
}
.summary-table td:first-child {
  text-align: left;
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 500;
}
.summary-table tr:nth-child(even) { background: var(--surface-alt); }
.summary-table .total-col { background: var(--accent-light); font-weight: 700; color: var(--accent); }

/* Score Breakdown */
.breakdown {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.breakdown-card {
  padding: 12px;
  border-radius: 6px;
  border-left: 4px solid;
}
.breakdown-card h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.7; }
.breakdown-card .value { font-size: 24px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.breakdown-card .detail { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Settings Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.modal {
  background: var(--surface);
  border-radius: 8px;
  padding: 24px;
  width: 480px;
  max-width: 90vw;
}
.modal h3 { margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.modal input[type="text"], .modal input[type="password"] {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  margin-bottom: 12px;
}
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* Status indicators */
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.status-dot.green { background: var(--green); }
.status-dot.orange { background: var(--orange); }
.status-dot.red { background: var(--red); }

footer {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 40px;
  border-top: 1px solid var(--border);
}

/* в”Җв”Җ Analysis Chart в”Җв”Җ */
.analysis-section {
  margin: 24px 0 40px 0;
}
.analysis-section h2 {
  font-size: 16px;
  margin-bottom: 4px;
}
.analysis-section .subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 16px;
  align-items: start;
}
.chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  position: relative;
}
.chart-box canvas { display: block; }
.stats-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
}
.stats-panel h3 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-secondary); }
.stat-value {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 13px;
}
.stat-value.green { color: var(--green); }
.stat-value.red   { color: var(--red); }
.stat-value.blue  { color: var(--accent); }
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 8px;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.regime-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.regime-btn {
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  background: var(--surface-alt);
  color: var(--text-secondary);
  font-family: inherit;
  font-weight: 500;
  transition: all 0.15s;
}
.regime-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.chart-note {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
  text-align: center;
}
@media (max-width: 768px) {
  .chart-grid { grid-template-columns: 1fr; }
}


/* в”Җв”Җ ГҒreas в”Җв”Җ */
.areas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  margin: 0 0 24px 0;
}
.area-upload {
  border: 2px dashed var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  position: relative;
}
.area-upload:hover, .area-upload.dragover {
  border-color: var(--area-color, var(--accent));
  background: color-mix(in srgb, var(--area-color, var(--accent)) 8%, white);
}
.area-upload h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 3px;
  color: var(--area-color, var(--accent));
}
.area-upload p { font-size: 11px; color: var(--text-muted); }
.area-upload input[type="file"] { display: none; }
.area-count {
  position: absolute;
  top: 6px; right: 8px;
  font-size: 10px;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
  background: var(--area-color, var(--accent));
  color: white;
  border-radius: 10px;
  padding: 1px 6px;
}
.area-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 7px;
  border-radius: 3px;
  border: 1px solid;
  white-space: nowrap;
}
.area-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin: 16px 0 8px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.area-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}


/* в”Җв”Җ Linha de mГ©dias в”Җв”Җ */
.avg-row td {
  background: #f0f4fa !important;
  font-weight: 700;
  font-size: 12px;
  border-top: 2px solid #93aad4;
  color: var(--accent);
}
.avg-row td:first-child {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
}
.pct-cell {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
}
.pct-high { color: var(--green); }
.pct-mid  { color: var(--orange); }
.pct-low  { color: var(--red); }


/* в”Җв”Җ Dashboard de gestГЈo в”Җв”Җ */
.dashboard-section {
  margin: 32px 0 8px 0;
}
.dashboard-section h2 {
  font-size: 16px;
  margin-bottom: 4px;
}
.dashboard-section .subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 20px;
}
/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  border-top: 3px solid var(--kpi-color, var(--accent));
}
.kpi-card .kpi-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.kpi-card .kpi-value {
  font-size: 26px;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--kpi-color, var(--accent));
  line-height: 1;
}
.kpi-card .kpi-sub {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}
/* Chart grid for dashboard */
.dash-charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.dash-chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.dash-chart-box h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.dash-chart-box p {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.dash-chart-full {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
}
.dash-chart-full h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.dash-chart-full p {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
@media (max-width: 800px) {
  .dash-charts-grid { grid-template-columns: 1fr; }
}


/* в”Җв”Җ Gerador de relatГіrio в”Җв”Җ */
.report-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 20px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  border-radius: 8px;
}
.report-bar label {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}
.report-bar select {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: inherit;
  font-size: 13px;
  background: var(--surface-alt);
  color: var(--text);
  min-width: 230px;
}
.report-bar .hint {
  font-size: 11px;
  color: var(--text-muted);
  flex: 1;
}
.btn-report {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: opacity 0.2s;
}
.btn-report:hover { opacity: 0.85; }
.btn-report:disabled { opacity: 0.45; cursor: not-allowed; }
.report-spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}


/* в”Җв”Җ Mapa de Calor в”Җв”Җ */
.heatmap-wrap {
  overflow-x: auto;
  margin-top: 6px;
}
.heatmap-table {
  border-collapse: separate;
  border-spacing: 3px;
  font-size: 11px;
  width: 100%;
}
.heatmap-table th {
  background: none;
  color: var(--text-secondary);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 6px;
  text-align: center;
  white-space: nowrap;
}
.heatmap-table th.row-label {
  text-align: left;
  min-width: 110px;
  color: var(--accent);
}
.hm-cell {
  border-radius: 5px;
  padding: 7px 4px;
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: default;
  transition: transform 0.1s;
  min-width: 64px;
}
.hm-cell:hover { transform: scale(1.06); z-index: 2; position: relative; }
.hm-label {
  font-size: 9px;
  font-weight: 400;
  opacity: 0.75;
  display: block;
  margin-top: 2px;
  font-family: 'IBM Plex Sans', sans-serif;
  white-space: nowrap;
}
.hm-legend {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 10px;
  flex-wrap: wrap;
}
.hm-legend-bar {
  display: flex;
  height: 10px;
  width: 180px;
  border-radius: 3px;
  overflow: hidden;
}


/* в”Җв”Җ AnГЎlise Temporal в”Җв”Җ */
.temporal-section {
  margin: 24px 0 40px 0;
}
.temporal-section h2 { font-size: 16px; margin-bottom: 4px; }
.temporal-section .subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.snapshot-upload {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.snapshot-upload:hover, .snapshot-upload.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.snapshot-upload input[type="file"] { display: none; }
.snapshot-upload .upload-text { flex: 1; }
.snapshot-upload .upload-text h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.snapshot-upload .upload-text p  { font-size: 12px; color: var(--text-muted); }
.snapshot-badges {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
}
.snapshot-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent-light); color: var(--accent);
  border: 1px solid #93aad4; border-radius: 4px;
  padding: 4px 10px; font-size: 12px; font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
}
.snapshot-badge button {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 14px; line-height: 1;
  padding: 0 0 0 4px;
}
.snapshot-badge button:hover { color: var(--red); }
.temporal-chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.temporal-chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.temporal-chart-box h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.temporal-chart-box p  { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
@media (max-width: 800px) { .temporal-chart-grid { grid-template-columns: 1fr; } }
@keyframes spin { to { transform: rotate(360deg); } }

/* в”Җв”Җ CAD Evaluation Module в”Җв”Җ */
.cad-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 24px 16px; overflow-y: auto;
}
.cad-modal {
  background: var(--surface); border-radius: 8px; width: 100%; max-width: 900px;
  border: 1px solid var(--border-strong); box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  display: flex; flex-direction: column; margin-bottom: 24px;
}
.cad-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 2px solid var(--accent);
  background: var(--accent-light); border-radius: 8px 8px 0 0;
}
.cad-modal-header h2 { font-size: 16px; font-weight: 700; color: var(--accent); }
.cad-modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.cad-field-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
.cad-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
.cad-field label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
.cad-field input, .cad-field select {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-family: inherit; font-size: 13px; background: var(--surface); color: var(--text);
  transition: border-color 0.15s;
}
.cad-field input:focus, .cad-field select:focus { outline: none; border-color: var(--accent); }
.cad-type-badge {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent);
  white-space: nowrap; align-self: flex-end;
}
.cad-bienio-panel {
  border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px;
  background: var(--surface-alt);
}
.cad-bienio-title {
  font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.cad-est-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 10px; }
.cad-est-grid label { font-size: 11px; color: var(--text-secondary); font-weight: 600; display: block; margin-bottom: 2px; }
.cad-est-grid input {
  width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px; text-align: right;
}
.cad-chefia-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 10px; }
.cad-chefia-grid label { font-size: 11px; color: var(--text-secondary); font-weight: 600; display: block; margin-bottom: 2px; }
.cad-chefia-grid input {
  width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px; text-align: right;
}
.cad-scores-display {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 12px; font-size: 12px; display: flex; flex-wrap: wrap; gap: 8px 20px;
}
.cad-score-item { display: flex; flex-direction: column; gap: 1px; }
.cad-score-item .sk { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
.cad-score-item .sv { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px; color: var(--accent); }
.cad-results { border: 2px solid var(--border); border-radius: 6px; overflow: hidden; margin-top: 4px; }
.cad-results-header {
  padding: 10px 14px; font-size: 14px; font-weight: 700;
  display: flex; justify-content: space-between; align-items: center;
}
.cad-results-header.approved { background: var(--green-bg); color: var(--green); }
.cad-results-header.reprovado { background: var(--red-bg); color: var(--red); }
.cad-results-header.condicional { background: var(--orange-bg); color: var(--orange); }
.cad-inciso-row {
  display: grid; grid-template-columns: 1fr 110px 72px;
  padding: 8px 14px; font-size: 12px; border-top: 1px solid var(--border);
  align-items: start; gap: 8px;
}
.cad-inciso-row:nth-child(even) { background: var(--surface-alt); }
.cad-inciso-label { line-height: 1.45; }
.cad-inciso-val { font-family: 'IBM Plex Mono', monospace; font-weight: 600; text-align: right; padding-top: 1px; }
.cad-inciso-ok { text-align: center; font-weight: 700; font-size: 13px; padding-top: 1px; }
.cad-inciso-ok.yes { color: var(--green); }
.cad-inciso-ok.no  { color: var(--red); }
.cad-inciso-ok.warn { color: var(--orange); }
.cad-adjust-box {
  background: var(--orange-bg); border: 1px solid var(--orange); border-radius: 4px;
  padding: 8px 12px; font-size: 11px; color: var(--orange); margin-top: 6px; line-height: 1.5;
}
.cad-section-sep {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted); padding: 6px 0 3px 0;
  border-bottom: 1px solid var(--border); margin-top: 4px;
}
.cad-aviso-externo {
  background: var(--orange-bg); border: 1px solid var(--orange); border-radius: 4px;
  padding: 10px 14px; font-size: 12px; color: var(--orange); line-height: 1.6;
}
.cad-bienio-list { display: flex; flex-direction: column; gap: 14px; }
.cad-report-btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// BUG FIX 1 + 2: normalizeCode
//
// PROBLEMA ORIGINAL: O RADOC grava itens da seГ§ГЈo II-3 com espaГ§os
// ao redor dos hГӯfens, ex: "II - 3 - 17". O cГіdigo anterior fazia
// apenas .replace(/\s+/g,'') que eliminava todos os espaГ§os mas NГғO
// tratava "II-3-17" resultante corretamente quando havia espaГ§o antes
// do hГӯfen вҖ” pois [IVX\d.\-]+ na regex parava no primeiro espaГ§o,
// capturando apenas "II".
//
// CORREГҮГғO: Normalizar espaГ§os AO REDOR de hГӯfens primeiro.
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function normalizeCode(raw) {
  let code = raw.trim()
    .replace(/\s*[-вҖ“вҖ”]\s*/g, '-')   // "II - 3 - 17" вҶ’ "II-3-17"
    .replace(/\s+/g, '')             // remove espaГ§os restantes
    .trim();
  if (RULES[code]) return code;
  // PDF Г s vezes usa ponto onde a ResoluГ§ГЈo usa hГӯfen: IV-4.5 вҶ’ IV-4-5
  const dotVariant = code.replace(/\./g, '-');
  if (RULES[dotVariant]) return dotVariant;
  return code;
}

async function extractTextFromPDF(file) {
  const ab  = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  const pageNums = Array.from({ length: pdf.numPages }, (_, i) => i + 1);
  const texts = await Promise.all(pageNums.map(async n => {
    const page = await pdf.getPage(n);
    const tc   = await page.getTextContent();
    return tc.items.map(it => it.str).join(' ');
  }));
  return texts.join('\n');
}

function parseDocenteInfo(text, fileName) {
  // FunГ§ГЈo auxiliar: normaliza espaГ§os extras que PDF.js pode gerar
  // entre palavras (ex: "Andre   Lima" вҶ’ "Andre Lima")
  function norm(s) { return s ? s.replace(/\s+/g, ' ').trim() : ''; }

  const candidates = [];

  // S1: cabeГ§alho "RelatГіrio do docente NAME - SIAPE"
  // PDF.js pode gerar espaГ§os extras no nome вҶ’ norm() resolve
  const m1 = text.match(/Relat[oГі]rio\s+(?:do\s+)?[Dd]ocente\s+(.+?)(?=\s*[-\u2013\u2014]\s*\d{4,})/i);
  if (m1) candidates.push(norm(m1[1]));

  // S2: campo "Nome:" вҖ” terminadores APENAS por palavras-chave conhecidas ou quebra de linha.
  // NГғO usar \s{N,} como terminador: PDF.js pode inserir mГәltiplos espaГ§os
  // no meio do nome (posicionamento de texto), o que truncaria em "primeiro nome".
  const m2 = text.match(/Nome:\s*([\w\s\-\.'\`ГЎГ ГўГЈГ©ГЁГӘГӯГҜГіГҙГөГәГјГ§ГҒГҖГӮГғГүГҲГҠГҚГҸГ“Г”Г•ГҡГңГҮ]+?)(?=\s+(?:Celular|E-mail|Telefone|Matr[Гӯi]cula|SIAPE|Dados|Cargo|Classe|Regime|Situa[Г§c][ГЈa]o|Data\s+de)[^\w]|[\r\n]|$)/i);
  if (m2) candidates.push(norm(m2[1]));

  // S3: campo "Nome:" com lista ainda mais ampla de terminadores conhecidos
  const m3 = text.match(/Nome:\s*([\w\s\-\.'\`ГЎГ ГўГЈГ©ГЁГӘГӯГҜГіГҙГөГәГјГ§ГҒГҖГӮГғГүГҲГҠГҚГҸГ“Г”Г•ГҡГңГҮ]+?)(?=\s+(?:Celular|E-mail|Telefone|Fone|CPF|Matr[Гӯi]cula|SIAPE|Cargo|Classe|N[Гӯi]vel|Regime|LotaГ§ГЈo|Situa[Г§c][ГЈa]o)[^\w]|[\r\n]|$)/i);
  if (m3) candidates.push(norm(m3[1]));

  // S4: variante "Servidor:" ou "Docente:" (algumas unidades)
  const m4 = text.match(/(?:Servidor|Docente):\s*([\w\s\-\.ГЎГ ГўГЈГ©ГЁГӘГӯГҜГіГҙГөГәГјГ§ГҒГҖГӮГғГүГҲГҠГҚГҸГ“Г”Г•ГҡГңГҮ]+?)(?=\s+(?:Matr|SIAPE|Celular|E-mail|\d{4,})|[\r\n])/i);
  if (m4) candidates.push(norm(m4[1]));

  // Filtra candidatos invГЎlidos
  const valid = candidates.filter(c => c && c.length >= 3 && !/^\d+$/.test(c));

  // Escolhe o candidato com MAIS PALAVRAS (nome mais completo)
  let name = null;
  if (valid.length > 0) {
    name = valid.reduce((best, cur) =>
      cur.split(' ').length > best.split(' ').length ? cur : best
    );
  }

  // S5: fallback вҖ” nome extraГӯdo do nome do arquivo
  if (!name) {
    if (fileName) {
      const fn = fileName
        .replace(/\.pdf$/i, '')
        .replace(/[-_]\d{4,}.*$/, '')
        .replace(/[_\-]/g, ' ')
        .replace(/\d+/g, '')
        .replace(/\s+/g, ' ')
        .trim();
      if (fn.length > 2) name = fn;
    }
  }

  name = (name || 'Docente Desconhecido').trim();

  // в”Җв”Җ Regime в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let regime = 'DE';
  if (/Regime\s+de\s+Trabalho:\s*20/i.test(text)) {
    regime = '20H';
  } else if (/20\s*(?:horas?|h\b)/i.test(text.substring(0, 2000)) &&
             !/Dedica/i.test(text.substring(0, 2000))) {
    regime = '20H';
  }

  return { name, regime };
}

function parseItems(text) {
  const items = [];
  const warnings = [];

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // BUG FIX 1 (parte 2): codeRegex
  //
  // PROBLEMA ORIGINAL: /([IVX\d.\-]+)/ parava no primeiro espaГ§o,
  // capturando "II" de "II - 3 - 17".
  //
  // CORREГҮГғO: lookahead em "PontuaГ§ГЈo" ou whitespace longo para
  // delimitar o fim do cГіdigo, permitindo espaГ§os no meio.
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // codeRegex source cached вҖ” new RegExp() per call avoids stale lastIndex (global flag)
  const codeRegex = /Item\s+da\s+Resolu[Г§c][ГЈa]o[:\s]*([IVX][\w\s.\-]*?)(?=\s+Pontua|\s{4,})/gi

  let match;
  const positions = [];

  while ((match = codeRegex.exec(text)) !== null) {
    positions.push({
      index: match.index,
      rawCode: match[1].trim(),
    });
  }

  // в”Җв”Җ Auto-resolution map: Tipo de ProduГ§ГЈo вҶ’ cГіdigo ResoluГ§ГЈo в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // When "Item da ResoluГ§ГЈo: -" but production type is unambiguous,
  // the system can assign the correct code automatically.
  const AUTO_RESOLVE = {
    // Livros
    'Livros e Cap':                           { code:'II-1-7',   pts:40,  note:'Livro c/ corpo editorial (assumido)' },
    'Livros Publicados - Sem Corpo':          { code:'II-1-8',   pts:10,  note:'Livro s/ corpo editorial' },
    'Cap':                                    { code:'II-1-9',   pts:10,  note:'CapГӯtulo de livro' },
    'Trabalho Completo em Anais':             { code:'II-1-6',   pts:10,  note:'Trabalho completo em anais' },
    'Edi':                                    { code:'II-1-10',  pts:12,  note:'EdiГ§ГЈo/organizaГ§ГЈo de livro' },
    'Livro Did':                              { code:'II-1-16',  pts:10,  note:'Livro didГЎtico institucional' },
    'Bolsista Produtividade':                 { code:'II-1-20',  pts:20,  note:'Bolsista Produtividade CNPq (por ano)' },
    // Bancas
    'Banca de Disserta':                      { code:'V-2-3.1',  pts:4,   note:'Banca mestrado (assumido UFG)' },
    'Banca de Tese de Doutorado na UFG':      { code:'V-2-4.1',  pts:6,   note:'Banca doutorado UFG' },
    'Banca de Tese de Doutorado em outra':    { code:'V-2-4.2',  pts:8,   note:'Banca doutorado outra IFE' },
    'Banca de Monografia':                    { code:'V-2-8',    pts:3,   note:'Banca monografia/TCC' },
    'Banca de TCC':                           { code:'V-2-8',    pts:3,   note:'Banca TCC' },
    // OrientaГ§Гөes
    'Orienta':                                { code:'V-1-5',    pts:15,  note:'OrientaГ§ГЈo mestrado defendido (assumido)' },
    // Pareceres tГ©cnicos
    'Projeto/RelatГіrio':                      { code:'II-3-15.4',pts:10,  note:'Projeto/relatГіrio s/ ART (assumido)' },
    'Parecer T':                              { code:'II-3-15.2',pts:5,   note:'Parecer tГ©cnico s/ ART (assumido)' },
    // IniciaГ§ГЈo CientГӯfica
    'Inicia':                                 { code:'V-1-22',   pts:6,   note:'IniciaГ§ГЈo CientГӯfica' },
  };
  // Types that need extra info вҖ” log as warning, cannot auto-score
  const AMBIGUOUS_TYPES = [
    { pattern:'Artigo',         reason:'necessita Qualis (A=25 pts, B=20, C=15, S/Qualis=10)' },
    { pattern:'Resumo Expandido',reason:'necessita Гўmbito (Internacional=8, Nacional=6, Regional=4 pts)' },
    { pattern:'Resumo',         reason:'necessita Гўmbito (Internacional=4, Nacional=3, Regional=2 pts)' },
    { pattern:'Parecer',        reason:'necessita tipo (livro=8, artigo periГіdico=6, trabalho evento=5/3/1 pts)' },
    { pattern:'Exposi',         reason:'necessita Гўmbito e modalidade (individual/coletiva)' },
    { pattern:'Patente',        reason:'verificar registro INPI (com=20 pts)' },
  ];

  function tryAutoResolve(tipo, block) {
    if (!tipo) return null;
    // Check ambiguous first вҖ” these cannot be scored
    for (const amb of AMBIGUOUS_TYPES) {
      if (tipo.includes(amb.pattern)) return { ambiguous:true, reason:amb.reason };
    }
    // Try auto-resolve
    for (const [pattern, rule] of Object.entries(AUTO_RESOLVE)) {
      if (tipo.includes(pattern)) return { ambiguous:false, rule };
    }
    return null;
  }

  // в”Җв”Җ Second pass: catch items where "Item da ResoluГ§ГЈo: -" (no valid code) в”Җв”Җ
  // These are never caught by codeRegex (requires [IVX] first char)
  // We detect them separately and add them as uncoded warnings
  const uncodedRegex = /Item\s+da\s+Resolu[Г§c][ГЈa]o\s*:\s*[-вҖ“вҖ”]\s/gi;
  let uncodedMatch;
  while ((uncodedMatch = uncodedRegex.exec(text)) !== null) {
    // Make sure this position wasn't already captured by codeRegex
    const alreadyCaptured = positions.some(p => Math.abs(p.index - uncodedMatch.index) < 5);
    if (alreadyCaptured) continue;
    const blockStart = uncodedMatch.index;
    const blockEnd   = Math.min(blockStart + 1500, text.length);
    const block2     = text.substring(blockStart, blockEnd);
    const titleM  = block2.match(/T[\xedi]tulo:\s*([^\r\n]{3,120})/i);
    const tipoM   = block2.match(/Tipo\s+de\s+Produ[\xe7c][\xe3a]o:\s*([^\r\n]{3,80})/i);
    const vehicleM= block2.match(/Ve[\xedi]culo[^:]*:\s*([^\r\n]{3,80})/i);
    const title3  = titleM   ? titleM[1].trim()   : null;
    const tipo3   = tipoM    ? tipoM[1].trim()    : null;
    const vehicle3= vehicleM ? vehicleM[1].trim() : null;
    const detail3 = [tipo3, title3, vehicle3].filter(Boolean).join(' В· ');
    const resolved = tryAutoResolve(tipo3, block2);
    if (resolved && !resolved.ambiguous) {
      // Can auto-score this item
      warnings.push({
        type: 'auto_resolvido',
        msg: `Item resolvido pelo sistema вҶ’ ${resolved.rule.note} (${resolved.rule.pts} pts)${title3?' | '+title3:''}`,
        autoCode: resolved.rule.code, autoPts: resolved.rule.pts, autoNote: resolved.rule.note,
        title: title3, tipo: tipo3,
      });
      // Inject a synthetic position so calculateScores can process it
      positions.push({
        index: uncodedMatch.index,
        rawCode: resolved.rule.code,
        sicadPts: null,
        ptsExplicitDash: false,
        _autoResolved: true,
        _autoNote: resolved.rule.note,
        _autoTitle: title3,
      });
    } else {
      warnings.push({
        type: 'sem_codigo',
        msg: `Item sem cГіdigo de resoluГ§ГЈo${resolved ? ' ('+resolved.reason+')' : ''}${detail3 ? ': ' + detail3 : ''}`,
        title: title3, tipo: tipo3, vehicle: vehicle3,
      });
    }
  }

  for (let i = 0; i < positions.length; i++) {
    const blockStart = positions[i].index;
    const blockEnd = i + 1 < positions.length ? positions[i+1].index : Math.min(blockStart + 2000, text.length);
    const block = text.substring(blockStart, blockEnd);

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // BUG FIX 4: detectar "PontuaГ§ГЈo: -" explГӯcito
    //
    // PROBLEMA ORIGINAL: itens com PontuaГ§ГЈo="-" eram processados
    // normalmente. Como item.months ficava undefined, per_year/per_month
    // usavam o fallback "|| 12" вҶ’ pontuaГ§ГЈo fictГӯcia de 1 ano inteiro.
    //
    // CORREГҮГғO: capturar o traГ§o explicitamente e pular o item.
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const ptsRaw = block.match(/Pontua[Г§c][ГЈa]o:\s*([\d.,]+|-)/i);
    const ptsExplicitDash = ptsRaw && ptsRaw[1] === '-';
    const sicadPts = (ptsRaw && ptsRaw[1] !== '-')
      ? parseFloat(ptsRaw[1].replace(',', '.'))
      : null;

    positions[i].sicadPts = sicadPts;
    positions[i].ptsExplicitDash = ptsExplicitDash;
  }

  for (let i = 0; i < positions.length; i++) {
    const pos = positions[i];

    // BUG FIX 4: pular itens com PontuaГ§ГЈo: "-" explГӯcito
    if (pos.ptsExplicitDash) continue;

    const nextIndex = i + 1 < positions.length ? positions[i+1].index : text.length;
    const block = text.substring(pos.index, nextIndex);
    const code = normalizeCode(pos.rawCode);

    // в”Җв”Җ Detectar item sem cГіdigo de resoluГ§ГЈo (professor nГЈo preencheu) в”Җв”Җ
    // Quando "Item da ResoluГ§ГЈo: -" o rawCode serГЎ "-" ou similar
    const rawTrimmed = pos.rawCode.trim();
    if (rawTrimmed === '-' || rawTrimmed === 'вҖ“' || rawTrimmed === 'вҖ”' || rawTrimmed === '') {
      // Extrair tГӯtulo e tipo de produГ§ГЈo para log
      const titleMatch2 = block.match(/T[Гӯi]tulo:[^\S\r\n]*([^\r\n]{3,120})/i);
      const tipoMatch2  = block.match(/Tipo[^\S\r\n]+de[^\S\r\n]+Produ[\u00e7c][\u00e3a]o:[^\S\r\n]*([^\r\n]{3,80})/i);
      const vehicleMatch2 = block.match(/Ve[Гӯi]culo[^:]*:[^\S\r\n]*([^\r\n]{3,80})/i);
      const title2   = titleMatch2  ? titleMatch2[1].trim()  : null;
      const tipo2    = tipoMatch2   ? tipoMatch2[1].trim()   : null;
      const vehicle2 = vehicleMatch2? vehicleMatch2[1].trim(): null;
      const detail2  = [tipo2, title2, vehicle2].filter(Boolean).join(' В· ');
      warnings.push({
        type: 'sem_codigo',
        msg: `Item sem cГіdigo de resoluГ§ГЈo (professor nГЈo preencheu)${detail2 ? ': ' + detail2 : ''}`,
        title: title2, tipo: tipo2, vehicle: vehicle2,
      });
      continue; // pula вҖ” nГЈo pode pontuar sem cГіdigo
    }

    const item = {
      code: code,
      sicadPts: pos.sicadPts,
      rawBlock: block.substring(0, 500),
    };

    // CH Total Alocada (itens de ensino)
    let chMatch = block.match(/CH\s+Total\s+Alocada:\s*([\d.,]+)/i);
    if (!chMatch) chMatch = block.match(/Carga\s+Hor.{0,10}ria\s+Total\s+Alocada:\s*([\d.,]+)/i);
    if (!chMatch) chMatch = block.match(/Carga[^:]*Total\s+Alocada:\s*([\d.,]+)/i);
    if (chMatch) item.chTotal = parseFloat(chMatch[1].replace(',', '.'));

    // Tempo de atuaГ§ГЈo em meses
    const tempoMatch = block.match(/Tempo\s+de\s+Atua[Г§c][ГЈa]o\s+em\s+\d{4}\s*\(Meses\):\s*([\d.,]+)/i);
    if (tempoMatch) item.months = parseFloat(tempoMatch[1].replace(',', '.'));

    const nivelMatch = block.match(/N[Гӯi]vel:\s*(Gradua[Г§c][ГЈa]o|P[Гіo]s-Gradua[Г§c][ГЈa]o)/i);
    if (nivelMatch) item.nivel = nivelMatch[1];

    const cursoMatch = block.match(/Curso:\s*([^\n]+)/i);
    if (cursoMatch) item.curso = cursoMatch[1].trim();

    const compMatch = block.match(/Componente\s+Curricular:\s*([^\n]+)/i);
    if (compMatch) item.componente = compMatch[1].trim();

    const titleMatch = block.match(/T[Гӯi]tulo:\s*([^\n]+)/i);
    if (titleMatch) item.titulo = titleMatch[1].trim();

    const funcMatch = block.match(/Fun[Г§c][ГЈa]o:\s*([^\n]+)/i);
    if (funcMatch) item.funcao = funcMatch[1].trim();

    const discMatch = block.match(/Discente:\s*([^\n]+)/i);
    if (discMatch) item.discente = discMatch[1].trim();

    const tipoMatch = block.match(/Tipo\s+de\s+Produ[Г§c][ГЈa]o:\s*([^\n]+)/i);
    if (tipoMatch) item.tipoProd = tipoMatch[1].trim();

    const portMatch = block.match(/Portaria:\s*([^\n]+)/i);
    if (portMatch) item.portaria = portMatch[1].trim();

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // BUG FIX 3: remover exclusГЈo incorreta do Lato Sensu
    //
    // PROBLEMA ORIGINAL: itens I-2 (PГіs-GraduaГ§ГЈo Lato Sensu) eram
    // excluГӯdos com a mensagem "nГЈo pontua". Isso estГЎ ERRADO.
    //
    // CORREГҮГғO: O Anexo II da ResoluГ§ГЈo CONSUNI 18/2017 define
    // explicitamente "I-2 PГіs-GraduaГ§ГЈo stricto e lato sensu" com
    // a mesma fГіrmula (10 Г— has). O SICAD jГЎ atribui pontuaГ§ГЈo
    // a esses itens. Eles devem ser contabilizados.
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

    if (pos._autoResolved) {
      item._autoResolved = true;
      item._autoNote = pos._autoNote;
      item._autoTitle = pos._autoTitle;
    }

    if (!RULES[code] && !pos._autoResolved) {
      warnings.push(String(`CГіdigo "${code}" (raw: "${pos.rawCode}") nГЈo encontrado nas regras`));
      item.unknown = true;
    }

    items.push(item);
  }

  return { items, warnings };
}

// ============================================================
// SCORE CALCULATOR
// ============================================================
function calculateScores(items) {
  const results = {
    ENS_GRAD: 0, ENS_POS: 0, ENS_TOTAL: 0, PROJ_ENS: 0,
    PRI: 0, PSQ: 0, EXT: 0, ADM: 0, RPT: 0, OTR: 0,
    TOTAL: 0,
    details: [],
    capInfo: [],
  };

  const groups = {};

  for (const item of items) {
    if (item.unknown) {
      results.details.push({ ...item, calculated: item.sicadPts || 0, note: 'CГіdigo desconhecido - usando pontuaГ§ГЈo SICAD' });
      continue;
    }

    const rule = RULES[item.code];
    let rawScore = 0;

    if (rule.type === 'teaching') {
      const ch = item.chTotal || 0;
      rawScore = Math.round(10 * (ch / 32) * 100) / 100;
    } else if (rule.type === 'per_item') {
      rawScore = rule.pts;
    } else if (rule.type === 'per_year') {
      const months = item.months || 12;
      rawScore = Math.round(rule.pts * (months / 12) * 100) / 100;
    } else if (rule.type === 'per_month') {
      const months = item.months || 1;
      rawScore = Math.round(rule.pts * months * 100) / 100;
    }

    const detail = {
      ...item,
      ruleName: rule.name,
      calculated: rawScore,
      category: rule.cat,
      subcategory: rule.sub,
    };
    results.details.push(detail);

    const groupKey = rule.capGrp || item.code;
    if (!groups[groupKey]) {
      groups[groupKey] = { items: [], totalRaw: 0, cap: null, cat: rule.cat, sub: rule.sub };
    }
    groups[groupKey].items.push(detail);
    groups[groupKey].totalRaw += rawScore;
    if (rule.cap) groups[groupKey].cap = rule.cap;
  }

  for (const [groupKey, group] of Object.entries(groups)) {
    let effective = group.totalRaw;
    let capHit = false;

    if (group.cap !== null && group.totalRaw > group.cap) {
      effective = group.cap;
      capHit = true;
      results.capInfo.push({
        group: groupKey,
        raw: Math.round(group.totalRaw * 100) / 100,
        cap: group.cap,
        effective: effective,
        count: group.items.length,
      });
    }

    effective = Math.round(effective * 100) / 100;
    if (capHit) {
      group.items.forEach(it => { it.capHit = true; it.capGroup = groupKey; it.capMax = group.cap; });
    }

    const cat = group.cat;
    const sub = group.sub;

    if (cat === 'ENS' && sub === 'GRAD')      results.ENS_GRAD  += effective;
    else if (cat === 'ENS' && sub === 'POS')  results.ENS_POS   += effective;
    else if (cat === 'PROJ_ENS')              results.PROJ_ENS  += effective;
    else if (cat === 'PRI')                   results.PRI       += effective;
    else if (cat === 'PSQ')                   results.PSQ       += effective;
    else if (cat === 'EXT')                   results.EXT       += effective;
    else if (cat === 'ADM')                   results.ADM       += effective;
    else if (cat === 'RPT')                   results.RPT       += effective;
    else if (cat === 'OTR')                   results.OTR       += effective;
  }

  for (const k of ['ENS_GRAD','ENS_POS','PROJ_ENS','PRI','PSQ','EXT','ADM','RPT','OTR']) {
    results[k] = Math.round(results[k] * 100) / 100;
  }
  results.ENS_TOTAL = Math.round((results.ENS_GRAD + results.ENS_POS) * 100) / 100;
  results.TOTAL = Math.round((results.ENS_TOTAL + results.PROJ_ENS + results.PRI + results.PSQ + results.EXT + results.ADM + results.RPT + results.OTR) * 100) / 100;
  // TOTAL_RAW: soma de todos os grupos SEM aplicar tetos (= como o RADOC reporta)
  const rawGroupTotal = Object.values(groups).reduce((s, g) => s + g.totalRaw, 0);
  results.TOTAL_RAW = Math.round((rawGroupTotal) * 100) / 100;

  return results;
}

// ============================================================
// APPROVAL CALCULATION  (nГЈo alterado)
// ============================================================
function calculateApproval(scores, regime, thresholdDE, threshold20) {
  const has = Math.round((scores.ENS_TOTAL / 10) * 100) / 100;
  const prod = Math.round((scores.PROJ_ENS + scores.PRI + scores.PSQ + scores.EXT + scores.ADM + scores.RPT + scores.OTR) * 100) / 100;

  if (prod === 0 && has === 0) return { status: '--', has, prod };

  if (regime === '20H') {
    const T = threshold20;
    if (!T || T <= 0) return { status: 'Defina limiar 20H', has, prod };
    if (has < 8) return { status: 'REPROVADO (min LDB)', has, prod };
    if (has >= 10) return { status: 'APROVADO (CH>=10)', has, prod };
    if (prod >= 1.2 * T && has >= 8) return { status: 'APROVADO (PROD e 8H)', has, prod };
    if (prod >= 0.2 * T * (14 - has)) return { status: 'APROVADO (reta PRODxCH)', has, prod };
    return { status: 'REPROVADO (reta PRODxCH)', has, prod };
  } else {
    const T = thresholdDE;
    if (!T || T <= 0) return { status: 'Defina limiar DE/40H', has, prod };
    if (has < 8) return { status: 'REPROVADO (min LDB)', has, prod };
    if (has >= 16) return { status: 'APROVADO (CH>=16)', has, prod };
    if (prod >= (16 / 12) * (1.05 * T) && has >= 8) return { status: 'APROVADO (PROD e 8H)', has, prod };
    if (prod >= (1.05 * T) * (24 - has) / 12) return { status: 'APROVADO (reta PRODxCH)', has, prod };
    return { status: 'REPROVADO (reta PRODxCH)', has, prod };
  }
}

// ============================================================
// GIST SYNC MODULE
// ============================================================
const GIST_STORAGE_KEY = 'sicad_avaliador_config';

function loadConfig() {
  try { return JSON.parse(localStorage.getItem(GIST_STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveConfig(cfg) {
  localStorage.setItem(GIST_STORAGE_KEY, JSON.stringify(cfg));
}
async function syncToGist(token, gistId, data) {
  const payload = {
    description: 'SICAD Avaliador вҖ” AvaliaГ§Гөes',
    files: { 'sicad-avaliacoes.json': { content: JSON.stringify(data, null, 2) } }
  };
  const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
  const resp = await fetch(url, {
    method: gistId ? 'PATCH' : 'POST',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!resp.ok) throw new Error(`Gist sync failed: ${resp.status}`);
  return (await resp.json()).id;
}
async function loadFromGist(token, gistId) {
  const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { 'Authorization': `token ${token}` },
  });
  if (!resp.ok) throw new Error(`Gist load failed: ${resp.status}`);
  const result = await resp.json();
  const file = result.files['sicad-avaliacoes.json'];
  return file ? JSON.parse(file.content) : { evaluations: [] };
}

// CSV EXPORT
// ============================================================
function exportCSV(evaluations, thresholdDE, threshold20) {
  function hasNecCSV(prod, T, is20h) {
    if (!T || T <= 0) return '';
    if (is20h) {
      if (prod <= 0.8*T)  return 10;
      if (prod >  1.2*T)  return 8;
      return parseFloat((14 - prod/(0.2*T)).toFixed(1));
    }
    const Tm = 1.05*T;
    if (prod <= (8/12)*Tm)  return 16;
    if (prod >  (16/12)*Tm) return 8;
    return parseFloat((24 - 12*prod/Tm).toFixed(1));
  }
  function prodNecCSV(has, T, is20h) {
    if (!T || T <= 0) return '';
    if (is20h) {
      if (has < 8)   return '--------';
      if (has >= 10) return 0;
      return Math.ceil(0.2*T*(14-has));
    }
    if (has < 8)   return '--------';
    if (has >= 16) return 0;
    return Math.ceil((1.05*T)*(24-has)/12);
  }
  const headers = ['Nome','ГҒrea','Regime','I-Ens(GRAD)','I-Ens(Total)','I-Proj.Ensino','II-Prod.Intelectual','III-1 Pesquisa','III-2 ExtensГЈo','IV(1-3) Admin','IV(4) RepresentaГ§ГЈo','V-Outras','Total RADOC','Total (c/ Teto)','Prod(exceto aulas)','HAS','%(Teto/RADOC)','Resultado','HAS necessГЎrio','ProduГ§ГЈo necessГЎria'];
  const rows = evaluations.map(ev => {
    const isDE     = ev.regime !== '20H';
    const T        = isDE ? thresholdDE : threshold20;
    const approval = calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20);
    const hasNeed  = hasNecCSV(approval.prod, T, !isDE);
    const prodNeed = prodNecCSV(approval.has,  T, !isDE);
    const pct = ev.scores.TOTAL_RAW > 0 ? Math.round(ev.scores.TOTAL/ev.scores.TOTAL_RAW*100)+'%' : 'вҖ”';
    const area = ev.area === AREA_ALL ? 'вҖ”' : (AREAS.find(a=>a.id===ev.area)||{label:ev.area}).label;
    const statusLabel = approval.status.replace(/^APROVADO.*/, 'Acima da Reta').replace(/^REPROVADO.*/, 'Abaixo da Reta').replace('Reprovado','Abaixo da Reta');
    return [ev.name,area,ev.regime,ev.scores.ENS_GRAD,ev.scores.ENS_TOTAL,ev.scores.PROJ_ENS,ev.scores.PRI,ev.scores.PSQ,ev.scores.EXT,ev.scores.ADM,ev.scores.RPT,ev.scores.OTR,ev.scores.TOTAL_RAW,ev.scores.TOTAL,approval.prod,approval.has,pct,statusLabel,hasNeed,prodNeed].join(';');
  });
  const csv = [headers.join(';'), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `sicad-avaliacao-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

}

  chartRef.current = new Chart(ref.current, config);
}

const { useState, useEffect, useRef, useCallback, useMemo } = React;

  const [log, setLog] = useState([]);
  const [processing, setProcessing] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [activeTab, setActiveTab] = useState('ENS');
  const [showSettings, setShowSettings] = useState(false);
  const [cadOpen, setCadOpen] = useState(false);
  const [config, setConfig] = useState(loadConfig());
  const [syncStatus, setSyncStatus] = useState(null);
  const [areaFilter, setAreaFilter] = useState(AREA_ALL);
  const [thresholdDE, setThresholdDE] = useState(parseFloat(localStorage.getItem('sicad_threshold_de') || '0'));
  const [threshold20, setThreshold20] = useState(parseFloat(localStorage.getItem('sicad_threshold_20') || '0'));
  const fileInputRef     = useRef(null);
  const snapshotInputRef = useRef(null);
  const [snapshots, setSnapshots]   = useState([]); // [{year, label, evaluations, thresholdDE, threshold20}]
  const [snapshotYear, setSnapshotYear] = useState(new Date().getFullYear());
  const [reportArea, setReportArea]       = useState(AREA_ALL);
  const [reportLoading, setReportLoading] = useState(false);
  const areaRefs    = useRef({});

  const addLog = useCallback((msg, type='info') => {
    setLog(prev => [...prev, { msg, type, time: new Date().toLocaleTimeString() }]);
  }, []);

  useEffect(() => {
    if (config.token && config.gistId) {
      loadFromGist(config.token, config.gistId)
        .then(data => {
          if (data.evaluations && data.evaluations.length) {
            setEvaluations(data.evaluations);
            setSyncStatus('loaded');
          }
        })
        .catch(() => setSyncStatus('error'));
    }
  }, []);

  async function handleFiles(files, area) {
    setProcessing(true);
    const newEvals = [];

    for (const file of files) {
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        addLog(`${file.name}: nГЈo Г© PDF, ignorando`, 'warn');
        continue;
      }
      addLog(`Processando: ${file.name}...`, 'info');
      try {
        const text = await extractTextFromPDF(file);
        addLog(`  Texto extraГӯdo (${text.length} chars)`, 'ok');
        const { name, regime } = parseDocenteInfo(text, file.name);
        addLog(`  Docente: ${name} (${regime})`, 'ok');
        const { items, warnings } = parseItems(text);
        addLog(`  ${items.length} itens extraГӯdos`, 'ok');
        const strWarnings  = warnings.filter(w => typeof w === 'string');
        const missingCode  = warnings.filter(w => typeof w === 'object' && w.type === 'sem_codigo');
        const autoResolved = warnings.filter(w => typeof w === 'object' && w.type === 'auto_resolvido');
        strWarnings.forEach(w => addLog(`  вҡ  ${w}`, 'warn'));
        if (autoResolved.length > 0) {
          addLog(`  вңҰ ${autoResolved.length} item(ns) resolvido(s) automaticamente pelo sistema:`, 'ok');
          autoResolved.forEach(w => addLog(`    вңҰ ${w.msg}`, 'ok'));
        }
        if (missingCode.length > 0) {
          addLog(`  вҡ  ${missingCode.length} item(ns) nГЈo computado(s) вҖ” requer revisГЈo manual:`, 'warn');
          missingCode.forEach(w => addLog(`    вҶ’ ${w.msg}`, 'warn'));
        }
        const scores = calculateScores(items);
        addLog(`  PontuaГ§ГЈo total (c/ tetos): ${scores.TOTAL}`, 'ok');
        if (scores.capInfo.length > 0) {
          addLog(`  ${scores.capInfo.length} teto(s) aplicado(s):`, 'warn');
          scores.capInfo.forEach(ci => addLog(`    ${ci.group}: ${ci.raw} вҶ’ ${ci.cap} (${ci.count} itens)`, 'warn'));
        }
        newEvals.push({
          id: Date.now() + '_' + Math.random().toString(36).substr(2,6),
          name, regime, fileName: file.name, scores,
          area: area || AREA_ALL,
          itemCount: items.length,
          timestamp: new Date().toISOString(),
          manualReviewIssues: missingCode.map(w => w.msg),
        });
        addLog(`вң“ ${name} processado com sucesso`, 'ok');
      } catch (err) {
        addLog(`вң— Erro em ${file.name}: ${err.message}`, 'err');
      }
    }

    if (newEvals.length > 0) {
      setEvaluations(prev => {
        const updated = [...prev];
        for (const ne of newEvals) {
          // Use name + fileName as dedup key to avoid false matches on "Docente Desconhecido"
          const idx = updated.findIndex(e =>
            e.name === ne.name && e.name !== 'Docente Desconhecido'
              ? true
              : e.fileName === ne.fileName
          );
          if (idx >= 0) { updated[idx] = ne; addLog(`  Substituiu avaliaГ§ГЈo anterior de ${ne.name}`, 'warn'); }
          else updated.push(ne);
        }
        return updated;
      });
    }
    setProcessing(false);
  }

    if (!config.token) { setShowSettings(true); return; }
    setSyncStatus('syncing');
    try {
      const data = { evaluations, lastSync: new Date().toISOString() };
      const gistId = await syncToGist(config.token, config.gistId, data);
      if (!config.gistId) { const newCfg = { ...config, gistId }; setConfig(newCfg); saveConfig(newCfg); }
      setSyncStatus('synced'); addLog('Sincronizado com Gist', 'ok');
    } catch (err) { setSyncStatus('error'); addLog(`Erro sync: ${err.message}`, 'err'); }
  }

      const T_de=thresholdDE, T_20=threshold20, Tm_de=1.05*T_de;

      // Full unit stats (for chart text вҖ” always all areas)
      const fullAreaStats = AREAS.map(ar=>{

               maxProd:Math.max(...evs.map(_getProdForReport)),minProd:Math.min(...evs.map(_getProdForReport))};

      const fullBestArea  = fullAreaStats.length ? fullAreaStats.reduce((b,a)=>a.avgProd>b.avgProd?a:b) : null;

      const areaStats = AREAS.map(ar=>{

      const catData=['ENS_TOTAL','PRI','PSQ','EXT','ADM','RPT','OTR'].map((k,i)=>{
        const labels=['Ensino','ProduГ§ГЈo Intelectual','Pesquisa','ExtensГЈo','Administrativo','RepresentaГ§ГЈo','Outras'];

      const profRows=[...scopeEvs].sort((a,b)=>a.name.localeCompare(b.name)).map(ev=>{
        const ap=getApproval(ev); const isDE=ev.regime!=='20H'; const T=isDE?T_de:T_20; const Tm=1.05*T;
        const area=ev.area===AREA_ALL?'вҖ”':(AREAS.find(a=>a.id===ev.area)||{label:ev.area}).label;

               psq:ev.scores.PSQ,ext:ev.scores.EXT,adm:ev.scores.ADM,otr:ev.scores.OTR,

               pct:pctV,status,hasNec,prodNec,ok:ap.status.startsWith('APROVADO'),
               capHit:ev.scores.TOTAL<ev.scores.TOTAL_RAW};
      });

      const notMet=profRows.filter(p=>!p.ok);
      const best3=[...profRows].sort((a,b)=>b.prod-a.prod).slice(0,3);
      const aboveAvg=scopeEvs.filter(ev=>_getProdForReport(ev)>avgProd);

      const highCapHit=scopeEvs.filter(ev=>ev.scores.TOTAL<ev.scores.TOTAL_RAW*0.85);
      const bestArea=areaStats.length?areaStats.reduce((b,a)=>a.avgProd>b.avgProd?a:b):null;

      // Dashboard charts use ALL evaluations (DE + 20H combined)
      const rptImgsDE  = evaluations.length ? await renderDashCharts(evaluations, 'all', thresholdDE, threshold20) : null;

      // Capture charts

      const imgHist    = imgHistDE    || captureChart('chart-hist');
      function imgTag(src,alt){

      }

      // Narrative
      const narrative=`<h3>1. SГӯntese Executiva</h3>
<p>O relatГіrio analisa <strong>${total} professor(es)</strong> de ${scopeLabel}. ${approved} (${pctA}%) atingiram a meta, enquanto ${total-approved} (${100-pctA}%) nГЈo atingiram. ${T_de>0?`Limiar de referГӘncia (Xm): <strong>${T_de} pts</strong> para DE/40H.`:'<strong>AtenГ§ГЈo:</strong> nenhum limiar Xm foi definido.'} ${pctA>=75?'ГҚndice de aprovaГ§ГЈo satisfatГіrio.':pctA>=50?'ГҚndice moderado вҖ” parte da unidade requer atenГ§ГЈo.':'ГҚndice abaixo do desejГЎvel вҖ” necessГЎria intervenГ§ГЈo da gestГЈo.'} ProduГ§ГЈo mГ©dia: <strong>${avgProd} pts</strong> (mediana: ${Math.round(medProd)} pts); HAS mГ©dio: ${avgHAS} h/sem. ${capHit>0?`${capHit} professor(es) tiveram pontuaГ§ГЈo reduzida pelos tetos da ResoluГ§ГЈo.`:''}</p>

${notMet.length>0?`<h3>6. Professores sem Meta Atingida</h3><ul>${notMet.map(p=>{

  } else if (hasLDB) {

  } else if (p.prodNec!=='вҖ”'&&p.prodNec!=='0') {

  return `<li><strong>${p.name}</strong> (${p.area}, ${p.regime}): ${p.prod} pts, ${p.has}h/sem.${detail}${p.capHit?' Verificar distribuiГ§ГЈo das atividades (teto aplicado).':''}</li>`;
}).join('')}</ul>`:
`<h3>6. Destaques</h3><p>Todos atingiram a meta. Maiores produГ§Гөes: ${best3.map(p=>`<strong>${p.name}</strong> (${p.prod} pts)`).join(', ')}.</p>`}

${onlyEnsin.length>0?`<li><strong>RedistribuiГ§ГЈo de carga docente</strong> para ${onlyEnsin.length} professor(es) com alta carga e baixa produГ§ГЈo.</li>`:''}
${weakCat&&weakCat.avg<20?`<li><strong>Incentivo Г  ${weakCat.label}</strong> (mГ©dia ${weakCat.avg} pts) вҖ” promover aГ§Гөes de capacitaГ§ГЈo.</li>`:''}
${worstArea&&worstArea.pctA<60?`<li><strong>Suporte prioritГЎrio Г  ГЎrea ${worstArea.label}</strong> (${worstArea.pctA}% de aprovaГ§ГЈo).</li>`:''}
${capHit>0?`<li><strong>OrientaГ§ГЈo sobre tetos</strong> para os ${capHit} professor(es) afetados вҖ” diversificar atividades.</li>`:''}
${belowMin.length>0?`<li><strong>AtenГ§ГЈo urgente</strong> para ${belowMin.length} professor(es) com produГ§ГЈo muito abaixo do mГӯnimo.</li>`:''}
<li><strong>Monitoramento semestral</strong> da evoluГ§ГЈo dos indicadores.</li>
<li><strong>Planejamento coletivo</strong> com definiГ§ГЈo de metas por ГЎrea.</li>
</ul>`;

      // в”Җв”Җ AnГЎlise contextual por grГЎfico в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      // Calcula posiГ§ГЈo de cada professor da ГЎrea em relaГ§ГЈo Г  unidade
      const areaProfs = scopeEvs.filter(ev =>
        reportArea !== AREA_ALL ? ev.area === reportArea : true
      );
      const areaAbove = areaProfs.filter(ev => {
        const ap = getApproval(ev); return ap.status.startsWith('APROVADO');
      }).length;
      const areaBelow = areaProfs.length - areaAbove;
      const areaAvgProd = areaProfs.length
        ? Math.round(areaProfs.map(_getProdForReport).reduce((s,v)=>s+v,0)/areaProfs.length)
        : 0;
      const unitAbove = scopeEvs.filter(ev=>getApproval(ev).status.startsWith('APROVADO')).length;
      const unitPct   = Math.round(unitAbove/total*100);
      const areaPct   = areaProfs.length ? Math.round(areaAbove/areaProfs.length*100) : 0;
      const diffPct   = areaPct - unitPct;

      const chartTexts={
        scatter:`Cada cГӯrculo representa um professor вҖ” a <strong>cor identifica sua ГЎrea</strong>. O eixo horizontal mede a produГ§ГЈo acadГӘmica (pontos sem aulas); o vertical mede a carga de ensino (h/sem). A <strong>fronteira em forma de L</strong> define a zona de aprovaГ§ГЈo: Г  esquerda da inflexГЈo esquerda da reta (${T_de>0?Math.round((8/12)*Tm_de)+' pts':'?'}) o professor precisa de pelo menos 16h/sem de ensino; Г  direita da inflexГЈo direita da reta (${T_de>0?Math.round((16/12)*Tm_de)+' pts':'?'}) basta 8h/sem. Na regiГЈo diagonal, ensino e produГ§ГЈo se compensam mutuamente.
${reportArea !== AREA_ALL && areaProfs.length > 0 ? `<br><br>Foco em <strong>${scopeLabel}</strong>: ${areaAbove} de ${areaProfs.length} professores (${areaPct}%) estГЈo acima da fronteira вҖ” ${diffPct > 0 ? `<strong style="color:#2d7a3a">+${diffPct}% acima</strong> da mГ©dia da unidade (${unitPct}%)` : diffPct < 0 ? `<strong style="color:#b33a3a">${diffPct}% abaixo</strong> da mГ©dia da unidade (${unitPct}%)` : `<strong style="color:#b36b1a">igual</strong> Г  mГ©dia da unidade (${unitPct}%)`}. ProduГ§ГЈo mГ©dia da ГЎrea: ${areaAvgProd} pts${T_de>0?' (unidade: '+avgProd+' pts)':''}.` : `<br><br>No conjunto da unidade: ${unitAbove} de ${total} professores (${unitPct}%) atingiram a meta. ProduГ§ГЈo mГ©dia: ${avgProd} pts.`}
<br><br>Pontos <strong>prГіximos Г  fronteira</strong> merecem atenГ§ГЈo prioritГЎria вҖ” uma pequena variaГ§ГЈo de carga ou produГ§ГЈo pode definir aprovaГ§ГЈo ou nГЈo no prГіximo ciclo.`,

        barArea:(() => {

          if (reportArea !== AREA_ALL) {
            const fStat = fullAreaStats.find(a=>a.label===scopeLabel);

        stacked:(() => {
          const cats  = ['ENS_TOTAL','PROJ_ENS','PRI','PSQ','EXT','ADM','RPT','OTR'];

          function topCat(evsList) {

            const tot = cats.reduce((s,k)=>s+Math.round(evsList.map(ev=>ev.scores[k]).reduce((a,b)=>a+b,0)/evsList.length),0);
            const top = cats.map(k=>({k,label:names[k],v:Math.round(evsList.map(ev=>ev.scores[k]).reduce((a,b)=>a+b,0)/evsList.length)})).sort((a,b)=>b.v-a.v)[0];
            return {label:top.label, v:top.v, pct:tot>0?Math.round(top.v/tot*100):0, tot};
          }
          const ut  = topCat(evaluations);
          let txt = ut ? `Na unidade, a categoria com maior peso Г© <strong>${ut.label}</strong> (${ut.v} pts em mГ©dia, ${ut.pct}% da produГ§ГЈo total). ` : '';
          if (reportArea !== AREA_ALL) {

            if (ft) txt += `Em <strong>${scopeLabel}</strong>: categoria principal Г© <strong>${ft.label}</strong> (${ft.v} pts, ${ft.pct}% do total da ГЎrea).`
              + (ft.pct>60?' ConcentraГ§ГЈo elevada вҖ” diversificar atividades reduz o risco de corte pelos tetos da ResoluГ§ГЈo.':'');

        hbar:(() => {

          const ranked  = [...fullAreaStats].sort((a,b)=>b.pctA-a.pctA);
          let txt = `Na unidade, ${pctAll}% dos professores estГЈo acima da reta. Por ГЎrea: `;

          if (reportArea !== AREA_ALL) {
            const fStat = fullAreaStats.find(a=>a.label===scopeLabel);
