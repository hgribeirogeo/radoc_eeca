<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SICAD Avaliador — UFG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface-alt: #fafaf7;
  --border: #e0ddd5;
  --border-strong: #c8c4ba;
  --text: #1a1a18;
  --text-secondary: #6b6860;
  --text-muted: #9a968d;
  --accent: #1a4b8c;
  --accent-light: #e8eef6;
  --accent-hover: #153d72;
  --green: #2d7a3a;
  --green-bg: #e8f5ea;
  --red: #b33a3a;
  --red-bg: #fce8e8;
  --orange: #b36b1a;
  --orange-bg: #fff3e0;
  --cat-ens: #1a4b8c;
  --cat-pri: #7a3b8c;
  --cat-psq: #2d7a3a;
  --cat-ext: #b36b1a;
  --cat-adm: #8c3b3b;
  --cat-rep: #3b6b8c;
  --cat-otr: #5a5a5a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}
.mono { font-family: 'IBM Plex Mono', monospace; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
header {
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  padding: 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
header .inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--accent);
}
header h1 span { color: var(--text-muted); font-weight: 400; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--border-strong); background: var(--surface-alt); }
.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }

/* Upload Zone */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 40px;
  text-align: center;
  margin: 24px 0;
  transition: all 0.2s;
  cursor: pointer;
  background: var(--surface);
}
.upload-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-zone h3 { font-size: 16px; margin-bottom: 8px; }
.upload-zone p { color: var(--text-secondary); font-size: 13px; }
.upload-zone input[type="file"] { display: none; }

/* Processing Log */
.log {
  background: #1e1e1e;
  color: #d4d4d4;
  border-radius: 6px;
  padding: 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  max-height: 200px;
  overflow-y: auto;
  margin: 16px 0;
  line-height: 1.7;
}
.log .ok { color: #6bc96b; }
.log .warn { color: #e6c040; }
.log .err { color: #e66060; }
.log .info { color: #6bb5c9; }

/* Evaluations */
.eval-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
  overflow: hidden;
}
.eval-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}
.eval-header:hover { background: var(--surface-alt); }
.eval-name {
  font-weight: 600;
  font-size: 15px;
}
.eval-name small {
  font-weight: 400;
  color: var(--text-secondary);
  font-size: 12px;
  margin-left: 8px;
}
.eval-scores {
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
}
.eval-detail {
  border-top: 1px solid var(--border);
  padding: 18px;
}
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 16px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0;
}
.tab {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-color: var(--accent); }

/* Items Table */
.items-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.items-table th {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
}
.items-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.items-table tr:hover { background: var(--surface-alt); }
.items-table .cap-hit { color: var(--orange); font-weight: 600; }
.items-table .item-code { font-family: 'IBM Plex Mono', monospace; font-size: 12px; white-space: nowrap; }

/* Summary Table */
.summary-section { margin: 24px 0; }
.summary-section h2 { font-size: 16px; margin-bottom: 12px; }
.summary-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.summary-table th {
  background: var(--accent);
  color: white;
  padding: 10px 8px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.summary-table td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
}
.summary-table td:first-child {
  text-align: left;
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 500;
}
.summary-table tr:nth-child(even) { background: var(--surface-alt); }
.summary-table .total-col { background: var(--accent-light); font-weight: 700; color: var(--accent); }

/* Score Breakdown */
.breakdown {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.breakdown-card {
  padding: 12px;
  border-radius: 6px;
  border-left: 4px solid;
}
.breakdown-card h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.7; }
.breakdown-card .value { font-size: 24px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.breakdown-card .detail { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Settings Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.modal {
  background: var(--surface);
  border-radius: 8px;
  padding: 24px;
  width: 480px;
  max-width: 90vw;
}
.modal h3 { margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.modal input[type="text"], .modal input[type="password"] {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  margin-bottom: 12px;
}
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* Status indicators */
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.status-dot.green { background: var(--green); }
.status-dot.orange { background: var(--orange); }
.status-dot.red { background: var(--red); }

footer {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 40px;
  border-top: 1px solid var(--border);
}

/* ── Analysis Chart ── */
.analysis-section {
  margin: 24px 0 40px 0;
}
.analysis-section h2 {
  font-size: 16px;
  margin-bottom: 4px;
}
.analysis-section .subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 16px;
  align-items: start;
}
.chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  position: relative;
}
.chart-box canvas { display: block; }
.stats-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
}
.stats-panel h3 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-secondary); }
.stat-value {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 13px;
}
.stat-value.green { color: var(--green); }
.stat-value.red   { color: var(--red); }
.stat-value.blue  { color: var(--accent); }
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 8px;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.regime-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.regime-btn {
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  background: var(--surface-alt);
  color: var(--text-secondary);
  font-family: inherit;
  font-weight: 500;
  transition: all 0.15s;
}
.regime-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.chart-note {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
  text-align: center;
}
@media (max-width: 768px) {
  .chart-grid { grid-template-columns: 1fr; }
}


/* ── Áreas ── */
.areas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  margin: 0 0 24px 0;
}
.area-upload {
  border: 2px dashed var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  position: relative;
}
.area-upload:hover, .area-upload.dragover {
  border-color: var(--area-color, var(--accent));
  background: color-mix(in srgb, var(--area-color, var(--accent)) 8%, white);
}
.area-upload h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 3px;
  color: var(--area-color, var(--accent));
}
.area-upload p { font-size: 11px; color: var(--text-muted); }
.area-upload input[type="file"] { display: none; }
.area-count {
  position: absolute;
  top: 6px; right: 8px;
  font-size: 10px;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
  background: var(--area-color, var(--accent));
  color: white;
  border-radius: 10px;
  padding: 1px 6px;
}
.area-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 7px;
  border-radius: 3px;
  border: 1px solid;
  white-space: nowrap;
}
.area-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin: 16px 0 8px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.area-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}


/* ── Linha de médias ── */
.avg-row td {
  background: #f0f4fa !important;
  font-weight: 700;
  font-size: 12px;
  border-top: 2px solid #93aad4;
  color: var(--accent);
}
.avg-row td:first-child {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
}
.pct-cell {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
}
.pct-high { color: var(--green); }
.pct-mid  { color: var(--orange); }
.pct-low  { color: var(--red); }


/* ── Dashboard de gestão ── */
.dashboard-section {
  margin: 32px 0 8px 0;
}
.dashboard-section h2 {
  font-size: 16px;
  margin-bottom: 4px;
}
.dashboard-section .subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 20px;
}
/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  border-top: 3px solid var(--kpi-color, var(--accent));
}
.kpi-card .kpi-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.kpi-card .kpi-value {
  font-size: 26px;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--kpi-color, var(--accent));
  line-height: 1;
}
.kpi-card .kpi-sub {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}
/* Chart grid for dashboard */
.dash-charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.dash-chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.dash-chart-box h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.dash-chart-box p {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.dash-chart-full {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
}
.dash-chart-full h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.dash-chart-full p {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
@media (max-width: 800px) {
  .dash-charts-grid { grid-template-columns: 1fr; }
}


/* ── Gerador de relatório ── */
.report-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 20px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  border-radius: 8px;
}
.report-bar label {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}
.report-bar select {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: inherit;
  font-size: 13px;
  background: var(--surface-alt);
  color: var(--text);
  min-width: 230px;
}
.report-bar .hint {
  font-size: 11px;
  color: var(--text-muted);
  flex: 1;
}
.btn-report {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: opacity 0.2s;
}
.btn-report:hover { opacity: 0.85; }
.btn-report:disabled { opacity: 0.45; cursor: not-allowed; }
.report-spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}


/* ── Mapa de Calor ── */
.heatmap-wrap {
  overflow-x: auto;
  margin-top: 6px;
}
.heatmap-table {
  border-collapse: separate;
  border-spacing: 3px;
  font-size: 11px;
  width: 100%;
}
.heatmap-table th {
  background: none;
  color: var(--text-secondary);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 6px;
  text-align: center;
  white-space: nowrap;
}
.heatmap-table th.row-label {
  text-align: left;
  min-width: 110px;
  color: var(--accent);
}
.hm-cell {
  border-radius: 5px;
  padding: 7px 4px;
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: default;
  transition: transform 0.1s;
  min-width: 64px;
}
.hm-cell:hover { transform: scale(1.06); z-index: 2; position: relative; }
.hm-label {
  font-size: 9px;
  font-weight: 400;
  opacity: 0.75;
  display: block;
  margin-top: 2px;
  font-family: 'IBM Plex Sans', sans-serif;
  white-space: nowrap;
}
.hm-legend {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 10px;
  flex-wrap: wrap;
}
.hm-legend-bar {
  display: flex;
  height: 10px;
  width: 180px;
  border-radius: 3px;
  overflow: hidden;
}

</style>
</head>
<body>
<div id="root"></div>

<script>

// ── Áreas da unidade ────────────────────────────────────────────────
const AREAS = [
  { id: 'civil',     label: 'Construção Civil',           color: '#1a4b8c' },
  { id: 'estrut',    label: 'Estruturas',                 color: '#7a3b8c' },
  { id: 'geotec',    label: 'Geotecnia',                  color: '#2d7a3a' },
  { id: 'gestao',    label: 'Gestão e Geomática',         color: '#b36b1a' },
  { id: 'hidro',     label: 'Hidráulica e Saneamento',    color: '#8c3b3b' },
];
const AREA_ALL = 'all';

// ============================================================
// SCORING RULES ENGINE — CONSUNI 18/2017 Anexo II
// ============================================================
const RULES = {
  // I - ENSINO
  'I-1-1': { cat:'ENS', sub:'GRAD', type:'teaching', name:'Aulas presenciais graduação' },
  'I-1-2': { cat:'ENS', sub:'GRAD', type:'teaching', name:'Aulas EAD graduação' },
  'I-2-1': { cat:'ENS', sub:'POS', type:'teaching', name:'Aulas presenciais pós-graduação' },
  'I-2-2': { cat:'ENS', sub:'POS', type:'teaching', name:'Aulas EAD pós-graduação' },
  'I-3-1': { cat:'PROJ_ENS', type:'per_item', pts:10, name:'Coord. projeto ensino c/ financ.' },
  'I-3-2': { cat:'PROJ_ENS', type:'per_item', pts:5, cap:10, name:'Coord. projeto ensino s/ financ.' },

  // II-1 PRODUÇÃO CIENTÍFICA
  'II-1-1.1': { cat:'PRI', type:'per_item', pts:25, name:'Artigo Qualis A' },

// PDF PARSER
// ============================================================
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─────────────────────────────────────────────────────────────
// BUG FIX 1 + 2: normalizeCode
//
// PROBLEMA ORIGINAL: O RADOC grava itens da seção II-3 com espaços
// ao redor dos hífens, ex: "II - 3 - 17". O código anterior fazia
// apenas .replace(/\s+/g,'') que eliminava todos os espaços mas NÃO
// tratava "II-3-17" resultante corretamente quando havia espaço antes
// do hífen — pois [IVX\d.\-]+ na regex parava no primeiro espaço,
// capturando apenas "II".
//
// CORREÇÃO: Normalizar espaços AO REDOR de hífens primeiro.
// ─────────────────────────────────────────────────────────────
function normalizeCode(raw) {
  let code = raw.trim()
    .replace(/\s*[-–—]\s*/g, '-')   // "II - 3 - 17" → "II-3-17"
    .replace(/\s+/g, '')             // remove espaços restantes
    .trim();
  if (RULES[code]) return code;
  // PDF às vezes usa ponto onde a Resolução usa hífen: IV-4.5 → IV-4-5
  const dotVariant = code.replace(/\./g, '-');
  if (RULES[dotVariant]) return dotVariant;
  return code;
}

async function extractTextFromPDF(file) {
  const ab  = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  const pageNums = Array.from({ length: pdf.numPages }, (_, i) => i + 1);
  const texts = await Promise.all(pageNums.map(async n => {
    const page = await pdf.getPage(n);
    const tc   = await page.getTextContent();
    return tc.items.map(it => it.str).join(' ');
  }));
  return texts.join('\n');
}

function parseDocenteInfo(text, fileName) {
  // Função auxiliar: normaliza espaços extras que PDF.js pode gerar
  // entre palavras (ex: "Andre   Lima" → "Andre Lima")
  function norm(s) { return s ? s.replace(/\s+/g, ' ').trim() : ''; }

  const candidates = [];

  // S1: cabeçalho "Relatório do docente NAME - SIAPE"
  // PDF.js pode gerar espaços extras no nome → norm() resolve
  const m1 = text.match(/Relat[oó]rio\s+(?:do\s+)?[Dd]ocente\s+(.+?)(?=\s*[-\u2013\u2014]\s*\d{4,})/i);
  if (m1) candidates.push(norm(m1[1]));

  // S2: campo "Nome:" — terminadores APENAS por palavras-chave conhecidas ou quebra de linha.
  // NÃO usar \s{N,} como terminador: PDF.js pode inserir múltiplos espaços
  // no meio do nome (posicionamento de texto), o que truncaria em "primeiro nome".
  const m2 = text.match(/Nome:\s*([\w\s\-\.'\`áàâãéèêíïóôõúüçÁÀÂÃÉÈÊÍÏÓÔÕÚÜÇ]+?)(?=\s+(?:Celular|E-mail|Telefone|Matr[íi]cula|SIAPE|Dados|Cargo|Classe|Regime|Situa[çc][ãa]o|Data\s+de)[^\w]|[\r\n]|$)/i);
  if (m2) candidates.push(norm(m2[1]));

  // S3: campo "Nome:" com lista ainda mais ampla de terminadores conhecidos
  const m3 = text.match(/Nome:\s*([\w\s\-\.'\`áàâãéèêíïóôõúüçÁÀÂÃÉÈÊÍÏÓÔÕÚÜÇ]+?)(?=\s+(?:Celular|E-mail|Telefone|Fone|CPF|Matr[íi]cula|SIAPE|Cargo|Classe|N[íi]vel|Regime|Lotação|Situa[çc][ãa]o)[^\w]|[\r\n]|$)/i);
  if (m3) candidates.push(norm(m3[1]));

  // S4: variante "Servidor:" ou "Docente:" (algumas unidades)
  const m4 = text.match(/(?:Servidor|Docente):\s*([\w\s\-\.áàâãéèêíïóôõúüçÁÀÂÃÉÈÊÍÏÓÔÕÚÜÇ]+?)(?=\s+(?:Matr|SIAPE|Celular|E-mail|\d{4,})|[\r\n])/i);
  if (m4) candidates.push(norm(m4[1]));

  // Filtra candidatos inválidos
  const valid = candidates.filter(c => c && c.length >= 3 && !/^\d+$/.test(c));

  // Escolhe o candidato com MAIS PALAVRAS (nome mais completo)
  let name = null;
  if (valid.length > 0) {
    name = valid.reduce((best, cur) =>
      cur.split(' ').length > best.split(' ').length ? cur : best
    );
  }

  // S5: fallback — nome extraído do nome do arquivo
  if (!name) {
    if (fileName) {
      const fn = fileName
        .replace(/\.pdf$/i, '')
        .replace(/[-_]\d{4,}.*$/, '')
        .replace(/[_\-]/g, ' ')
        .replace(/\d+/g, '')
        .replace(/\s+/g, ' ')
        .trim();
      if (fn.length > 2) name = fn;
    }
  }

  name = (name || 'Docente Desconhecido').trim();

  // ── Regime ───────────────────────────────────────────────────────────────
  let regime = 'DE';
  if (/Regime\s+de\s+Trabalho:\s*20/i.test(text)) {
    regime = '20H';
  } else if (/20\s*(?:horas?|h\b)/i.test(text.substring(0, 2000)) &&
             !/Dedica/i.test(text.substring(0, 2000))) {
    regime = '20H';
  }

  return { name, regime };
}

function parseItems(text) {
  const items = [];
  const warnings = [];

  // ─────────────────────────────────────────────────────────
  // BUG FIX 1 (parte 2): codeRegex
  //
  // PROBLEMA ORIGINAL: /([IVX\d.\-]+)/ parava no primeiro espaço,
  // capturando "II" de "II - 3 - 17".
  //
  // CORREÇÃO: lookahead em "Pontuação" ou whitespace longo para
  // delimitar o fim do código, permitindo espaços no meio.
  // ─────────────────────────────────────────────────────────
  // codeRegex source cached — new RegExp() per call avoids stale lastIndex (global flag)
  const codeRegex = /Item\s+da\s+Resolu[çc][ãa]o[:\s]*([IVX][\w\s.\-]*?)(?=\s+Pontua|\s{4,})/gi

  let match;
  const positions = [];

  while ((match = codeRegex.exec(text)) !== null) {
    positions.push({
      index: match.index,
      rawCode: match[1].trim(),
    });
  }

  for (let i = 0; i < positions.length; i++) {
    const blockStart = positions[i].index;
    const blockEnd = i + 1 < positions.length ? positions[i+1].index : Math.min(blockStart + 2000, text.length);
    const block = text.substring(blockStart, blockEnd);

    // ─────────────────────────────────────────────────────
    // BUG FIX 4: detectar "Pontuação: -" explícito
    //
    // PROBLEMA ORIGINAL: itens com Pontuação="-" eram processados
    // normalmente. Como item.months ficava undefined, per_year/per_month
    // usavam o fallback "|| 12" → pontuação fictícia de 1 ano inteiro.
    //
    // CORREÇÃO: capturar o traço explicitamente e pular o item.
    // ─────────────────────────────────────────────────────
    const ptsRaw = block.match(/Pontua[çc][ãa]o:\s*([\d.,]+|-)/i);
    const ptsExplicitDash = ptsRaw && ptsRaw[1] === '-';
    const sicadPts = (ptsRaw && ptsRaw[1] !== '-')
      ? parseFloat(ptsRaw[1].replace(',', '.'))
      : null;

    positions[i].sicadPts = sicadPts;
    positions[i].ptsExplicitDash = ptsExplicitDash;
  }

  for (let i = 0; i < positions.length; i++) {
    const pos = positions[i];

    // BUG FIX 4: pular itens com Pontuação: "-" explícito
    if (pos.ptsExplicitDash) continue;

    const nextIndex = i + 1 < positions.length ? positions[i+1].index : text.length;
    const block = text.substring(pos.index, nextIndex);
    const code = normalizeCode(pos.rawCode);

    const item = {
      code: code,
      sicadPts: pos.sicadPts,
      rawBlock: block.substring(0, 500),
    };

    // CH Total Alocada (itens de ensino)
    let chMatch = block.match(/CH\s+Total\s+Alocada:\s*([\d.,]+)/i);
    if (!chMatch) chMatch = block.match(/Carga\s+Hor.{0,10}ria\s+Total\s+Alocada:\s*([\d.,]+)/i);
    if (!chMatch) chMatch = block.match(/Carga[^:]*Total\s+Alocada:\s*([\d.,]+)/i);
    if (chMatch) item.chTotal = parseFloat(chMatch[1].replace(',', '.'));

    // Tempo de atuação em meses
    const tempoMatch = block.match(/Tempo\s+de\s+Atua[çc][ãa]o\s+em\s+\d{4}\s*\(Meses\):\s*([\d.,]+)/i);
    if (tempoMatch) item.months = parseFloat(tempoMatch[1].replace(',', '.'));

    const nivelMatch = block.match(/N[íi]vel:\s*(Gradua[çc][ãa]o|P[óo]s-Gradua[çc][ãa]o)/i);
    if (nivelMatch) item.nivel = nivelMatch[1];

    const cursoMatch = block.match(/Curso:\s*([^\n]+)/i);
    if (cursoMatch) item.curso = cursoMatch[1].trim();

    const compMatch = block.match(/Componente\s+Curricular:\s*([^\n]+)/i);
    if (compMatch) item.componente = compMatch[1].trim();

    const titleMatch = block.match(/T[íi]tulo:\s*([^\n]+)/i);
    if (titleMatch) item.titulo = titleMatch[1].trim();

    const funcMatch = block.match(/Fun[çc][ãa]o:\s*([^\n]+)/i);
    if (funcMatch) item.funcao = funcMatch[1].trim();

    const discMatch = block.match(/Discente:\s*([^\n]+)/i);
    if (discMatch) item.discente = discMatch[1].trim();

    const tipoMatch = block.match(/Tipo\s+de\s+Produ[çc][ãa]o:\s*([^\n]+)/i);
    if (tipoMatch) item.tipoProd = tipoMatch[1].trim();

    const portMatch = block.match(/Portaria:\s*([^\n]+)/i);
    if (portMatch) item.portaria = portMatch[1].trim();

    // ─────────────────────────────────────────────────────
    // BUG FIX 3: remover exclusão incorreta do Lato Sensu
    //
    // PROBLEMA ORIGINAL: itens I-2 (Pós-Graduação Lato Sensu) eram
    // excluídos com a mensagem "não pontua". Isso está ERRADO.
    //
    // CORREÇÃO: O Anexo II da Resolução CONSUNI 18/2017 define
    // explicitamente "I-2 Pós-Graduação stricto e lato sensu" com
    // a mesma fórmula (10 × has). O SICAD já atribui pontuação
    // a esses itens. Eles devem ser contabilizados.
    // ─────────────────────────────────────────────────────

    if (!RULES[code]) {
      warnings.push(`Código "${code}" (raw: "${pos.rawCode}") não encontrado nas regras`);
      item.unknown = true;
    }

    items.push(item);
  }

  return { items, warnings };
}

// ============================================================
// SCORE CALCULATOR
// ============================================================
function calculateScores(items) {
  const results = {
    ENS_GRAD: 0, ENS_POS: 0, ENS_TOTAL: 0, PROJ_ENS: 0,
    PRI: 0, PSQ: 0, EXT: 0, ADM: 0, RPT: 0, OTR: 0,
    TOTAL: 0,
    details: [],
    capInfo: [],
  };

  const groups = {};

  for (const item of items) {
    if (item.unknown) {
      results.details.push({ ...item, calculated: item.sicadPts || 0, note: 'Código desconhecido - usando pontuação SICAD' });
      continue;
    }

    const rule = RULES[item.code];
    let rawScore = 0;

    if (rule.type === 'teaching') {
      const ch = item.chTotal || 0;
      rawScore = Math.round(10 * (ch / 32) * 100) / 100;
    } else if (rule.type === 'per_item') {
      rawScore = rule.pts;
    } else if (rule.type === 'per_year') {
      const months = item.months || 12;
      rawScore = Math.round(rule.pts * (months / 12) * 100) / 100;
    } else if (rule.type === 'per_month') {
      const months = item.months || 1;
      rawScore = Math.round(rule.pts * months * 100) / 100;
    }

    const detail = {
      ...item,
      ruleName: rule.name,
      calculated: rawScore,
      category: rule.cat,
      subcategory: rule.sub,
    };
    results.details.push(detail);

    const groupKey = rule.capGrp || item.code;
    if (!groups[groupKey]) {
      groups[groupKey] = { items: [], totalRaw: 0, cap: null, cat: rule.cat, sub: rule.sub };
    }
    groups[groupKey].items.push(detail);
    groups[groupKey].totalRaw += rawScore;
    if (rule.cap) groups[groupKey].cap = rule.cap;
  }

  for (const [groupKey, group] of Object.entries(groups)) {
    let effective = group.totalRaw;
    let capHit = false;

    if (group.cap !== null && group.totalRaw > group.cap) {
      effective = group.cap;
      capHit = true;
      results.capInfo.push({
        group: groupKey,
        raw: Math.round(group.totalRaw * 100) / 100,
        cap: group.cap,
        effective: effective,
        count: group.items.length,
      });
    }

    effective = Math.round(effective * 100) / 100;
    if (capHit) {
      group.items.forEach(it => { it.capHit = true; it.capGroup = groupKey; it.capMax = group.cap; });
    }

    const cat = group.cat;
    const sub = group.sub;

    if (cat === 'ENS' && sub === 'GRAD')      results.ENS_GRAD  += effective;
    else if (cat === 'ENS' && sub === 'POS')  results.ENS_POS   += effective;
    else if (cat === 'PROJ_ENS')              results.PROJ_ENS  += effective;
    else if (cat === 'PRI')                   results.PRI       += effective;
    else if (cat === 'PSQ')                   results.PSQ       += effective;
    else if (cat === 'EXT')                   results.EXT       += effective;
    else if (cat === 'ADM')                   results.ADM       += effective;
    else if (cat === 'RPT')                   results.RPT       += effective;
    else if (cat === 'OTR')                   results.OTR       += effective;
  }

  for (const k of ['ENS_GRAD','ENS_POS','PROJ_ENS','PRI','PSQ','EXT','ADM','RPT','OTR']) {
    results[k] = Math.round(results[k] * 100) / 100;
  }
  results.ENS_TOTAL = Math.round((results.ENS_GRAD + results.ENS_POS) * 100) / 100;
  results.TOTAL = Math.round((results.ENS_TOTAL + results.PROJ_ENS + results.PRI + results.PSQ + results.EXT + results.ADM + results.RPT + results.OTR) * 100) / 100;
  // TOTAL_RAW: soma de todos os grupos SEM aplicar tetos (= como o RADOC reporta)
  const rawGroupTotal = Object.values(groups).reduce((s, g) => s + g.totalRaw, 0);
  results.TOTAL_RAW = Math.round((rawGroupTotal) * 100) / 100;

  return results;
}

// ============================================================
// APPROVAL CALCULATION  (não alterado)
// ============================================================
function calculateApproval(scores, regime, thresholdDE, threshold20) {
  const has = Math.round((scores.ENS_TOTAL / 10) * 100) / 100;
  const prod = Math.round((scores.PROJ_ENS + scores.PRI + scores.PSQ + scores.EXT + scores.ADM + scores.RPT + scores.OTR) * 100) / 100;

  if (prod === 0 && has === 0) return { status: '--', has, prod };

  if (regime === '20H') {
    const T = threshold20;
    if (!T || T <= 0) return { status: 'Defina limiar 20H', has, prod };
    if (has < 8) return { status: 'REPROVADO (min LDB)', has, prod };
    if (has >= 10) return { status: 'APROVADO (CH>=10)', has, prod };
    if (prod >= 1.2 * T && has >= 8) return { status: 'APROVADO (PROD e 8H)', has, prod };
    if (prod >= 0.2 * T * (14 - has)) return { status: 'APROVADO (reta PRODxCH)', has, prod };
    return { status: 'REPROVADO (reta PRODxCH)', has, prod };
  } else {
    const T = thresholdDE;
    if (!T || T <= 0) return { status: 'Defina limiar DE/40H', has, prod };
    if (has < 8) return { status: 'REPROVADO (min LDB)', has, prod };
    if (has >= 16) return { status: 'APROVADO (CH>=16)', has, prod };
    if (prod >= (16 / 12) * (1.05 * T) && has >= 8) return { status: 'APROVADO (PROD e 8H)', has, prod };
    if (prod >= (1.05 * T) * (24 - has) / 12) return { status: 'APROVADO (reta PRODxCH)', has, prod };
    return { status: 'REPROVADO (reta PRODxCH)', has, prod };
  }
}

const GIST_STORAGE_KEY = 'sicad_avaliador_config';

function loadConfig() {
  try { return JSON.parse(localStorage.getItem(GIST_STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveConfig(cfg) {
  localStorage.setItem(GIST_STORAGE_KEY, JSON.stringify(cfg));
}
async function syncToGist(token, gistId, data) {
  const payload = {
    description: 'SICAD Avaliador — Avaliações',
    files: { 'sicad-avaliacoes.json': { content: JSON.stringify(data, null, 2) } }
  };
  const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
  const resp = await fetch(url, {
    method: gistId ? 'PATCH' : 'POST',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!resp.ok) throw new Error(`Gist sync failed: ${resp.status}`);
  return (await resp.json()).id;
}
async function loadFromGist(token, gistId) {
  const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { 'Authorization': `token ${token}` },
  });
  if (!resp.ok) throw new Error(`Gist load failed: ${resp.status}`);
  const result = await resp.json();
  const file = result.files['sicad-avaliacoes.json'];
  return file ? JSON.parse(file.content) : { evaluations: [] };
}

// CSV EXPORT
// ============================================================
function exportCSV(evaluations, thresholdDE, threshold20) {
  function hasNecCSV(prod, T, is20h) {
    if (!T || T <= 0) return '';
    if (is20h) {
      if (prod <= 0.8*T)  return 10;
      if (prod >  1.2*T)  return 8;
      return parseFloat((14 - prod/(0.2*T)).toFixed(1));
    }
    const Tm = 1.05*T;
    if (prod <= (8/12)*Tm)  return 16;
    if (prod >  (16/12)*Tm) return 8;
    return parseFloat((24 - 12*prod/Tm).toFixed(1));
  }
  function prodNecCSV(has, T, is20h) {
    if (!T || T <= 0) return '';
    if (is20h) {
      if (has < 8)   return '--------';
      if (has >= 10) return 0;
      return Math.ceil(0.2*T*(14-has));
    }
    if (has < 8)   return '--------';
    if (has >= 16) return 0;
    return Math.ceil((1.05*T)*(24-has)/12);
  }
  const headers = ['Nome','Área','Regime','I-Ens(GRAD)','I-Ens(Total)','I-Proj.Ensino','II-Prod.Intelectual','III-1 Pesquisa','III-2 Extensão','IV(1-3) Admin','IV(4) Representação','V-Outras','Total RADOC','Total (c/ Teto)','Prod(exceto aulas)','HAS','%(Teto/RADOC)','Resultado','HAS necessário','Produção necessária'];
  const rows = evaluations.map(ev => {
    const isDE     = ev.regime !== '20H';
    const T        = isDE ? thresholdDE : threshold20;
    const approval = calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20);
    const hasNeed  = hasNecCSV(approval.prod, T, !isDE);
    const prodNeed = prodNecCSV(approval.has,  T, !isDE);
    const pct = ev.scores.TOTAL_RAW > 0 ? Math.round(ev.scores.TOTAL/ev.scores.TOTAL_RAW*100)+'%' : '—';
    const area = ev.area === AREA_ALL ? '—' : (AREAS.find(a=>a.id===ev.area)||{label:ev.area}).label;
    const statusLabel = approval.status.replace('REPROVADO','Meta não Atingida').replace('Reprovado','Meta não Atingida');
    return [ev.name,area,ev.regime,ev.scores.ENS_GRAD,ev.scores.ENS_TOTAL,ev.scores.PROJ_ENS,ev.scores.PRI,ev.scores.PSQ,ev.scores.EXT,ev.scores.ADM,ev.scores.RPT,ev.scores.OTR,ev.scores.TOTAL_RAW,ev.scores.TOTAL,approval.prod,approval.has,pct,statusLabel,hasNeed,prodNeed].join(';');
  });
  const csv = [headers.join(';'), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `sicad-avaliacao-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

const { useState, useEffect, useRef, useCallback, useMemo } = React;
const e = React.createElement;

function App() {
  const [evaluations, setEvaluations] = useState([]);
  const [log, setLog] = useState([]);
  const [processing, setProcessing] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [activeTab, setActiveTab] = useState('ENS');
  const [showSettings, setShowSettings] = useState(false);
  const [config, setConfig] = useState(loadConfig());
  const [syncStatus, setSyncStatus] = useState(null);
  const [areaFilter, setAreaFilter] = useState(AREA_ALL);
  const [thresholdDE, setThresholdDE] = useState(parseFloat(localStorage.getItem('sicad_threshold_de') || '0'));
  const [threshold20, setThreshold20] = useState(parseFloat(localStorage.getItem('sicad_threshold_20') || '0'));
  const fileInputRef   = useRef(null);
  const [reportArea, setReportArea]       = useState(AREA_ALL);
  const [reportLoading, setReportLoading] = useState(false);
  const areaRefs    = useRef({});

  const addLog = useCallback((msg, type='info') => {
    setLog(prev => [...prev, { msg, type, time: new Date().toLocaleTimeString() }]);
  }, []);

  useEffect(() => {
    if (config.token && config.gistId) {
      loadFromGist(config.token, config.gistId)
        .then(data => {
          if (data.evaluations && data.evaluations.length) {
            setEvaluations(data.evaluations);
            setSyncStatus('loaded');
          }
        })
        .catch(() => setSyncStatus('error'));
    }
  }, []);

  async function handleFiles(files, area) {
    setProcessing(true);
    const newEvals = [];

    for (const file of files) {
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        addLog(`${file.name}: não é PDF, ignorando`, 'warn');
        continue;
      }
      addLog(`Processando: ${file.name}...`, 'info');
      try {
        const text = await extractTextFromPDF(file);
        addLog(`  Texto extraído (${text.length} chars)`, 'ok');
        const { name, regime } = parseDocenteInfo(text, file.name);
        addLog(`  Docente: ${name} (${regime})`, 'ok');
        const { items, warnings } = parseItems(text);
        addLog(`  ${items.length} itens extraídos`, 'ok');
        warnings.forEach(w => addLog(`  ⚠ ${w}`, 'warn'));
        const scores = calculateScores(items);
        addLog(`  Pontuação total (c/ tetos): ${scores.TOTAL}`, 'ok');
        if (scores.capInfo.length > 0) {
          addLog(`  ${scores.capInfo.length} teto(s) aplicado(s):`, 'warn');
          scores.capInfo.forEach(ci => addLog(`    ${ci.group}: ${ci.raw} → ${ci.cap} (${ci.count} itens)`, 'warn'));
        }
        newEvals.push({
          id: Date.now() + '_' + Math.random().toString(36).substr(2,6),
          name, regime, fileName: file.name, scores,
          area: area || AREA_ALL,
          itemCount: items.length,
          timestamp: new Date().toISOString(),
        });
        addLog(`✓ ${name} processado com sucesso`, 'ok');
      } catch (err) {
        addLog(`✗ Erro em ${file.name}: ${err.message}`, 'err');
      }
    }

    if (newEvals.length > 0) {
      setEvaluations(prev => {
        const updated = [...prev];
        for (const ne of newEvals) {
          // Use name + fileName as dedup key to avoid false matches on "Docente Desconhecido"
          const idx = updated.findIndex(e =>
            e.name === ne.name && e.name !== 'Docente Desconhecido'
              ? true
              : e.fileName === ne.fileName
          );
          if (idx >= 0) { updated[idx] = ne; addLog(`  Substituiu avaliação anterior de ${ne.name}`, 'warn'); }
          else updated.push(ne);
        }
        return updated;
      });
    }
    setProcessing(false);
  }

  async function handleSync() {
    if (!config.token) { setShowSettings(true); return; }
    setSyncStatus('syncing');
    try {
      const data = { evaluations, lastSync: new Date().toISOString() };
      const gistId = await syncToGist(config.token, config.gistId, data);
      if (!config.gistId) { const newCfg = { ...config, gistId }; setConfig(newCfg); saveConfig(newCfg); }
      setSyncStatus('synced'); addLog('Sincronizado com Gist', 'ok');
    } catch (err) { setSyncStatus('error'); addLog(`Erro sync: ${err.message}`, 'err'); }
  }

  function handleRemoveEval(id) {
    setEvaluations(prev => prev.filter(e => e.id !== id));
    if (expanded === id) setExpanded(null);
  }

  function handleDrop(evt, area) {
    evt.preventDefault(); evt.currentTarget.classList.remove('dragover');
    handleFiles(Array.from(evt.dataTransfer.files), area);
  }
  function handleDragOver(evt) { evt.preventDefault(); evt.currentTarget.classList.add('dragover'); }
  function handleDragLeave(evt) { evt.currentTarget.classList.remove('dragover'); }


  // ══════════════════════════════════════════════════════════════
  // GERADOR DE RELATÓRIO PDF — versão local (sem API, com gráficos)
  // ══════════════════════════════════════════════════════════════
  async function generateReport() {
    setReportLoading(true);
    try {
      const scopeEvs = reportArea === AREA_ALL
        ? evaluations
        : evaluations.filter(ev => ev.area === reportArea);
      const scopeLabel = reportArea === AREA_ALL
        ? 'Toda a Unidade'
        : (AREAS.find(a => a.id === reportArea) || { label: reportArea }).label;

      if (scopeEvs.length === 0) {
        alert('Nenhum RADOC disponível para o escopo selecionado.');
        setReportLoading(false); return;
      }

      function getProd(ev) {
        return Math.round((ev.scores.PROJ_ENS+ev.scores.PRI+ev.scores.PSQ+
          ev.scores.EXT+ev.scores.ADM+ev.scores.RPT+ev.scores.OTR)*100)/100;
      }
      function getHAS(ev)  { return Math.round((ev.scores.ENS_TOTAL/10)*100)/100; }
      function getApproval(ev) { return calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20); }
      function isApproved(ev)  { return getApproval(ev).status.startsWith('APROVADO'); }
      function pct(n,d)   { return d ? Math.round(n/d*100)+'%' : '—'; }
      function fmtList(arr){ return arr.length ? arr.join(', ') : 'nenhum'; }

      const total    = scopeEvs.length;
      const approved = scopeEvs.filter(isApproved).length;
      const pctA     = Math.round(approved/total*100);
      const prods    = scopeEvs.map(getProd).sort((a,b)=>a-b);
      const hasArr   = scopeEvs.map(getHAS);
      const avgProd  = Math.round(prods.reduce((s,v)=>s+v,0)/prods.length);
      const medProd  = prods.length%2===0?(prods[prods.length/2-1]+prods[prods.length/2])/2:prods[Math.floor(prods.length/2)];
      const avgHAS   = Math.round(hasArr.reduce((s,v)=>s+v,0)/hasArr.length*10)/10;
      const capHit   = scopeEvs.filter(ev=>ev.scores.TOTAL<ev.scores.TOTAL_RAW).length;
      const T_de=thresholdDE, T_20=threshold20, Tm_de=1.05*T_de;

      const areaStats = AREAS.map(ar=>{
        const evs=scopeEvs.filter(ev=>ev.area===ar.id); if(!evs.length)return null;
        const ap=evs.filter(isApproved).length;
        const prd=Math.round(evs.map(getProd).reduce((s,v)=>s+v,0)/evs.length);
        const has=Math.round(evs.map(getHAS).reduce((s,v)=>s+v,0)/evs.length*10)/10;
        return{label:ar.label,color:ar.color||'#1a4b8c',count:evs.length,approved:ap,
               pctA:Math.round(ap/evs.length*100),avgProd:prd,avgHAS:has,
               maxProd:Math.max(...evs.map(getProd)),minProd:Math.min(...evs.map(getProd))};
      }).filter(Boolean);

      const catData=['ENS_TOTAL','PRI','PSQ','EXT','ADM','RPT','OTR'].map((k,i)=>{
        const labels=['Ensino','Produção Intelectual','Pesquisa','Extensão','Administrativo','Representação','Outras'];
        return{key:k,label:labels[i],
               avg:Math.round(scopeEvs.map(ev=>ev.scores[k]).reduce((s,v)=>s+v,0)/total),
               max:Math.max(...scopeEvs.map(ev=>ev.scores[k])),
               min:Math.min(...scopeEvs.map(ev=>ev.scores[k]))};
      });

      const profRows=[...scopeEvs].sort((a,b)=>a.name.localeCompare(b.name)).map(ev=>{
        const ap=getApproval(ev); const isDE=ev.regime!=='20H'; const T=isDE?T_de:T_20; const Tm=1.05*T;
        const area=ev.area===AREA_ALL?'—':(AREAS.find(a=>a.id===ev.area)||{label:ev.area}).label;
        const status=ap.status.replace('REPROVADO','Meta não Atingida').replace('Reprovado','Meta não Atingida');
        const pctV=ev.scores.TOTAL_RAW>0?Math.round(ev.scores.TOTAL/ev.scores.TOTAL_RAW*100)+'%':'—';
        const hasNec = !T ? '—' : isDE
          ? (ap.prod > (16/12)*Tm ? '8h ✓'
             : ap.prod <= (8/12)*Tm ? '16h'
             : Math.round((24-12*ap.prod/Tm)*10)/10 + 'h')
          : (ap.prod > 1.2*T ? '8h ✓'
             : ap.prod <= 0.8*T ? '10h'
             : Math.round((14-ap.prod/(0.2*T))*10)/10 + 'h');
        const prodNec = !T ? '—'
          : ap.has < 8
            ? (isDE ? Math.ceil(Tm*(24-Math.max(ap.has,8))/12)+'pts*' : Math.ceil(0.2*T*(14-Math.max(ap.has,8)))+'pts*')
            : isDE
              ? (ap.has>=16 ? '0' : Math.ceil(Tm*(24-ap.has)/12)+'pts')
              : (ap.has>=10 ? '0' : Math.ceil(0.2*T*(14-ap.has))+'pts');
        return{name:ev.name,area,regime:ev.regime,ens:ev.scores.ENS_TOTAL,pri:ev.scores.PRI,
               psq:ev.scores.PSQ,ext:ev.scores.EXT,adm:ev.scores.ADM,otr:ev.scores.OTR,
               totalRaw:ev.scores.TOTAL_RAW,total:ev.scores.TOTAL,prod:ap.prod,has:ap.has,
               pct:pctV,status,hasNec,prodNec,ok:ap.status.startsWith('APROVADO'),
               capHit:ev.scores.TOTAL<ev.scores.TOTAL_RAW};
      });

      const notMet=profRows.filter(p=>!p.ok);
      const best3=[...profRows].sort((a,b)=>b.prod-a.prod).slice(0,3);
      const aboveAvg=scopeEvs.filter(ev=>getProd(ev)>avgProd);
      const belowAvg=scopeEvs.filter(ev=>getProd(ev)<avgProd);
      const belowMin=T_de>0?scopeEvs.filter(ev=>getProd(ev)<(0.67*Tm_de)):[];
      const onlyEnsin=scopeEvs.filter(ev=>getHAS(ev)>=16&&getProd(ev)<(T_de*0.3||999));
      const highCapHit=scopeEvs.filter(ev=>ev.scores.TOTAL<ev.scores.TOTAL_RAW*0.85);
      const bestArea=areaStats.length?areaStats.reduce((b,a)=>a.avgProd>b.avgProd?a:b):null;
      const worstArea=areaStats.length>1?areaStats.reduce((b,a)=>a.avgProd<b.avgProd?a:b):null;
      const domCat=catData.reduce((b,c)=>c.avg>b.avg?c:b);
      const weakCat=catData.filter(c=>c.key!=='ENS_TOTAL').reduce((b,c)=>c.avg<b.avg?c:b);

      // Capture charts
      function captureChart(id){
        const canvas=document.getElementById(id);
        if(!canvas)return null;
        try{return canvas.toDataURL('image/png');}catch(e){return null;}
      }
      // Capture PROD×HAS scatter (DE and 20H)
      // We need both regime variants → we'll reuse whichever is rendered
      const imgScatter   = captureChart('chart-scatter-de');
      const imgScatter20 = captureChart('chart-scatter-20h');
      const imgBarArea=captureChart('chart-bar-area');
      const imgStacked=captureChart('chart-stacked');
      const imgHbar=captureChart('chart-hbar');
      const imgHist=captureChart('chart-hist');
      function imgTag(src,alt){
        return src?`<img src="${src}" alt="${alt}" style="width:100%;max-height:280px;object-fit:contain;border-radius:4px;border:1px solid #e0ddd5;margin:6px 0">`:
          `<p style="color:#9a968d;font-style:italic;text-align:center;padding:16px">[Gráfico não disponível — os gráficos do Dashboard precisam estar visíveis antes de gerar o relatório]</p>`;
      }

      // Narrative
      const narrative=`<h3>1. Síntese Executiva</h3>
<p>O relatório analisa <strong>${total} professor(es)</strong> de ${scopeLabel}. ${approved} (${pctA}%) atingiram a meta, enquanto ${total-approved} (${100-pctA}%) não atingiram. ${T_de>0?`Limiar de referência (Xm): <strong>${T_de} pts</strong> para DE/40H.`:'<strong>Atenção:</strong> nenhum limiar Xm foi definido.'} ${pctA>=75?'Índice de aprovação satisfatório.':pctA>=50?'Índice moderado — parte da unidade requer atenção.':'Índice abaixo do desejável — necessária intervenção da gestão.'} Produção média: <strong>${avgProd} pts</strong> (mediana: ${Math.round(medProd)} pts); HAS médio: ${avgHAS} h/sem. ${capHit>0?`${capHit} professor(es) tiveram pontuação reduzida pelos tetos da Resolução.`:''}</p>
<h3>2. Análise do Desempenho de Ensino</h3>
<p>HAS médio: <strong>${avgHAS} h/sem</strong>. ${onlyEnsin.length>0?`${onlyEnsin.length} professor(es) com alta carga docente (≥16h/sem) e baixa produção — possível sobrecarga reduzindo tempo para pesquisa.`:'Distribuição entre ensino e produção sem concentrações críticas detectadas.'} Pontuação média em ensino: ${catData.find(c=>c.key==='ENS_TOTAL').avg} pts (variação: ${catData.find(c=>c.key==='ENS_TOTAL').min}–${catData.find(c=>c.key==='ENS_TOTAL').max} pts).</p>
<h3>3. Análise da Produção Intelectual e Técnica</h3>
<p>Categoria predominante: <strong>${domCat.label}</strong> (${domCat.avg} pts/prof). Categoria mais deficiente: <strong>${weakCat.label}</strong> (${weakCat.avg} pts). PRI médio: <strong>${catData.find(c=>c.key==='PRI').avg} pts</strong>. Pesquisa: ${catData.find(c=>c.key==='PSQ').avg} pts. Extensão: ${catData.find(c=>c.key==='EXT').avg} pts. ${aboveAvg.length} professor(es) (${pct(aboveAvg.length,total)}) acima da média; ${belowAvg.length} abaixo. ${belowMin.length>0?`<strong>Alerta:</strong> ${belowMin.length} professor(es) com produção abaixo de 67% do limiar mínimo.`:''}</p>
${areaStats.length>0?`<h3>4. Situação por Área</h3><p>${areaStats.map(a=>`<strong>${a.label}</strong>: ${a.pctA}% meta atingida, produção média ${a.avgProd} pts${T_de>0?(a.avgProd>=Tm_de?' ✓':' ⚠ abaixo do Xm'):''}.`).join(' ')} ${bestArea?`Melhor: <strong>${bestArea.label}</strong> (${bestArea.avgProd} pts).`:''}  ${worstArea&&worstArea.label!==bestArea?.label?`Mais crítica: <strong>${worstArea.label}</strong> (${worstArea.avgProd} pts).`:''}</p>`:''}
<h3>5. Análise dos Tetos Aplicados</h3>
<p>${capHit===0?'Nenhum teto aplicado — atividades bem distribuídas entre as categorias.':
  `${capHit} professor(es) com pontuação reduzida pelos tetos da Resolução. ${highCapHit.length>0?`${highCapHit.length} caso(s) com redução >15% — concentração excessiva em categorias limitadas.`:''} Orientar esses professores a diversificar suas atividades.`}</p>
${notMet.length>0?`<h3>6. Professores sem Meta Atingida</h3><ul>${notMet.map(p=>{
  const hasMin = p.regime==='20H' ? 8 : 8;
  const hasLDB = p.has < hasMin;
  let detail = '';
  if (hasLDB && p.prod >= (T_de||0)) {
    // Fails only because of HAS < 8h (LDB minimum) — production is sufficient
    detail = ` <strong>Produção suficiente (${p.prod} pts ≥ Xm), mas HAS abaixo do mínimo legal: ${p.has}h/sem < 8h/sem.</strong> Aumentar carga de ensino para ao menos 8h/sem resolve a situação.`;
  } else if (hasLDB) {
    detail = ` HAS abaixo do mínimo legal (${p.has}h/sem < 8h/sem). Aumentar carga de ensino.`;
    if (p.prod < (T_de||0)) detail += ` Produção também insuficiente (${p.prod} pts).`;
  } else if (p.prodNec!=='—'&&p.prodNec!=='0') {
    detail = ` Faltam ${p.prodNec} de produção ou ${p.hasNec} de ensino para atingir a meta.`;
  }
  return `<li><strong>${p.name}</strong> (${p.area}, ${p.regime}): ${p.prod} pts, ${p.has}h/sem.${detail}${p.capHit?' Verificar distribuição das atividades (teto aplicado).':''}</li>`;
}).join('')}</ul>`:
`<h3>6. Destaques</h3><p>Todos atingiram a meta. Maiores produções: ${best3.map(p=>`<strong>${p.name}</strong> (${p.prod} pts)`).join(', ')}.</p>`}
<h3>7. Recomendações</h3>
<ul>
${notMet.length>0?`<li><strong>Acompanhamento individual</strong> dos ${notMet.length} professor(es) sem meta — definir plano de metas para o próximo período.</li>`:''}
${onlyEnsin.length>0?`<li><strong>Redistribuição de carga docente</strong> para ${onlyEnsin.length} professor(es) com alta carga e baixa produção.</li>`:''}
${weakCat&&weakCat.avg<20?`<li><strong>Incentivo à ${weakCat.label}</strong> (média ${weakCat.avg} pts) — promover ações de capacitação.</li>`:''}
${worstArea&&worstArea.pctA<60?`<li><strong>Suporte prioritário à área ${worstArea.label}</strong> (${worstArea.pctA}% de aprovação).</li>`:''}
${capHit>0?`<li><strong>Orientação sobre tetos</strong> para os ${capHit} professor(es) afetados — diversificar atividades.</li>`:''}
${belowMin.length>0?`<li><strong>Atenção urgente</strong> para ${belowMin.length} professor(es) com produção muito abaixo do mínimo.</li>`:''}
<li><strong>Monitoramento semestral</strong> da evolução dos indicadores.</li>
<li><strong>Planejamento coletivo</strong> com definição de metas por área.</li>
</ul>`;

      // ── Análise contextual por gráfico ───────────────────
      // Calcula posição de cada professor da área em relação à unidade
      const areaProfs = scopeEvs.filter(ev =>
        reportArea !== AREA_ALL ? ev.area === reportArea : true
      );
      const areaAbove = areaProfs.filter(ev => {
        const ap = getApproval(ev); return ap.status.startsWith('APROVADO');
      }).length;
      const areaBelow = areaProfs.length - areaAbove;
      const areaAvgProd = areaProfs.length
        ? Math.round(areaProfs.map(getProd).reduce((s,v)=>s+v,0)/areaProfs.length)
        : 0;
      const unitAbove = scopeEvs.filter(ev=>getApproval(ev).status.startsWith('APROVADO')).length;
      const unitPct   = Math.round(unitAbove/total*100);
      const areaPct   = areaProfs.length ? Math.round(areaAbove/areaProfs.length*100) : 0;
      const diffPct   = areaPct - unitPct;

      const chartTexts={
        scatter:`Cada círculo representa um professor — a <strong>cor identifica sua área</strong>. O eixo horizontal mede a produção acadêmica (pontos sem aulas); o vertical mede a carga de ensino (h/sem). A <strong>fronteira em forma de L</strong> define a zona de aprovação: à esquerda do joelho esquerdo (${T_de>0?Math.round((8/12)*Tm_de)+' pts':'?'}) o professor precisa de pelo menos 16h/sem de ensino; à direita do joelho direito (${T_de>0?Math.round((16/12)*Tm_de)+' pts':'?'}) basta 8h/sem. Na região diagonal, ensino e produção se compensam mutuamente.
${reportArea !== AREA_ALL && areaProfs.length > 0 ? `<br><br>Foco em <strong>${scopeLabel}</strong>: ${areaAbove} de ${areaProfs.length} professores (${areaPct}%) estão acima da fronteira — ${diffPct > 0 ? `<strong style="color:#2d7a3a">+${diffPct}% acima</strong> da média da unidade (${unitPct}%)` : diffPct < 0 ? `<strong style="color:#b33a3a">${diffPct}% abaixo</strong> da média da unidade (${unitPct}%)` : `<strong style="color:#b36b1a">igual</strong> à média da unidade (${unitPct}%)`}. Produção média da área: ${areaAvgProd} pts${T_de>0?' (unidade: '+avgProd+' pts)':''}.` : `<br><br>No conjunto da unidade: ${unitAbove} de ${total} professores (${unitPct}%) atingiram a meta. Produção média: ${avgProd} pts.`}
<br><br>Pontos <strong>próximos à fronteira</strong> merecem atenção prioritária — uma pequena variação de carga ou produção pode definir aprovação ou não no próximo ciclo.`,

        stacked:`A composição das barras revela o perfil acadêmico de cada área. A fatia <strong>azul (Ensino)</strong> predominante pode indicar sobrecarga que limita tempo para pesquisa e extensão. Fatias <strong>roxas (Produção Intelectual)</strong> elevadas sinalizam áreas com boa produção científica. Identifique áreas onde uma categoria domina toda a barra — esses professores podem estar concentrando atividades em um único grupo, o que além de limitar o crescimento pode gerar cortes pelos tetos da Resolução CONSUNI 18/2017.`,
