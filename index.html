<style>
:root {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface-alt: #fafaf7;
  --border: #e0ddd5;
  --border-strong: #c8c4ba;
  --text: #1a1a18;
  --text-secondary: #6b6860;
  --text-muted: #9a968d;
  --accent: #1a4b8c;
  --accent-light: #e8eef6;
  --accent-hover: #153d72;
  --green: #2d7a3a;
  --green-bg: #e8f5ea;
  --red: #b33a3a;
  --red-bg: #fce8e8;
  --orange: #b36b1a;
  --orange-bg: #fff3e0;
  --cat-ens: #1a4b8c;
  --cat-pri: #7a3b8c;
  --cat-psq: #2d7a3a;
  --cat-ext: #b36b1a;
  --cat-adm: #8c3b3b;
  --cat-rep: #3b6b8c;
  --cat-otr: #5a5a5a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}
.mono { font-family: 'IBM Plex Mono', monospace; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
header {
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  padding: 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
header .inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--accent);
}
header h1 span { color: var(--text-muted); font-weight: 400; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--border-strong); background: var(--surface-alt); }
.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }

/* Upload Zone */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 40px;
  text-align: center;
  margin: 24px 0;
  transition: all 0.2s;
  cursor: pointer;
  background: var(--surface);
}
.upload-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-zone h3 { font-size: 16px; margin-bottom: 8px; }
.upload-zone p { color: var(--text-secondary); font-size: 13px; }
.upload-zone input[type="file"] { display: none; }

/* Processing Log */
.log {
  background: #1e1e1e;
  color: #d4d4d4;
  border-radius: 6px;
  padding: 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  max-height: 200px;
  overflow-y: auto;
  margin: 16px 0;
  line-height: 1.7;
}
.log .ok { color: #6bc96b; }
.log .warn { color: #e6c040; }
.log .err { color: #e66060; }
.log .info { color: #6bb5c9; }

/* Evaluations */
.eval-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
  overflow: hidden;
}
.eval-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}
.eval-header:hover { background: var(--surface-alt); }
.eval-name {
  font-weight: 600;
  font-size: 15px;
}
.eval-name small {
  font-weight: 400;
  color: var(--text-secondary);
  font-size: 12px;
  margin-left: 8px;
}
.eval-scores {
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
}
.eval-detail {
  border-top: 1px solid var(--border);
  padding: 18px;
}
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 16px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0;
}
.tab {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-color: var(--accent); }

/* Items Table */
.items-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.items-table th {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
}
.items-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.items-table tr:hover { background: var(--surface-alt); }
.items-table .cap-hit { color: var(--orange); font-weight: 600; }
.items-table .item-code { font-family: 'IBM Plex Mono', monospace; font-size: 12px; white-space: nowrap; }

/* Summary Table */
.summary-section { margin: 24px 0; }
.summary-section h2 { font-size: 16px; margin-bottom: 12px; }
.summary-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.summary-table th {
  background: var(--accent);
  color: white;
  padding: 10px 8px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.summary-table td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
}
.summary-table td:first-child {
  text-align: left;
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 500;
}
.summary-table tr:nth-child(even) { background: var(--surface-alt); }
.summary-table .total-col { background: var(--accent-light); font-weight: 700; color: var(--accent); }

/* Score Breakdown */
.breakdown {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.breakdown-card {
  padding: 12px;
  border-radius: 6px;
  border-left: 4px solid;
}
.breakdown-card h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.7; }
.breakdown-card .value { font-size: 24px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.breakdown-card .detail { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Settings Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.modal {
  background: var(--surface);
  border-radius: 8px;
  padding: 24px;
  width: 480px;
  max-width: 90vw;
}
.modal h3 { margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.modal input[type="text"], .modal input[type="password"] {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  margin-bottom: 12px;
}
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* Status indicators */
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.status-dot.green { background: var(--green); }
.status-dot.orange { background: var(--orange); }
.status-dot.red { background: var(--red); }

footer {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 40px;
  border-top: 1px solid var(--border);
}

/* ── Analysis Chart ── */
.analysis-section {
  margin: 24px 0 40px 0;
}
.analysis-section h2 {
  font-size: 16px;
  margin-bottom: 4px;
}
.analysis-section .subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 16px;
  align-items: start;
}
.chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  position: relative;
}
.chart-box canvas { display: block; }
.stats-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
}
.stats-panel h3 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-secondary); }
.stat-value {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 13px;
}
.stat-value.green { color: var(--green); }
.stat-value.red   { color: var(--red); }
.stat-value.blue  { color: var(--accent); }
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 8px;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.regime-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.regime-btn {
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  background: var(--surface-alt);
  color: var(--text-secondary);
  font-family: inherit;
  font-weight: 500;
  transition: all 0.15s;
}
.regime-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.chart-note {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
  text-align: center;
}
@media (max-width: 768px) {
  .chart-grid { grid-template-columns: 1fr; }
}

</style>

// ============================================================
// PDF PARSER
// ============================================================
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─────────────────────────────────────────────────────────────
// BUG FIX 1 + 2: normalizeCode
//
// PROBLEMA ORIGINAL: O RADOC grava itens da seção II-3 com espaços
// ao redor dos hífens, ex: "II - 3 - 17". O código anterior fazia
// apenas .replace(/\s+/g,'') que eliminava todos os espaços mas NÃO
// tratava "II-3-17" resultante corretamente quando havia espaço antes
// do hífen — pois [IVX\d.\-]+ na regex parava no primeiro espaço,
// capturando apenas "II".
//
// CORREÇÃO: Normalizar espaços AO REDOR de hífens primeiro.
// ─────────────────────────────────────────────────────────────
function normalizeCode(raw) {
  let code = raw.trim()
    .replace(/\s*[-–—]\s*/g, '-')   // "II - 3 - 17" → "II-3-17"
    .replace(/\s+/g, '')             // remove espaços restantes
    .trim();
  if (RULES[code]) return code;
  // PDF às vezes usa ponto onde a Resolução usa hífen: IV-4.5 → IV-4-5
  const dotVariant = code.replace(/\./g, '-');
  if (RULES[dotVariant]) return dotVariant;
  return code;
}

async function extractTextFromPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    const pageText = tc.items.map(it => it.str).join(' ');
    fullText += pageText + '\n';
  }
  return fullText;
}

function parseDocenteInfo(text) {
  const nameMatch = text.match(/Nome:\s*([A-Za-záàâãéèêíïóôõúüçÁÀÂÃÉÈÊÍÏÓÔÕÚÜÇ\s]+?)(?:\s+Celular:|\s+E-mail:|\s+Telefone:|\s+Dados)/i);
  const name = nameMatch ? nameMatch[1].trim() : 'Docente Desconhecido';

  let regime = 'DE';
  if (/Regime\s+de\s+Trabalho:\s*20/i.test(text)) {
    regime = '20H';
  } else if (/Regime\s+de\s+Trabalho:\s*Dedica/i.test(text) || /Regime\s+de\s+Trabalho:\s*40/i.test(text)) {
    regime = 'DE';
  }

  return { name, regime };
}

function parseItems(text) {
  const items = [];
  const warnings = [];

  // ─────────────────────────────────────────────────────────
  // BUG FIX 1 (parte 2): codeRegex
  //
  // PROBLEMA ORIGINAL: /([IVX\d.\-]+)/ parava no primeiro espaço,
  // capturando "II" de "II - 3 - 17".
  //
  // CORREÇÃO: lookahead em "Pontuação" ou whitespace longo para
  // delimitar o fim do código, permitindo espaços no meio.
  // ─────────────────────────────────────────────────────────
  const codeRegex = /Item\s+da\s+Resolu[çc][ãa]o[:\s]*([IVX][\w\s.\-]*?)(?=\s+Pontua|\s{4,})/gi;

  let match;
  const positions = [];

  while ((match = codeRegex.exec(text)) !== null) {
    positions.push({
      index: match.index,
      rawCode: match[1].trim(),
    });
  }

  for (let i = 0; i < positions.length; i++) {
    const blockStart = positions[i].index;
    const blockEnd = i + 1 < positions.length ? positions[i+1].index : Math.min(blockStart + 2000, text.length);
    const block = text.substring(blockStart, blockEnd);

    // ─────────────────────────────────────────────────────
    // BUG FIX 4: detectar "Pontuação: -" explícito
    //
    // PROBLEMA ORIGINAL: itens com Pontuação="-" eram processados
    // normalmente. Como item.months ficava undefined, per_year/per_month
    // usavam o fallback "|| 12" → pontuação fictícia de 1 ano inteiro.
    //
    // CORREÇÃO: capturar o traço explicitamente e pular o item.
    // ─────────────────────────────────────────────────────
    const ptsRaw = block.match(/Pontua[çc][ãa]o:\s*([\d.,]+|-)/i);
    const ptsExplicitDash = ptsRaw && ptsRaw[1] === '-';
    const sicadPts = (ptsRaw && ptsRaw[1] !== '-')
      ? parseFloat(ptsRaw[1].replace(',', '.'))
      : null;

    positions[i].sicadPts = sicadPts;
    positions[i].ptsExplicitDash = ptsExplicitDash;
  }

  for (let i = 0; i < positions.length; i++) {
    const pos = positions[i];

    // BUG FIX 4: pular itens com Pontuação: "-" explícito
    if (pos.ptsExplicitDash) continue;

    const nextIndex = i + 1 < positions.length ? positions[i+1].index : text.length;
    const block = text.substring(pos.index, nextIndex);
    const code = normalizeCode(pos.rawCode);

    const item = {
      code: code,
      sicadPts: pos.sicadPts,
      rawBlock: block.substring(0, 500),
    };

    // CH Total Alocada (itens de ensino)
    let chMatch = block.match(/CH\s+Total\s+Alocada:\s*([\d.,]+)/i);
    if (!chMatch) chMatch = block.match(/Carga\s+Hor.{0,10}ria\s+Total\s+Alocada:\s*([\d.,]+)/i);
    if (!chMatch) chMatch = block.match(/Carga[^:]*Total\s+Alocada:\s*([\d.,]+)/i);
    if (chMatch) item.chTotal = parseFloat(chMatch[1].replace(',', '.'));

    // Tempo de atuação em meses
    const tempoMatch = block.match(/Tempo\s+de\s+Atua[çc][ãa]o\s+em\s+\d{4}\s*\(Meses\):\s*([\d.,]+)/i);
    if (tempoMatch) item.months = parseFloat(tempoMatch[1].replace(',', '.'));

    const nivelMatch = block.match(/N[íi]vel:\s*(Gradua[çc][ãa]o|P[óo]s-Gradua[çc][ãa]o)/i);
    if (nivelMatch) item.nivel = nivelMatch[1];

    const cursoMatch = block.match(/Curso:\s*([^\n]+)/i);
    if (cursoMatch) item.curso = cursoMatch[1].trim();

    const compMatch = block.match(/Componente\s+Curricular:\s*([^\n]+)/i);
    if (compMatch) item.componente = compMatch[1].trim();

    const titleMatch = block.match(/T[íi]tulo:\s*([^\n]+)/i);
    if (titleMatch) item.titulo = titleMatch[1].trim();

    const funcMatch = block.match(/Fun[çc][ãa]o:\s*([^\n]+)/i);
    if (funcMatch) item.funcao = funcMatch[1].trim();

    const discMatch = block.match(/Discente:\s*([^\n]+)/i);
    if (discMatch) item.discente = discMatch[1].trim();

    const tipoMatch = block.match(/Tipo\s+de\s+Produ[çc][ãa]o:\s*([^\n]+)/i);
    if (tipoMatch) item.tipoProd = tipoMatch[1].trim();

    const portMatch = block.match(/Portaria:\s*([^\n]+)/i);
    if (portMatch) item.portaria = portMatch[1].trim();

    // ─────────────────────────────────────────────────────
    // BUG FIX 3: remover exclusão incorreta do Lato Sensu
    //
    // PROBLEMA ORIGINAL: itens I-2 (Pós-Graduação Lato Sensu) eram
    // excluídos com a mensagem "não pontua". Isso está ERRADO.
    //
    // CORREÇÃO: O Anexo II da Resolução CONSUNI 18/2017 define
    // explicitamente "I-2 Pós-Graduação stricto e lato sensu" com
    // a mesma fórmula (10 × has). O SICAD já atribui pontuação
    // a esses itens. Eles devem ser contabilizados.
    // ─────────────────────────────────────────────────────

    if (!RULES[code]) {
      warnings.push(`Código "${code}" (raw: "${pos.rawCode}") não encontrado nas regras`);
      item.unknown = true;
    }

    items.push(item);
  }

  return { items, warnings };
}

// ============================================================
// SCORE CALCULATOR
// ============================================================
function calculateScores(items) {
  const results = {
    ENS_GRAD: 0, ENS_POS: 0, ENS_TOTAL: 0, PROJ_ENS: 0,
    PRI: 0, PSQ: 0, EXT: 0, ADM: 0, RPT: 0, OTR: 0,
    TOTAL: 0,
    details: [],
    capInfo: [],
  };

  const groups = {};

  for (const item of items) {
    if (item.unknown) {
      results.details.push({ ...item, calculated: item.sicadPts || 0, note: 'Código desconhecido - usando pontuação SICAD' });
      continue;
    }

    const rule = RULES[item.code];
    let rawScore = 0;

    if (rule.type === 'teaching') {
      const ch = item.chTotal || 0;
      rawScore = Math.round(10 * (ch / 32) * 100) / 100;
    } else if (rule.type === 'per_item') {
      rawScore = rule.pts;
    } else if (rule.type === 'per_year') {
      const months = item.months || 12;
      rawScore = Math.round(rule.pts * (months / 12) * 100) / 100;
    } else if (rule.type === 'per_month') {
      const months = item.months || 1;
      rawScore = Math.round(rule.pts * months * 100) / 100;
    }

    const detail = {
      ...item,
      ruleName: rule.name,
      calculated: rawScore,
      category: rule.cat,
      subcategory: rule.sub,
    };
    results.details.push(detail);

    const groupKey = rule.capGrp || item.code;
    if (!groups[groupKey]) {
      groups[groupKey] = { items: [], totalRaw: 0, cap: null, cat: rule.cat, sub: rule.sub };
    }
    groups[groupKey].items.push(detail);
    groups[groupKey].totalRaw += rawScore;
    if (rule.cap) groups[groupKey].cap = rule.cap;
  }

  for (const [groupKey, group] of Object.entries(groups)) {
    let effective = group.totalRaw;
    let capHit = false;

    if (group.cap !== null && group.totalRaw > group.cap) {
      effective = group.cap;
      capHit = true;
      results.capInfo.push({
        group: groupKey,
        raw: Math.round(group.totalRaw * 100) / 100,
        cap: group.cap,
        effective: effective,
        count: group.items.length,
      });
    }

    effective = Math.round(effective * 100) / 100;
    if (capHit) {
      group.items.forEach(it => { it.capHit = true; it.capGroup = groupKey; it.capMax = group.cap; });
    }

    const cat = group.cat;
    const sub = group.sub;

    if (cat === 'ENS' && sub === 'GRAD')      results.ENS_GRAD  += effective;
    else if (cat === 'ENS' && sub === 'POS')  results.ENS_POS   += effective;
    else if (cat === 'PROJ_ENS')              results.PROJ_ENS  += effective;
    else if (cat === 'PRI')                   results.PRI       += effective;
    else if (cat === 'PSQ')                   results.PSQ       += effective;
    else if (cat === 'EXT')                   results.EXT       += effective;
    else if (cat === 'ADM')                   results.ADM       += effective;
    else if (cat === 'RPT')                   results.RPT       += effective;
    else if (cat === 'OTR')                   results.OTR       += effective;
  }

  for (const k of ['ENS_GRAD','ENS_POS','PROJ_ENS','PRI','PSQ','EXT','ADM','RPT','OTR']) {
    results[k] = Math.round(results[k] * 100) / 100;
  }
  results.ENS_TOTAL = Math.round((results.ENS_GRAD + results.ENS_POS) * 100) / 100;
  results.TOTAL = Math.round((results.ENS_TOTAL + results.PROJ_ENS + results.PRI + results.PSQ + results.EXT + results.ADM + results.RPT + results.OTR) * 100) / 100;

  return results;
}

// ============================================================
// APPROVAL CALCULATION  (não alterado)
// ============================================================
function calculateApproval(scores, regime, thresholdDE, threshold20) {
  const has = Math.round((scores.ENS_TOTAL / 10) * 100) / 100;
  const prod = Math.round((scores.PROJ_ENS + scores.PRI + scores.PSQ + scores.EXT + scores.ADM + scores.RPT + scores.OTR) * 100) / 100;

  if (prod === 0 && has === 0) return { status: '--', has, prod };

  if (regime === '20H') {
    const T = threshold20;
    if (!T || T <= 0) return { status: 'Defina limiar 20H', has, prod };
    if (has < 8) return { status: 'REPROVADO (min LDB)', has, prod };
    if (has >= 10) return { status: 'APROVADO (CH>=10)', has, prod };
    if (prod >= 1.2 * T && has >= 8) return { status: 'APROVADO (PROD e 8H)', has, prod };
    if (prod >= 0.2 * T * (14 - has)) return { status: 'APROVADO (reta PRODxCH)', has, prod };
    return { status: 'REPROVADO (reta PRODxCH)', has, prod };
  } else {
    const T = thresholdDE;
    if (!T || T <= 0) return { status: 'Defina limiar DE/40H', has, prod };
    if (has < 8) return { status: 'REPROVADO (min LDB)', has, prod };
    if (has >= 16) return { status: 'APROVADO (CH>=16)', has, prod };
    if (prod >= (16 / 12) * (1.05 * T) && has >= 8) return { status: 'APROVADO (PROD e 8H)', has, prod };
    if (prod >= (1.05 * T) * (24 - has) / 12) return { status: 'APROVADO (reta PRODxCH)', has, prod };
    return { status: 'REPROVADO (reta PRODxCH)', has, prod };
  }
}

// ============================================================
// GIST SYNC MODULE
// ============================================================
const GIST_STORAGE_KEY = 'sicad_avaliador_config';

function loadConfig() {
  try { return JSON.parse(localStorage.getItem(GIST_STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveConfig(cfg) {
  localStorage.setItem(GIST_STORAGE_KEY, JSON.stringify(cfg));
}
async function syncToGist(token, gistId, data) {
  const payload = {
    description: 'SICAD Avaliador — Avaliações',
    files: { 'sicad-avaliacoes.json': { content: JSON.stringify(data, null, 2) } }
  };
  const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
  const resp = await fetch(url, {
    method: gistId ? 'PATCH' : 'POST',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!resp.ok) throw new Error(`Gist sync failed: ${resp.status}`);
  return (await resp.json()).id;
}
async function loadFromGist(token, gistId) {
  const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { 'Authorization': `token ${token}` },
  });
  if (!resp.ok) throw new Error(`Gist load failed: ${resp.status}`);
  const result = await resp.json();
  const file = result.files['sicad-avaliacoes.json'];
  return file ? JSON.parse(file.content) : { evaluations: [] };
}

// ============================================================
// CSV EXPORT
// ============================================================
function exportCSV(evaluations, thresholdDE, threshold20) {
  function hasNecCSV(prod, T, is20h) {
    if (!T || T <= 0) return '';
    if (is20h) {
      if (prod <= 0.8*T)  return 10;
      if (prod >  1.2*T)  return 8;
      return parseFloat((14 - prod/(0.2*T)).toFixed(1));
    }
    const Tm = 1.05*T;
    if (prod <= (8/12)*Tm)  return 16;
    if (prod >  (16/12)*Tm) return 8;
    return parseFloat((24 - 12*prod/Tm).toFixed(1));
  }
  function prodNecCSV(has, T, is20h) {
    if (!T || T <= 0) return '';
    if (is20h) {
      if (has < 8)   return '--------';
      if (has >= 10) return 0;
      return Math.ceil(0.2*T*(14-has));
    }
    if (has < 8)   return '--------';
    if (has >= 16) return 0;
    return Math.ceil((1.05*T)*(24-has)/12);
  }
  const headers = ['Nome','Regime','I-Ens(GRAD)','I-Ens(Total)','I-Proj.Ensino','II-Prod.Intelectual','III-1 Pesquisa','III-2 Extensão','IV(1-3) Admin','IV(4) Representação','V-Outras','TOTAL','Prod(exceto aulas)','HAS','Resultado','HAS necessário','Produção necessária'];
  const rows = evaluations.map(ev => {
    const isDE     = ev.regime !== '20H';
    const T        = isDE ? thresholdDE : threshold20;
    const approval = calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20);
    const hasNeed  = hasNecCSV(approval.prod, T, !isDE);
    const prodNeed = prodNecCSV(approval.has,  T, !isDE);
    return [ev.name,ev.regime,ev.scores.ENS_GRAD,ev.scores.ENS_TOTAL,ev.scores.PROJ_ENS,ev.scores.PRI,ev.scores.PSQ,ev.scores.EXT,ev.scores.ADM,ev.scores.RPT,ev.scores.OTR,ev.scores.TOTAL,approval.prod,approval.has,approval.status,hasNeed,prodNeed].join(';');
  });
  const csv = [headers.join(';'), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `sicad-avaliacao-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

const { useState, useEffect, useRef, useCallback } = React;
const e = React.createElement;

function App() {
  const [evaluations, setEvaluations] = useState([]);
  const [log, setLog] = useState([]);
  const [processing, setProcessing] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [activeTab, setActiveTab] = useState('ENS');
  const [showSettings, setShowSettings] = useState(false);
  const [config, setConfig] = useState(loadConfig());
  const [syncStatus, setSyncStatus] = useState(null);
  const [thresholdDE, setThresholdDE] = useState(parseFloat(localStorage.getItem('sicad_threshold_de') || '0'));
  const [threshold20, setThreshold20] = useState(parseFloat(localStorage.getItem('sicad_threshold_20') || '0'));
  const fileInputRef = useRef(null);

  const addLog = useCallback((msg, type='info') => {
    setLog(prev => [...prev, { msg, type, time: new Date().toLocaleTimeString() }]);
  }, []);

  useEffect(() => {
    if (config.token && config.gistId) {
      loadFromGist(config.token, config.gistId)
        .then(data => {
          if (data.evaluations && data.evaluations.length) {
            setEvaluations(data.evaluations);
            setSyncStatus('loaded');
          }
        })
        .catch(() => setSyncStatus('error'));
    }
  }, []);

  async function handleFiles(files) {
    setProcessing(true);
    const newEvals = [];

    for (const file of files) {
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        addLog(`${file.name}: não é PDF, ignorando`, 'warn');
        continue;
      }
      addLog(`Processando: ${file.name}...`, 'info');
      try {
        const text = await extractTextFromPDF(file);
        addLog(`  Texto extraído (${text.length} chars)`, 'ok');
        const { name, regime } = parseDocenteInfo(text);
        addLog(`  Docente: ${name} (${regime})`, 'ok');
        const { items, warnings } = parseItems(text);
        addLog(`  ${items.length} itens extraídos`, 'ok');
        warnings.forEach(w => addLog(`  ⚠ ${w}`, 'warn'));
        const scores = calculateScores(items);
        addLog(`  Pontuação total (c/ tetos): ${scores.TOTAL}`, 'ok');
        if (scores.capInfo.length > 0) {
          addLog(`  ${scores.capInfo.length} teto(s) aplicado(s):`, 'warn');
          scores.capInfo.forEach(ci => addLog(`    ${ci.group}: ${ci.raw} → ${ci.cap} (${ci.count} itens)`, 'warn'));
        }
        newEvals.push({
          id: Date.now() + '_' + Math.random().toString(36).substr(2,6),
          name, regime, fileName: file.name, scores,
          itemCount: items.length,
          timestamp: new Date().toISOString(),
        });
        addLog(`✓ ${name} processado com sucesso`, 'ok');
      } catch (err) {
        addLog(`✗ Erro em ${file.name}: ${err.message}`, 'err');
      }
    }

    if (newEvals.length > 0) {
      setEvaluations(prev => {
        const updated = [...prev];
        for (const ne of newEvals) {
          const idx = updated.findIndex(e => e.name === ne.name);
          if (idx >= 0) { updated[idx] = ne; addLog(`  Substituiu avaliação anterior de ${ne.name}`, 'warn'); }
          else updated.push(ne);
        }
        return updated;
      });
    }
    setProcessing(false);
  }

  async function handleSync() {
    if (!config.token) { setShowSettings(true); return; }
    setSyncStatus('syncing');
    try {
      const data = { evaluations, lastSync: new Date().toISOString() };
      const gistId = await syncToGist(config.token, config.gistId, data);
      if (!config.gistId) { const newCfg = { ...config, gistId }; setConfig(newCfg); saveConfig(newCfg); }
      setSyncStatus('synced'); addLog('Sincronizado com Gist', 'ok');

    evt.preventDefault(); evt.currentTarget.classList.remove('dragover');

  // ============================================================
  // ANALYSIS CHART — Dispersão PROD × HAS (eixos como na apresentação)
  //
  // Eixo X = Pontuação de produção (sem aulas)
  // Eixo Y = H-A horas semanais de ensino
  //
  // Fronteira de aprovação (3 segmentos):
  //  DE/40H: horizontal y=16 → diagonal (kneeL,16)→(kneeR,8) → horizontal y=8
  //  20H:    horizontal y=10 → diagonal (kneeL,10)→(kneeR,8) → horizontal y=8
  //
  // Pontos: cada professor é um ponto (prod, has) colorido por aprovação
  // ============================================================
  function AnalysisChart({ evaluations, thresholdDE, threshold20 }) {
    const canvasRef = useRef(null);
    const chartRef  = useRef(null);
    const [regime, setRegime] = useState('DE');

    // ── Approval boundary key points ──────────────────────────
    function getBoundary(T, isDE) {
      if (!T || T <= 0) return null;
      if (isDE) {
        // Formula: prod = 1.05*T*(24-has)/12
        // kneeLeft  → has=16: prod = 1.05*T*8/12  = 0.7*T
        // kneeRight → has=8 : prod = 1.05*T*16/12 = 1.4*T
        return { kneeLeft: 1.05*T*8/12, kneeRight: 1.05*T*16/12, hasTop: 16, hasBot: 8 };
      } else {
        // Formula: prod = 0.2*T*(14-has)
        // kneeLeft  → has=10: prod = 0.8*T
        // kneeRight → has=8 : prod = 1.2*T
        return { kneeLeft: 0.8*T, kneeRight: 1.2*T, hasTop: 10, hasBot: 8 };
      }
    }

    // ── Per-professor status ───────────────────────────────────
    function approvalStatus(prod, has, T, isDE) {
      if (!T || T <= 0) return 'neutral';
      if (has < 8) return 'below';
      if (isDE) {
        if (has >= 16) return 'above';
        if (prod >= (16/12)*1.05*T && has >= 8) return 'above';
        if (prod >= 1.05*T*(24-has)/12) return 'above';
        return 'below';
      } else {
        if (has >= 10) return 'above';
        if (prod >= 1.2*T && has >= 8) return 'above';
        if (prod >= 0.2*T*(14-has)) return 'above';
        return 'below';
      }
    }

    const buildData = useCallback(() => {
      const isDE = regime === 'DE';
      const T    = isDE ? thresholdDE : threshold20;

      const pts = evaluations
        .filter(ev => isDE ? ev.regime !== '20H' : ev.regime === '20H')
        .map(ev => {
          const has  = Math.round((ev.scores.ENS_TOTAL / 10) * 100) / 100;
          const prod = Math.round(
            (ev.scores.PROJ_ENS + ev.scores.PRI + ev.scores.PSQ +
             ev.scores.EXT + ev.scores.ADM + ev.scores.RPT + ev.scores.OTR) * 100) / 100;
          return { x: prod, y: has, status: approvalStatus(prod, has, T, isDE) };
        });

      // Boundary line — 4 anchor points forming the L-shape
      const bnd   = getBoundary(T, isDE);
      const allX  = pts.map(p => p.x).filter(v => v > 0);
      const maxX  = Math.max(...allX, bnd ? bnd.kneeRight * 1.6 : 500, 100);
      const lineData = bnd ? [
        { x: 0,           y: bnd.hasTop },   // start: left edge at top
        { x: bnd.kneeLeft,  y: bnd.hasTop }, // left knee
        { x: bnd.kneeRight, y: bnd.hasBot }, // right knee
        { x: maxX,          y: bnd.hasBot }, // extend right at bottom
      ] : [];

      return { pts, lineData, T, bnd, maxX, isDE };
    }, [evaluations, thresholdDE, threshold20, regime]);

    useEffect(() => {
      if (!canvasRef.current) return;
      const { pts, lineData, T, bnd, maxX, isDE } = buildData();

      const above   = pts.filter(p => p.status === 'above');
      const below   = pts.filter(p => p.status === 'below');
      const neutral = pts.filter(p => p.status === 'neutral');

      const datasets = [];

      // ── Approval boundary (drawn first so it appears behind dots) ──
      if (lineData.length) {
        datasets.push({
          label: 'Fronteira de aprovação',
          data: lineData,
          type: 'line',
          borderColor: '#1a4b8c',
          borderWidth: 2.5,
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 2,
          z: 0,
        });
      }

      // ── Reference dashed lines via extra line datasets ──
      if (bnd) {
        // Horizontal guide at hasTop
        datasets.push({
          label: null,
          data: [{ x: 0, y: bnd.hasTop }, { x: maxX, y: bnd.hasTop }],
          type: 'line',
          borderColor: '#93aad4',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Horizontal guide at hasBot
        datasets.push({
          label: null,
          data: [{ x: 0, y: bnd.hasBot }, { x: maxX, y: bnd.hasBot }],
          type: 'line',
          borderColor: '#93aad4',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Vertical guide at kneeLeft
        datasets.push({
          label: null,
          data: [{ x: bnd.kneeLeft, y: 0 }, { x: bnd.kneeLeft, y: bnd.hasTop }],
          type: 'line',
          borderColor: '#e06060',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
        // Vertical guide at kneeRight
        datasets.push({
          label: null,
          data: [{ x: bnd.kneeRight, y: 0 }, { x: bnd.kneeRight, y: bnd.hasBot }],
          type: 'line',
          borderColor: '#e06060',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 3,
          z: -1,
        });
      }

      // ── Professor scatter points ────────────────────────────
      if (above.length) datasets.push({
        label: `Aprovado (${above.length})`,
        data: above.map(p => ({ x: p.x, y: p.y })),
        type: 'scatter',
        backgroundColor: '#2d7a3a',
        borderColor: '#1b5224',
        borderWidth: 1.5,
        pointRadius: 8,
        pointHoverRadius: 10,
        order: 0,
        z: 10,
      });

      if (below.length) datasets.push({
        label: `Abaixo da reta (${below.length})`,
        data: below.map(p => ({ x: p.x, y: p.y })),
        type: 'scatter',
        backgroundColor: '#b33a3a',
        borderColor: '#7a2020',
        borderWidth: 1.5,
        pointRadius: 8,
        pointHoverRadius: 10,
        order: 0,
        z: 10,
      });

      if (neutral.length) datasets.push({
        label: `Sem limiar (${neutral.length})`,
        data: neutral.map(p => ({ x: p.x, y: p.y })),
        type: 'scatter',
        backgroundColor: '#9a968d',
        borderColor: '#6b6860',
        borderWidth: 1.5,
        pointRadius: 8,
        pointHoverRadius: 10,
        order: 0,
        z: 10,
      });

      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

      // ── Axis ranges ────────────────────────────────────────
      const hasTop = bnd ? bnd.hasTop : (isDE ? 16 : 10);
      const yMax   = hasTop + 2;
      const xMax   = Math.ceil(maxX * 1.05 / 50) * 50;

      chartRef.current = new Chart(canvasRef.current, {
        type: 'scatter',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'point' },
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                filter: item => item.text !== null && item.text !== undefined,
                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                padding: 14,
                usePointStyle: true,
                pointStyleWidth: 10,
              },
            },
            tooltip: {
              filter: (item) => item.dataset.type === 'scatter',
              callbacks: {
                label(ctx) {
                  return `Prod: ${ctx.parsed.x.toFixed(1)} pts  |  HAS: ${ctx.parsed.y.toFixed(2)} h/sem`;
                },
              },
              backgroundColor: '#1a1a18',
              bodyFont: { family: "'IBM Plex Mono', monospace", size: 12 },
              padding: 10,
              displayColors: false,
            },
          },
          scales: {
            x: {
              type: 'linear',
              min: 0,
              max: xMax,
              title: {
                display: true,
                text: 'Pontuação — produção sem aulas (pts)',
                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                color: '#6b6860',
                padding: { top: 8 },
              },
              ticks: {
                font: { family: "'IBM Plex Mono', monospace", size: 10 },
                maxTicksLimit: 10,
                callback: v => {
                  if (!bnd) return v;
                  if (Math.abs(v - bnd.kneeLeft) < (xMax*0.025)) return Math.round(bnd.kneeLeft);
                  if (Math.abs(v - bnd.kneeRight) < (xMax*0.025)) return Math.round(bnd.kneeRight);
                  return v;
                },
              },
              grid: { color: '#ebe9e4' },
            },
            y: {
              type: 'linear',
              min: 0,
              max: yMax,
              title: {
                display: true,
                text: 'H-A — horas-aula semanais',
                font: { family: "'IBM Plex Sans', sans-serif", size: 11 },
                color: '#6b6860',
                padding: { bottom: 8 },
              },
              ticks: {
                stepSize: 2,
                font: { family: "'IBM Plex Mono', monospace", size: 10 },
                callback: v => v % 2 === 0 ? `${v}h` : '',
              },
              grid: { color: '#ebe9e4' },
            },
          },
        },
      });

      return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
    }, [buildData]);

    // ── Stats ──────────────────────────────────────────────────
    const { pts, T, bnd, isDE } = buildData();
    const above   = pts.filter(p => p.status === 'above').length;
    const below   = pts.filter(p => p.status === 'below').length;
    const total   = pts.length;
    const prods   = pts.map(p => p.x).sort((a,b) => a-b);
    const hasArr  = pts.map(p => p.y).sort((a,b) => a-b);
    const avgProd = prods.length ? prods.reduce((s,v)=>s+v,0)/prods.length : 0;
    const medProd = prods.length
      ? (prods.length%2===0 ? (prods[prods.length/2-1]+prods[prods.length/2])/2 : prods[Math.floor(prods.length/2)]) : 0;
    const avgHAS  = hasArr.length ? hasArr.reduce((s,v)=>s+v,0)/hasArr.length : 0;

    const hasDE  = evaluations.some(ev => ev.regime !== '20H');
    const has20H = evaluations.some(ev => ev.regime === '20H');
    if (!hasDE && !has20H) return null;

    return e('div', { className:'analysis-section' },
      e('h2', null, 'Análise da Unidade — H-A × Pontuação de Produção'),
      e('p', { className:'subtitle' },
        'Pontos não identificados individualmente. A fronteira segue o mesmo modelo da Ata CD 28/02/2020.'
      ),

      // Regime toggle
      e('div', { className:'regime-toggle' },
        hasDE  && e('button', { key:'DE',  className:`regime-btn ${regime==='DE' ?'active':''}`, onClick:()=>setRegime('DE')  }, 'DE / 40H'),
        has20H && e('button', { key:'20H', className:`regime-btn ${regime==='20H'?'active':''}`, onClick:()=>setRegime('20H') }, '20 Horas'),
      ),

      e('div', { className:'chart-grid' },

        // ── Chart box ──
        e('div', { className:'chart-box', style:{ height:420 } },
          e('canvas', { ref:canvasRef }),
          e('p', { className:'chart-note' },
            T && T > 0
              ? `T (Xm) = ${T} pts  ·  Reta: ${isDE
                  ? `(${(1.05*T*8/12).toFixed(0)}, 16h) → (${(1.05*T*16/12).toFixed(0)}, 8h)`
                  : `(${(0.8*T).toFixed(0)}, ${isDE?16:10}h) → (${(1.2*T).toFixed(0)}, 8h)`}`
              : `⚠ Defina o valor médio de referência (Xm) ${regime==='DE'?'DE/40H':'20H'} para exibir a fronteira`
          ),
        ),

        // ── Stats panel ──
        e('div', { className:'stats-panel' },
          e('h3', null, `Estatísticas — ${regime}`),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Professores'),
            e('span', { className:'stat-value blue' }, total),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, '✓ Acima da reta'),
            e('span', { className:'stat-value green' }, T>0 ? `${above} (${total?Math.round(above/total*100):0}%)` : '—'),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, '✗ Abaixo da reta'),
            e('span', { className:'stat-value red' }, T>0 ? `${below} (${total?Math.round(below/total*100):0}%)` : '—'),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Prod. média'),
            e('span', { className:'stat-value' }, avgProd.toFixed(1)),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Prod. mediana'),
            e('span', { className:'stat-value' }, medProd.toFixed(1)),
          ),
          e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'HAS média'),
            e('span', { className:'stat-value' }, avgHAS.toFixed(2)),
          ),
          T>0 && bnd && e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Joelho esquerdo'),
            e('span', { className:'stat-value blue' }, `${bnd.kneeLeft.toFixed(0)} pts`),
          ),
          T>0 && bnd && e('div', { className:'stat-row' },
            e('span', { className:'stat-label' }, 'Joelho direito'),
            e('span', { className:'stat-value blue' }, `${bnd.kneeRight.toFixed(0)} pts`),
          ),

          e('h3', { style:{ marginTop:16 } }, 'Legenda'),
          e('div', { className:'legend-row' },
            e('span', { className:'legend-dot', style:{ background:'#2d7a3a' } }),
            e('span', null, 'Aprovado (acima da reta)'),
          ),
          e('div', { className:'legend-row' },
            e('span', { className:'legend-dot', style:{ background:'#b33a3a' } }),
            e('span', null, 'Abaixo da reta'),
          ),
          (!T || T <= 0) && e('div', { className:'legend-row' },
            e('span', { className:'legend-dot', style:{ background:'#9a968d' } }),
            e('span', null, 'Xm não definido'),
          ),
          e('div', { className:'legend-row' },
            e('span', { style:{ width:24, height:2.5, background:'#1a4b8c', display:'inline-block' } }),
            e('span', null, 'Fronteira de aprovação'),
          ),
          e('div', { className:'legend-row' },
            e('span', { style:{ width:24, height:0, border:'1px dashed #93aad4', display:'inline-block' } }),
            e('span', null, 'Guias (8h, 16h, knees)'),
          ),
        ),
      ),
    );
  }

  function SummaryTable() {
    if (evaluations.length === 0) return null;
    const cols = [
      { key:'ENS_GRAD',  label:'I-Ens\n(GRAD)' },
      { key:'ENS_TOTAL', label:'I-Ens\n(Total)' },
      { key:'PROJ_ENS',  label:'I-Proj.\nEnsino' },
      { key:'PRI',       label:'II-Prod.\nIntelectual' },
      { key:'PSQ',       label:'III-1\nPesquisa' },
      { key:'EXT',       label:'III-2\nExtensão' },
      { key:'ADM',       label:'IV(1-3)\nAdmin.' },
      { key:'RPT',       label:'IV(4)\nRepres.' },
      { key:'OTR',       label:'V-Outras\nAtiv.' },
      { key:'TOTAL',     label:'TOTAL' },
    ];

    // ── Helper: HAS necessário dado prod e T (DE/40H)
    // Fórmula: SE(prod <= (8/12)*(1,05*T); 16;
    //           SE(prod >  (16/12)*(1,05*T); 8;
    //              24 - 12*prod/(1,05*T)))
    function hasNecessario(prod, T) {
      if (!T || T <= 0) return null;
      const Tm = 1.05 * T;
      if (prod <= (8 / 12) * Tm)  return 16;
      if (prod >  (16 / 12) * Tm) return 8;
      return 24 - (12 * prod) / Tm;
    }

    // ── Helper: Produção necessária dado HAS e T (DE/40H)
    // Fórmula: SE(HAS < 8; "--------";
    //           SE(HAS >= 16; 0;
    //              TETO((1,05*T)*(24-HAS)/12; 1)))
    function prodNecessaria(has, T) {
      if (!T || T <= 0) return null;
      if (has < 8)  return '————';
      if (has >= 16) return 0;
      return Math.ceil((1.05 * T) * (24 - has) / 12);
    }

    // ── Equivalentes para 20H ─────────────────────────────────
    // kneeLeft: prod=(0,8*T)→has=10 | kneeRight: prod=(1,2*T)→has=8
    function hasNecessario20(prod, T) {
      if (!T || T <= 0) return null;
      if (prod <= 0.8 * T)  return 10;
      if (prod >  1.2 * T)  return 8;
      // Linear: has = 14 - prod/(0,2*T)
      return 14 - prod / (0.2 * T);
    }

    function prodNecessaria20(has, T) {
      if (!T || T <= 0) return null;
      if (has < 8)  return '————';
      if (has >= 10) return 0;
      return Math.ceil(0.2 * T * (14 - has));
    }

    return e('div', { className:'summary-section' },
      e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 } },
        e('h2', null, 'Resultado Final — Com Tetos Aplicados'),
        e('button', { className:'btn btn-sm', onClick:()=>exportCSV(evaluations,thresholdDE,threshold20) }, '⬇ Exportar CSV'),
      ),
      e('div', { style:{ overflowX:'auto' } },
        e('table', { className:'summary-table' },
          e('thead', null, e('tr', null,
            e('th', { style:{ textAlign:'left', minWidth:160 } }, 'Nome'),
            e('th', null, 'Regime'),
            ...cols.map(c => e('th', { key:c.key, className:c.key==='TOTAL'?'total-col':'', style:{ whiteSpace:'pre-line' } }, c.label)),
            e('th', { style:{ whiteSpace:'pre-line' } }, 'Prod\n(s/ aulas)'),
            e('th', null, 'HAS'),
            e('th', { style:{ minWidth:140 } }, 'Resultado'),
            e('th', {
              style:{ minWidth:90, whiteSpace:'pre-line', background:'#e8eef6', color:'#1a4b8c', borderLeft:'2px solid #93aad4' },
              title:'Horas-aula semanais mínimas que o professor deveria ter ministrado, dado o nível de produção',
            }, 'HAS\nnecessário'),
            e('th', {
              style:{ minWidth:110, whiteSpace:'pre-line', background:'#e8eef6', color:'#1a4b8c' },
              title:'Pontuação de produção mínima que o professor deveria ter obtido, dado o número de horas-aula',
            }, 'Produção\nnecessária'),
          )),
          e('tbody', null,
            [...evaluations].sort((a,b)=>a.name.localeCompare(b.name)).map(ev => {
              const isDE   = ev.regime !== '20H';
              const T      = isDE ? thresholdDE : threshold20;
              const approval = calculateApproval(ev.scores, ev.regime, thresholdDE, threshold20);
              const isApproved  = approval.status.startsWith('APROVADO');
              const isReprovado = approval.status.startsWith('REPROVADO');

              // New columns
              const hasNeeded  = isDE
                ? hasNecessario(approval.prod, T)
                : hasNecessario20(approval.prod, T);
              const prodNeeded = isDE
                ? prodNecessaria(approval.has, T)
                : prodNecessaria20(approval.has, T);

              // Format HAS needed
              const hasNeededFmt = hasNeeded === null   ? '—'
                : typeof hasNeeded === 'string'          ? hasNeeded
                : hasNeeded % 1 === 0                    ? `${hasNeeded}h`
                : `${hasNeeded.toFixed(1)}h`;

              // Format prod needed
              const prodNeededFmt = prodNeeded === null     ? '—'
                : typeof prodNeeded === 'string'             ? prodNeeded
                : `${prodNeeded}`;

              // Color cues for the two new cells
              const hasStyle = {
                textAlign:'center',
                fontFamily:"'IBM Plex Mono',monospace",
                fontSize:12,
                fontWeight:600,
                borderLeft:'2px solid #93aad4',
                background: isApproved ? 'transparent'
                  : (hasNeeded !== null && typeof hasNeeded !== 'string' && hasNeeded > approval.has + 0.05)
                    ? '#fff8e8' : 'transparent',
                color: isApproved ? 'var(--green)'
                  : (hasNeeded !== null && typeof hasNeeded !== 'string' && hasNeeded > approval.has + 0.05)
                    ? 'var(--orange)' : 'var(--text)',
              };

              const prodStyle = {
                textAlign:'center',
                fontFamily:"'IBM Plex Mono',monospace",
                fontSize:12,
                fontWeight:600,
                background: isApproved ? 'transparent'
                  : (typeof prodNeeded === 'number' && prodNeeded > approval.prod + 0.5)
                    ? '#fff8e8' : 'transparent',
                color: isApproved ? 'var(--green)'
                  : (typeof prodNeeded === 'number' && prodNeeded > approval.prod + 0.5)
                    ? 'var(--orange)' : 'var(--text)',
              };

              return e('tr', { key:ev.id },
                e('td', null, ev.name),
                e('td', { style:{ textAlign:'center', fontSize:11 } }, ev.regime),
                ...cols.map(c => e('td', { key:c.key, className:c.key==='TOTAL'?'total-col':'' }, ev.scores[c.key])),
                e('td', null, approval.prod),
                e('td', null, approval.has),
                e('td', { style:{
                  fontWeight:600, fontSize:11,
                  color: isApproved?'var(--green)':isReprovado?'var(--red)':'var(--text-muted)',
                  background: isApproved?'var(--green-bg)':isReprovado?'var(--red-bg)':'transparent',
                }}, approval.status),
                e('td', { style: hasStyle  }, hasNeededFmt),
                e('td', { style: prodStyle }, prodNeededFmt),
              );
            })
          )
        )
      )
    );
  }

  return e('div', null,
    e('header', null,
      e('div', { className:'container inner' },
        e('h1', null, 'SICAD Avaliador ', e('span', null, '— CONSUNI 18/2017')),
        e('div', { className:'header-actions' },
          syncStatus && e('span', { style:{ fontSize:12, color:'var(--text-muted)' } },
            syncStatus==='synced'   ? '● Sincronizado' :
            syncStatus==='syncing'  ? '○ Sincronizando...' :
            syncStatus==='loaded'   ? '● Carregado do Gist' : '● Erro sync'
          ),
          e('button', { className:'btn btn-sm', onClick:handleSync }, '↑ Sync Gist'),
          e('button', { className:'btn btn-sm', onClick:()=>setShowSettings(true) }, '⚙'),
        )
      )
    ),

    e('div', { className:'container' },
      // Limiar de aprovação
      e('div', { style:{ display:'flex', gap:16, margin:'20px 0 0 0', padding:'12px 16px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, alignItems:'center', flexWrap:'wrap' } },
        e('span', { style:{ fontSize:13, fontWeight:600, color:'var(--accent)' } }, 'Limiares de Aprovação:'),
        e('label', { style:{ fontSize:13, display:'flex', alignItems:'center', gap:4 } },
          'DE/40H (valor médio de produção):',
          e('input', {
            type:'number', step:'0.01', value:thresholdDE||'', placeholder:'ex: 150',
            style:{ width:100, padding:'4px 8px', border:'1px solid var(--border)', borderRadius:4, fontFamily:"'IBM Plex Mono',monospace", fontSize:13 },
            onChange:(ev)=>{ const v=parseFloat(ev.target.value)||0; setThresholdDE(v); localStorage.setItem('sicad_threshold_de',String(v)); },
          })
        ),
        e('label', { style:{ fontSize:13, display:'flex', alignItems:'center', gap:4 } },
          '20H (valor médio de produção):',
          e('input', {
            type:'number', step:'0.01', value:threshold20||'', placeholder:'ex: 80',
            style:{ width:100, padding:'4px 8px', border:'1px solid var(--border)', borderRadius:4, fontFamily:"'IBM Plex Mono',monospace", fontSize:13 },
            onChange:(ev)=>{ const v=parseFloat(ev.target.value)||0; setThreshold20(v); localStorage.setItem('sicad_threshold_20',String(v)); },
          })
        ),
        e('span', { style:{ fontSize:11, color:'var(--text-muted)' } }, 'Insira os valores médios de referência antes de analisar os PDFs'),
      ),

      // Upload Zone
      e('div', {
        className:'upload-zone',
        onDrop:handleDrop, onDragOver:handleDragOver, onDragLeave:handleDragLeave,
        onClick:()=>fileInputRef.current?.click(),
      },
        e('input', { ref:fileInputRef, type:'file', accept:'.pdf', multiple:true,
          onChange:(ev)=>handleFiles(Array.from(ev.target.files)) }),
        e('h3', null, processing ? 'Processando...' : 'Arraste PDFs do SICAD aqui'),
        e('p', null, 'ou clique para selecionar · aceita múltiplos arquivos'),
      ),

      // Log
      log.length > 0 && e('div', { className:'log' },
        log.map((l,i) => e('div', { key:i, className:l.type },
          e('span', { style:{ opacity:0.5 } }, `[${l.time}] `), l.msg
        ))
      ),

      // Cards de avaliação
      evaluations.length > 0 && e('div', { style:{ marginTop:16 } },
        e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 } },
          e('h2', { style:{ fontSize:16 } }, `${evaluations.length} avaliação(ões)`),
          e('button', { className:'btn btn-sm btn-danger', onClick:()=>{ setEvaluations([]); setExpanded(null); }}, 'Limpar tudo'),
        ),
        evaluations.map(ev =>
          e('div', { key:ev.id, className:'eval-card' },
            e('div', { className:'eval-header', onClick:()=>setExpanded(expanded===ev.id?null:ev.id) },
              e('div', null,
                e('span', { className:'eval-name' }, ev.name,
                  e('small', null, `${ev.itemCount} itens · ${ev.fileName}`)
                ),
              ),
              e('div', { className:'eval-scores' },
                e(ScorePill, { value:ev.scores.ENS_TOTAL, label:'ENS', color:'#1a4b8c' }),
                e(ScorePill, { value:ev.scores.PRI, label:'PRI', color:'#7a3b8c' }),
                e(ScorePill, { value:ev.scores.TOTAL, label:'TOTAL', color:'#333' }),
                e('button', { className:'btn btn-sm btn-danger', onClick:(evt)=>{ evt.stopPropagation(); handleRemoveEval(ev.id); }, style:{ marginLeft:8 } }, '✕'),
              ),
            ),
            expanded === ev.id && e(EvalDetail, { evaluation:ev }),
          )
        ),
      ),

      e(SummaryTable),
      evaluations.length > 0 && e(AnalysisChart, { evaluations, thresholdDE, threshold20 }),
    ),

    e('footer', null, 'SICAD Avaliador · Resolução CONSUNI 18/2017 · UFG'),
    showSettings && e(SettingsModal),
  );
}

ReactDOM.render(e(App), document.getElementById('root'));
</script>
</body>
</html>
